<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diario Protocollo</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
/* ═══════════════════════════════════════════════
   DESIGN SYSTEM — Apple.com inspired
   Font: SF Pro / -apple-system
   Colori: monocromatico + accenti desaturati
   ═══════════════════════════════════════════════ */
:root {
  /* Tipografia */
  --f-xs:   11px; --f-sm:  12px; --f-base: 14px;
  --f-md:   16px; --f-lg:  20px; --f-xl:   28px;
  --f-2xl:  36px;
  --fw-reg: 400;  --fw-med: 500; --fw-semi: 600; --fw-bold: 700;
  --lh: 1.47059; /* SF Pro line height */

  /* Palette neutri */
  --c-bg:      #f5f5f7;
  --c-surface: #ffffff;
  --c-surface2:#f5f5f7;
  --c-surface3:#e8e8ed;
  --c-border:  rgba(0,0,0,.08);
  --c-border2: rgba(0,0,0,.16);

  /* Testo */
  --c-text:    #1d1d1f;
  --c-text2:   #3d3d3f;
  --c-label:   #6e6e73;
  --c-placeholder: #aeaeb2;

  /* Accenti */
  --c-blue:    #0071e3;
  --c-blue-dk: #0058b8;
  --c-green:   #1d8348;
  --c-red:     #c0392b;
  --c-orange:  #b84c00;
  --c-purple:  #6d4c9e;
  --c-teal:    #1a7a6e;

  /* Workout */
  --c-push:   #c0392b;
  --c-pull:   #1d8348;
  --c-legs:   #b84c00;
  --c-upper:  #6d4c9e;
  --c-dom:    #1a5a8a;
  --c-rest:   #aeaeb2;

  /* Slot iniezioni */
  --c-mattino:    #1a5a8a;
  --c-pomeriggio: #8a4a00;
  --c-postWO:     #5a2d8a;
  --c-sera:       #1a5a3a;

  /* Geometry */
  --r-card:  12px;
  --r-el:    8px;
  --r-pill:  999px;
  --shadow:  0 1px 3px rgba(0,0,0,.06), 0 2px 8px rgba(0,0,0,.04);
  --shadow2: 0 4px 16px rgba(0,0,0,.10);

  /* Layout */
  --max-w: 1080px;
  --pad-h: 20px;
  --nav-h: 48px;
  --tab-h: 44px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
    "Helvetica Neue", Arial, sans-serif;
  font-size: var(--f-base);
  font-weight: var(--fw-reg);
  line-height: var(--lh);
  color: var(--c-text);
  background: var(--c-bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── HEADER ─────────────────────────────────────── */
#app-header {
  position: sticky; top: 0; z-index: 200;
  height: var(--nav-h);
  background: rgba(255,255,255,.9);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--c-border);
  display: flex; align-items: center;
  padding: 0 var(--pad-h); gap: 12px;
}
#app-header h1 {
  font-size: var(--f-base); font-weight: var(--fw-semi);
  color: var(--c-text); white-space: nowrap; flex-shrink: 0;
}
#app-header .h-sub {
  font-size: var(--f-xs); color: var(--c-label);
  white-space: nowrap; flex-shrink: 0;
}
#app-header .h-spacer { flex: 1; }
#app-header .h-sync {
  display: flex; align-items: center; gap: 6px;
  font-size: var(--f-xs); color: var(--c-label); white-space: nowrap;
}
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--c-placeholder); flex-shrink: 0; }
.sync-dot.ok  { background: var(--c-green); }
.sync-dot.err { background: var(--c-red); }
.h-btn {
  font-size: var(--f-xs); font-weight: var(--fw-med);
  padding: 5px 12px; border-radius: var(--r-pill);
  border: 1px solid var(--c-border2); background: var(--c-surface);
  color: var(--c-text); cursor: pointer; white-space: nowrap;
  transition: background .12s;
}
.h-btn:hover { background: var(--c-surface2); }
.h-btn.primary {
  background: var(--c-blue); color: #fff; border-color: var(--c-blue);
}
.h-btn.primary:hover { background: var(--c-blue-dk); }

/* ── TAB NAV ────────────────────────────────────── */
#tab-nav {
  position: sticky; top: var(--nav-h); z-index: 190;
  height: var(--tab-h);
  background: rgba(255,255,255,.9);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--c-border);
  display: flex; padding: 0 var(--pad-h);
}
.tab-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 0 14px;
  font-size: var(--f-sm); font-weight: var(--fw-reg); color: var(--c-label);
  border: none; background: none; cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color .15s; white-space: nowrap;
}
.tab-btn:hover { color: var(--c-text); }
.tab-btn.active { color: var(--c-blue); border-bottom-color: var(--c-blue); font-weight: var(--fw-semi); }
.tab-btn .tab-icon { font-size: 13px; }

/* ── PROGRESS BAR ───────────────────────────────── */
#prog-wrap { height: 2px; background: var(--c-bg); }
#prog-bar  { height: 100%; background: var(--c-blue); width: 0%; transition: width .5s ease; }

/* ── WEEK NAV ───────────────────────────────────── */
#week-nav {
  position: sticky; top: calc(var(--nav-h) + var(--tab-h)); z-index: 180;
  background: rgba(255,255,255,.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--c-border);
  overflow-x: auto; scrollbar-width: none;
  display: none; /* mostrato solo in tab diario */
}
#week-nav::-webkit-scrollbar { display: none; }
.week-nav-inner { display: flex; padding: 0 var(--pad-h); min-width: max-content; }
.wk-tab {
  padding: 8px 10px; font-size: 11px; font-weight: var(--fw-reg);
  color: var(--c-label); cursor: pointer; white-space: nowrap;
  border-bottom: 2px solid transparent; transition: color .12s;
}
.wk-tab:hover { color: var(--c-text); }
.wk-tab.active { color: var(--c-blue); border-bottom-color: var(--c-blue); font-weight: var(--fw-semi); }

/* ── KPI STRIP ──────────────────────────────────── */
#kpi-strip {
  display: none; /* mostrato solo in tab diario */
  background: var(--c-surface);
  border-bottom: 1px solid var(--c-border);
  padding: 0 var(--pad-h);
  overflow-x: auto; scrollbar-width: none;
}
#kpi-strip::-webkit-scrollbar { display: none; }
.kpi-strip-inner { display: flex; align-items: center; height: 40px; gap: 0; }
.ks-item { display: flex; align-items: baseline; gap: 3px; padding: 0 12px; border-right: 1px solid var(--c-border); flex-shrink: 0; }
.ks-item:first-child { padding-left: 0; }
.ks-item:last-child  { border-right: none; }
.ks-val { font-size: var(--f-md); font-weight: var(--fw-semi); letter-spacing: -.02em; color: var(--c-text); }
.ks-lbl { font-size: 10px; color: var(--c-label); }

/* ── VIEWS ──────────────────────────────────────── */
.view { display: none; }
.view.active { display: block; }

/* ── LAYOUT CONTENT ─────────────────────────────── */
.page-content {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 24px var(--pad-h) 100px;
}

/* ── CARD BASE ──────────────────────────────────── */
.card {
  background: var(--c-surface);
  border-radius: var(--r-card);
  border: 1px solid var(--c-border);
  box-shadow: var(--shadow);
}

/* ── SECTION HEADER ─────────────────────────────── */
.section-hdr {
  font-size: var(--f-xs); font-weight: var(--fw-semi);
  color: var(--c-label); letter-spacing: .06em; text-transform: uppercase;
  margin-bottom: 8px;
}

/* ═══════════════════════════════════════════════
   TAB 1 — DIARIO
   ═══════════════════════════════════════════════ */

/* Cycle card */
.cycle-card {
  background: var(--c-surface);
  border-radius: var(--r-card);
  border: 1px solid var(--c-border);
  box-shadow: var(--shadow);
  padding: 18px 20px;
  display: flex; align-items: center; gap: 18px;
  margin-bottom: 20px;
}
.cycle-ring { position: relative; flex-shrink: 0; }
.cycle-ring-lbl {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.cycle-ring-pct { font-size: var(--f-sm); font-weight: var(--fw-bold); letter-spacing: -.02em; }
.cycle-ring-sub { font-size: 9px; color: var(--c-label); }
.cycle-info h3  { font-size: var(--f-base); font-weight: var(--fw-semi); margin-bottom: 3px; }
.cycle-info p   { font-size: var(--f-xs); color: var(--c-label); }
.cycle-info .cycle-next { font-size: var(--f-xs); color: var(--c-blue); margin-top: 6px; }

/* Proto header */
.proto-hdr {
  background: var(--c-surface);
  border-radius: var(--r-card);
  border: 1px solid var(--c-border);
  box-shadow: var(--shadow);
  padding: 14px 16px;
  margin-bottom: 16px;
}
.proto-hdr-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.proto-hdr-title { font-size: var(--f-base); font-weight: var(--fw-semi); }
.proto-hdr-sub   { font-size: var(--f-sm); color: var(--c-label); margin-top: 2px; }
.proto-slots { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
.proto-slot {
  display: flex; align-items: flex-start; gap: 8px;
  background: var(--c-surface2); border-radius: var(--r-el);
  padding: 7px 10px;
}
.slot-icon {
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; flex-shrink: 0; margin-top: 1px;
}
.slot-icon.mattino    { background: rgba(26,90,138,.12);  color: var(--c-mattino); }
.slot-icon.pomeriggio { background: rgba(138,74,0,.12);   color: var(--c-pomeriggio); }
.slot-icon.postWO     { background: rgba(90,45,138,.12);  color: var(--c-postWO); }
.slot-icon.sera       { background: rgba(26,90,58,.12);   color: var(--c-sera); }
.slot-label  { font-size: 10px; font-weight: var(--fw-semi); color: var(--c-label); letter-spacing: .04em; text-transform: uppercase; }
.slot-drugs  { font-size: var(--f-xs); color: var(--c-text2); }

/* Warm-up toggle */
.wu-toggle {
  display: flex; align-items: center; gap: 10px;
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--r-card);
  padding: 12px 16px; cursor: pointer;
  transition: background .12s; margin-bottom: 20px;
}
.wu-toggle:hover { background: var(--c-surface2); }
.wu-toggle-title { font-size: var(--f-base); font-weight: var(--fw-semi); }
.wu-toggle-sub   { font-size: var(--f-sm); color: var(--c-label); flex: 1; }
.wu-toggle-chev  { font-size: var(--f-sm); color: var(--c-placeholder); transition: transform .2s; }
.wu-toggle.open .wu-toggle-chev { transform: rotate(90deg); }
.wu-body { overflow: hidden; }

/* Week header */
.wk-hdr {
  display: flex; align-items: center; gap: 10px;
  padding: 4px 0 10px;
  border-bottom: 1px solid var(--c-border);
  margin-bottom: 10px;
}
.wk-hdr:not(:first-child) { margin-top: 28px; }
.wk-hdr h2 { font-size: var(--f-lg); font-weight: var(--fw-semi); letter-spacing: -.02em; }
.wk-badge {
  font-size: var(--f-xs); font-weight: var(--fw-med);
  padding: 3px 9px; border-radius: var(--r-pill); white-space: nowrap;
}
.wk-range { font-size: var(--f-sm); color: var(--c-label); margin-left: auto; }

/* Phase badges */
.ph-1 { background: #e8f0f8; color: #1a5a8a; }
.ph-2 { background: #f0e8f0; color: #6d4c9e; }
.ph-3 { background: #e8f0e8; color: #1d7040; }
.ph-4 { background: #f5ede5; color: #8a4a00; }
.ph-baseline { background: #f0f0f5; color: #6e6e73; }

/* Week summary */
.wk-summary {
  background: var(--c-surface2);
  border-radius: var(--r-el);
  padding: 12px 14px; margin-bottom: 12px;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px;
}
.ws-item .ws-val { font-size: var(--f-md); font-weight: var(--fw-semi); letter-spacing: -.02em; }
.ws-item .ws-lbl { font-size: 10px; color: var(--c-label); margin-top: 1px; }

/* Day card */
.day-card {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--r-card);
  box-shadow: var(--shadow);
  margin-bottom: 6px;
  overflow: hidden;
  transition: box-shadow .15s;
}
.day-card:hover { box-shadow: var(--shadow2); }
.day-card.today {
  border-color: rgba(0,113,227,.3);
  box-shadow: 0 0 0 2px rgba(0,113,227,.12), var(--shadow);
}

/* Day head */
.day-head {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 14px; cursor: pointer; user-select: none;
}
.day-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.day-date { font-size: var(--f-base); font-weight: var(--fw-semi); }
.day-sub  { font-size: var(--f-xs); color: var(--c-label); }
.day-badge {
  font-size: 10px; font-weight: var(--fw-med);
  padding: 2px 8px; border-radius: var(--r-pill); flex-shrink: 0; white-space: nowrap;
}
.today-pill {
  font-size: 10px; font-weight: var(--fw-semi);
  padding: 2px 7px; border-radius: var(--r-pill);
  background: var(--c-blue); color: #fff; flex-shrink: 0;
}
.day-chev {
  font-size: var(--f-sm); color: var(--c-placeholder);
  margin-left: auto; flex-shrink: 0; transition: transform .2s;
}
.day-card.open .day-chev { transform: rotate(90deg); }

/* Badge colori workout */
.badge-push  { background: rgba(192,57,43,.10);  color: var(--c-push); }
.badge-pull  { background: rgba(29,131,72,.10);  color: var(--c-pull); }
.badge-legs  { background: rgba(184,76,0,.10);   color: var(--c-legs); }
.badge-upper { background: rgba(109,76,158,.10); color: var(--c-upper); }
.badge-dom   { background: rgba(26,90,138,.10);  color: var(--c-dom); }
.badge-rest  { background: var(--c-surface3);    color: var(--c-placeholder); }
.badge-bkk   { background: rgba(184,76,0,.15);   color: var(--c-orange); }

/* Day body */
.day-body { display: none; border-top: 1px solid var(--c-border); }
.day-card.open .day-body { display: grid; }
.day-body-cols { display: grid; grid-template-columns: 1fr 1fr; }
.day-col { padding: 14px 16px; }
.day-col + .day-col { border-left: 1px solid var(--c-border); }
.day-row-full { padding: 12px 16px; border-top: 1px solid var(--c-border); }

/* ── BIOMETRIA ──────────────────────────────────── */
.bio-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
.bio-field { display: flex; flex-direction: column; align-items: center; }
.bio-input {
  width: 100%; text-align: center;
  font-size: var(--f-md); font-weight: var(--fw-semi); letter-spacing: -.02em;
  border: 1px solid var(--c-border); border-radius: var(--r-el);
  background: var(--c-surface2); color: var(--c-text);
  padding: 7px 4px; outline: none; font-family: inherit;
  transition: border-color .12s, background .12s;
}
.bio-input:focus { border-color: var(--c-blue); background: var(--c-surface); }
.bio-input::placeholder { color: var(--c-placeholder); }
.bio-lbl { font-size: 10px; color: var(--c-label); margin-top: 3px; }

/* ── INIEZIONI CHIP ─────────────────────────────── */
.inj-section { }
.inj-slot-hdr { display: flex; align-items: center; gap: 7px; margin: 10px 0 5px; }
.inj-slot-label { font-size: 10px; font-weight: var(--fw-semi); color: var(--c-label); letter-spacing: .04em; text-transform: uppercase; }
.inj-slot-timing { font-size: 10px; color: var(--c-placeholder); margin-left: auto; }
.inj-chips { display: flex; flex-wrap: wrap; gap: 4px; }
.inj-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 9px; border-radius: var(--r-el);
  border: 1px solid var(--c-border); background: var(--c-surface2);
  font-size: var(--f-xs); font-weight: var(--fw-med); color: var(--c-text2);
  cursor: pointer; user-select: none; white-space: nowrap;
  transition: background .1s, border-color .1s;
}
.inj-chip:hover { background: var(--c-surface3); }
.inj-chip[data-stato="fatto"] {
  background: rgba(29,131,72,.10); border-color: rgba(29,131,72,.3); color: var(--c-green);
}
.inj-chip[data-stato="skip"] { color: var(--c-placeholder); text-decoration: line-through; }
.chip-icon  { font-size: 11px; }
.chip-stato { font-size: 9px; font-weight: var(--fw-semi); letter-spacing: .04em; text-transform: uppercase; }
.chip-label { }
.inj-chip[data-stato="fatto"] .chip-stato { color: var(--c-green); }
/* Distretto muscolare */
.inj-distretto-row { display: flex; align-items: center; gap: 6px; margin-top: 5px; }
.inj-distretto-lbl { font-size: 10px; color: var(--c-label); font-weight: var(--fw-semi); text-transform: uppercase; letter-spacing: .04em; }
.inj-distretto-sel {
  font-size: var(--f-xs); border: 1px solid var(--c-border);
  border-radius: 6px; padding: 3px 7px;
  background: var(--c-surface2); color: var(--c-text); outline: none;
}

/* ── ALLENAMENTO ────────────────────────────────── */
.wo-box {
  background: var(--c-surface2);
  border-radius: var(--r-el);
  padding: 10px 12px; margin-top: 8px;
}
.wo-header { font-size: var(--f-base); font-weight: var(--fw-semi); margin-bottom: 6px; }
.rest-banner {
  background: var(--c-surface2); border-radius: var(--r-el);
  padding: 12px; text-align: center; color: var(--c-label);
  font-size: var(--f-sm); margin-top: 8px;
}

/* Motra */
.motra-wrap { }
.fg { margin-bottom: 8px; }
.fg label { display: block; font-size: 10px; color: var(--c-label); font-weight: var(--fw-semi); margin-bottom: 3px; letter-spacing: .02em; }
.fg input, .fg select, .fg textarea {
  width: 100%; font-size: var(--f-sm);
  border: 1px solid var(--c-border); border-radius: var(--r-el);
  background: var(--c-surface2); color: var(--c-text);
  padding: 7px 10px; outline: none; font-family: inherit;
  transition: border-color .12s;
}
.fg input:focus, .fg select:focus, .fg textarea:focus {
  border-color: var(--c-blue); background: var(--c-surface);
}
.motra-import-btn {
  font-size: var(--f-xs); color: var(--c-blue); background: none;
  border: none; cursor: pointer; padding: 3px 0; font-weight: var(--fw-med);
}
.motra-result {
  background: var(--c-surface2); border-radius: var(--r-el);
  padding: 10px 12px; margin-top: 6px;
}
.motra-ex { display: flex; justify-content: space-between; align-items: baseline; padding: 4px 0; border-bottom: 1px solid var(--c-border); }
.motra-ex:last-child { border-bottom: none; }
.motra-ex-name { font-size: var(--f-sm); font-weight: var(--fw-med); }
.motra-ex-sets { font-size: var(--f-xs); color: var(--c-label); }
.motra-totals { display: flex; gap: 16px; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--c-border); }
.motra-tot-val { font-size: var(--f-lg); font-weight: var(--fw-semi); letter-spacing: -.02em; }
.motra-tot-lbl { font-size: 10px; color: var(--c-label); }

/* Sentinel lifts */
.sent-list { }
.sent-ex { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--c-border); }
.sent-ex:last-child { border-bottom: none; }
.sent-name { font-size: var(--f-sm); font-weight: var(--fw-med); flex: 1; }
.sent-input {
  width: 90px; text-align: right; font-size: var(--f-sm);
  border: 1px solid var(--c-border); border-radius: 6px;
  background: var(--c-surface2); padding: 4px 7px; outline: none;
}
.sent-delta { font-size: 10px; font-weight: var(--fw-semi); white-space: nowrap; }
.sent-delta.pos { color: var(--c-green); }
.sent-delta.neg { color: var(--c-red); }
.sent-base { font-size: 10px; color: var(--c-placeholder); }

/* Note / Soggettivo */
.note-ta {
  width: 100%; min-height: 56px; resize: vertical;
  font-size: var(--f-sm); font-family: inherit;
  border: 1px solid var(--c-border); border-radius: var(--r-el);
  background: var(--c-surface2); color: var(--c-text);
  padding: 8px 10px; outline: none; line-height: 1.5;
  transition: border-color .12s;
}
.note-ta:focus { border-color: var(--c-blue); background: var(--c-surface); }
.subj-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; }
.subj-sel {
  width: 100%; font-size: var(--f-sm); text-align: center;
  border: 1px solid var(--c-border); border-radius: var(--r-el);
  background: var(--c-surface2); padding: 7px 4px; outline: none;
}
.subj-lbl { font-size: 10px; color: var(--c-label); text-align: center; margin-top: 3px; }

/* ═══════════════════════════════════════════════
   TAB 2 — DASHBOARD
   ═══════════════════════════════════════════════ */
.dash-grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 20px; }
.dash-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.dash-section { margin-bottom: 28px; }

.kpi-card {
  background: var(--c-surface); border-radius: var(--r-card);
  border: 1px solid var(--c-border); box-shadow: var(--shadow);
  padding: 14px 16px; position: relative; overflow: hidden;
}
.kpi-card-label { font-size: var(--f-xs); color: var(--c-label); font-weight: var(--fw-semi); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 6px; }
.kpi-card-val   { font-size: var(--f-xl); font-weight: var(--fw-bold); letter-spacing: -.03em; line-height: 1; color: var(--c-text); }
.kpi-card-unit  { font-size: var(--f-sm); color: var(--c-label); margin-left: 2px; }
.kpi-card-delta { font-size: var(--f-xs); margin-top: 4px; }
.kpi-card-delta.up   { color: var(--c-green); }
.kpi-card-delta.down { color: var(--c-red); }
.kpi-card-delta.neu  { color: var(--c-label); }
.kpi-card-spark { margin-top: 8px; }

.chart-card {
  background: var(--c-surface); border-radius: var(--r-card);
  border: 1px solid var(--c-border); box-shadow: var(--shadow);
  padding: 16px 18px;
}
.chart-card-title { font-size: var(--f-base); font-weight: var(--fw-semi); margin-bottom: 12px; }
.chart-card-sub   { font-size: var(--f-xs); color: var(--c-label); font-weight: var(--fw-reg); margin-left: 6px; }
.chart-wrap { position: relative; width: 100%; }
canvas.dash-canvas { width: 100%; display: block; }

.legend-row { display: flex; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--c-label); }
.legend-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* Compliance */
.comp-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
.comp-card {
  background: var(--c-surface); border-radius: var(--r-card);
  border: 1px solid var(--c-border); box-shadow: var(--shadow);
  padding: 12px; text-align: center;
}
.comp-ring-wrap { position: relative; width: 60px; height: 60px; margin: 0 auto 8px; }
.comp-ring-wrap canvas { width: 60px; height: 60px; display: block; }
.comp-ring-lbl { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.comp-ring-pct { font-size: var(--f-sm); font-weight: var(--fw-bold); }
.comp-ring-sub { font-size: 9px; color: var(--c-label); }
.comp-card-title { font-size: var(--f-xs); font-weight: var(--fw-semi); color: var(--c-text2); }
.comp-card-sub   { font-size: 10px; color: var(--c-label); margin-top: 2px; }

/* Timeline */
.timeline-bar { display: flex; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 6px; }
.timeline-markers { display: flex; justify-content: space-between; font-size: 9px; color: var(--c-label); }
.milestone-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--c-border); }
.milestone-row:last-child { border-bottom: none; }
.milestone-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.milestone-date { font-size: var(--f-xs); color: var(--c-label); white-space: nowrap; }
.milestone-label { font-size: var(--f-sm); }
.milestone-active .milestone-label { font-weight: var(--fw-semi); color: var(--c-blue); }

/* Bar compact */
.bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.bar-label { font-size: var(--f-xs); color: var(--c-text2); width: 72px; flex-shrink: 0; }
.bar-track { flex: 1; height: 5px; background: var(--c-surface3); border-radius: 3px; overflow: hidden; }
.bar-fill  { height: 100%; border-radius: 3px; transition: width .4s ease; }
.bar-val   { font-size: var(--f-xs); color: var(--c-label); width: 44px; text-align: right; flex-shrink: 0; }

/* ═══════════════════════════════════════════════
   TAB 3 — REFERTI
   ═══════════════════════════════════════════════ */
.referti-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.ref-tab {
  font-size: var(--f-xs); font-weight: var(--fw-med);
  padding: 6px 14px; border-radius: var(--r-pill);
  border: 1px solid var(--c-border); background: var(--c-surface);
  color: var(--c-text2); cursor: pointer; white-space: nowrap;
  transition: background .12s;
}
.ref-tab:hover { background: var(--c-surface2); }
.ref-tab.active { background: var(--c-blue); color: #fff; border-color: var(--c-blue); }
.ref-panel { display: none; }
.ref-panel.active { display: block; }

/* Lab values */
.lab-section { margin-bottom: 20px; }
.lab-section-title {
  font-size: var(--f-xs); font-weight: var(--fw-semi);
  color: var(--c-label); letter-spacing: .06em; text-transform: uppercase;
  margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--c-border);
}
.lab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 6px; }
.lab-item {
  background: var(--c-surface2); border-radius: var(--r-el);
  padding: 10px 12px; position: relative;
}
.lab-item.flag-warn { background: rgba(184,76,0,.08); }
.lab-item.flag-alert { background: rgba(192,57,43,.08); }
.lab-item.flag-ok    { background: rgba(29,131,72,.08); }
.lab-name  { font-size: var(--f-xs); color: var(--c-label); margin-bottom: 3px; }
.lab-val   { font-size: var(--f-md); font-weight: var(--fw-semi); letter-spacing: -.02em; }
.lab-val.ok    { color: var(--c-green); }
.lab-val.warn  { color: var(--c-orange); }
.lab-val.alert { color: var(--c-red); }
.lab-ref   { font-size: 10px; color: var(--c-placeholder); margin-top: 2px; }
.lab-note  { font-size: 10px; color: var(--c-label); margin-top: 4px; font-style: italic; }
.lab-delta { font-size: 10px; font-weight: var(--fw-semi); margin-top: 2px; }

/* ═══════════════════════════════════════════════
   TAB 4 — STOCK
   ═══════════════════════════════════════════════ */
.stock-compound {
  background: var(--c-surface); border-radius: var(--r-card);
  border: 1px solid var(--c-border); box-shadow: var(--shadow);
  padding: 16px 18px; margin-bottom: 10px;
}
.stock-hdr { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.stock-emoji { font-size: 22px; }
.stock-name { font-size: var(--f-base); font-weight: var(--fw-semi); }
.stock-dose { font-size: var(--f-xs); color: var(--c-label); margin-top: 1px; }
.stock-progress-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.stock-track { flex: 1; height: 6px; background: var(--c-surface3); border-radius: 3px; overflow: hidden; }
.stock-fill  { height: 100%; border-radius: 3px; transition: width .4s; }
.stock-pct   { font-size: var(--f-xs); color: var(--c-label); width: 36px; text-align: right; }
.stock-vials { display: flex; gap: 6px; flex-wrap: wrap; }
.stock-vial {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 10px; border-radius: 20px;
  background: var(--c-surface2); border: 1px solid var(--c-border);
  font-size: var(--f-xs);
}
.vial-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.vial-ok      { background: var(--c-green); }
.vial-partial { background: var(--c-orange); }
.vial-empty   { background: var(--c-placeholder); }

/* Siringhe */
.syringes-card {
  background: var(--c-surface); border-radius: var(--r-card);
  border: 1px solid var(--c-border); box-shadow: var(--shadow);
  padding: 16px 18px; margin-bottom: 20px;
  display: flex; align-items: center; gap: 16px;
}
.syringes-val { font-size: var(--f-2xl); font-weight: var(--fw-bold); letter-spacing: -.03em; }
.syringes-info .s-lbl  { font-size: var(--f-sm); color: var(--c-label); }
.syringes-info .s-note { font-size: var(--f-xs); color: var(--c-label); margin-top: 3px; }
.syringes-bar { flex: 1; }

/* ═══════════════════════════════════════════════
   SAVE BAR
   ═══════════════════════════════════════════════ */
#save-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;
  background: rgba(255,255,255,.95);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--c-border);
  padding: 10px var(--pad-h);
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
#last-saved { font-size: var(--f-xs); color: var(--c-label); }
.save-main-btn {
  font-size: var(--f-base); font-weight: var(--fw-semi);
  padding: 9px 22px; border-radius: var(--r-pill);
  background: var(--c-blue); color: #fff; border: none; cursor: pointer;
  transition: background .12s;
}
.save-main-btn:hover { background: var(--c-blue-dk); }

/* ── LOADING ────────────────────────────────────── */
#loading {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--c-surface);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
}
#loading p { font-size: var(--f-sm); color: var(--c-label); }
.spinner {
  width: 28px; height: 28px;
  border: 3px solid var(--c-border2); border-top-color: var(--c-blue);
  border-radius: 50%; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── RESPONSIVE ─────────────────────────────────── */
@media (max-width: 768px) {
  :root { --pad-h: 14px; }
  .dash-grid-4 { grid-template-columns: 1fr 1fr; }
  .dash-grid-2 { grid-template-columns: 1fr; }
  .day-body-cols { grid-template-columns: 1fr; }
  .day-col + .day-col { border-left: none; border-top: 1px solid var(--c-border); }
  .proto-slots { grid-template-columns: 1fr; }
  .bio-grid { grid-template-columns: repeat(3,1fr); }
  .subj-row { grid-template-columns: repeat(2,1fr); }
  .wu-toggle-sub { display: none; }
  #app-header .h-sub { display: none; }
}
@media (max-width: 480px) {
  .dash-grid-4 { grid-template-columns: 1fr; }
  .comp-grid { grid-template-columns: repeat(3,1fr); }
  .bio-grid { grid-template-columns: repeat(3,1fr); }
  .ks-lbl { display: none; }
}
@media (min-width: 1024px) {
  :root { --pad-h: 40px; --max-w: 1200px; }
}

function getWorkout(dayIdx, baseDate) {
  const d = new Date(baseDate); d.setDate(d.getDate()+dayIdx);
  const dow = d.getDay();
  return SPLIT[dow] || SPLIT[1];
}

function getPhaseV2(dayIdx) {
  const wk = Math.floor(dayIdx/7)+1;
  if (wk<=4)  return {label:'WK1–4 · Fragment+Tesa+Ipa+BPC+TB', badge:'ph-1', color:'#1a5a8a'};
  if (wk<=8)  return {label:'WK5–8 · + IGF-1 DES · Bangkok',    badge:'ph-2', color:'#6d4c9e'};
  if (wk<=12) return {label:'WK9–12 · + IGF-1 DES',             badge:'ph-3', color:'#1d7040'};
  return             {label:'WK13–16 · fase finale',             badge:'ph-4', color:'#8a4a00'};
}

function getWeekRangeV2(wkIdx) {
  const s = new Date(START_V2); s.setDate(s.getDate()+wkIdx*7);
  const e = new Date(s); e.setDate(e.getDate()+6);
  const fmt = d => d.toLocaleDateString('it-IT',{day:'numeric',month:'short'});
  return fmt(s)+' – '+fmt(e);
}

function getInjSlotsV2(dayIdx) {
  const wo = getWorkout(dayIdx, START_V2);
  const isWO = wo.type !== 'Riposo';
  const slots = [

      drugs:['IGF-1 DES 50mcg IM bilat'], hasMuscle:true});
  }
  return slots;
}

function isBKK(dayIdx) {

  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab===tab));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');

  const isD = tab==='diary';
  document.getElementById('week-nav').style.display = isD ? '' : 'none';
  document.getElementById('kpi-strip').style.display = isD ? '' : 'none';

  if (tab==='dashboard' && !_dashBuilt) { _dashBuilt=true; buildDashboard(); }
  if (tab==='referti'   && !_refBuilt)  { _refBuilt=true;  buildReferti();  }
  if (tab==='stock'     && !_stockBuilt){ _stockBuilt=true; buildStock();    }

  if (isD) updateKpiStrip();

              ${bioBuild(id,'hrv','HRV ms','number')}
              ${bioBuild(id,'rhr','RHR','number')}

    div.innerHTML=`<div class="cycle-card"><div class="cycle-info"><h3>Protocollo v2 · Ciclo 1</h3><p>Inizio tra <strong>${days} giorni</strong> · 29 giu 2026</p><div class="cycle-next">Preparazione in corso →</div></div></div>`;
    return div;
  }
  const pct=Math.min(100,Math.round((elapsed/DAYS_V2)*100));
  const wk=Math.floor(elapsed/7)+1;
  const ph=getPhaseV2(elapsed);
  const C=2*Math.PI*28;
  const off=C*(1-pct/100);
  div.innerHTML=`<div class="cycle-card">
    <div class="cycle-ring">
      <svg width="68" height="68" viewBox="0 0 68 68">
        <circle cx="34" cy="34" r="28" fill="none" stroke="var(--c-surface3)" stroke-width="5"/>
        <circle cx="34" cy="34" r="28" fill="none" stroke="${ph.color}" stroke-width="5"
          stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"
          stroke-linecap="round" transform="rotate(-90 34 34)"/>
      </svg>

    <div class="cycle-info">

  </div>`;
  return div;
}

// ── Week summary v2 ──────────────────────────────────────────
function buildWeekSummaryV2(wkIdx, elapsed) {
  const div=document.createElement('div');
  const wkStart=wkIdx*7, wkEnd=Math.min(wkStart+7,elapsed+1);
  let pesoS=0,pesoN=0,hrvS=0,hrvN=0,injD=0,injT=0,woD=0,woT=0;
  for (let i=wkStart;i<wkEnd;i++) {
    const rec=(_lastData2||{})['v2_'+i]||(_lastData2||{})['p2_day_'+i]||{};
    if(rec.peso){pesoS+=parseFloat(rec.peso)||0;pesoN++;}
    if(rec.hrv) {hrvS +=parseFloat(rec.hrv )||0;hrvN++;}
    const wo=getWorkout(i,START_V2);
    const slots=getInjSlotsV2(i);
    slots.forEach(s=>s.drugs.forEach(d=>{
      injT++;
      const fKey='inj_'+s.n+'_'+d.replace(/[\s\-]/g,'_');
      if((rec[fKey]||'')==='fatto') injD++;
    }));
    if(wo.type!=='Riposo'){woT++;if((rec.motra_raw||'').trim().length>20)woD++;}
  }
  div.className='wk-summary';
  div.innerHTML=`
    <div class="ws-item"><div class="ws-val">${pesoN?(pesoS/pesoN).toFixed(1):'—'}</div><div class="ws-lbl">Peso medio kg</div></div>
    <div class="ws-item"><div class="ws-val">${hrvN?Math.round(hrvS/hrvN):'—'}</div><div class="ws-lbl">HRV medio ms</div></div>
    <div class="ws-item"><div class="ws-val" style="color:${injT&&injD===injT?'var(--c-green)':injD?'var(--c-orange)':'var(--c-text)'}">${injD}/${injT}</div><div class="ws-lbl">Iniezioni</div></div>
    <div class="ws-item"><div class="ws-val">${woD}/${woT}</div><div class="ws-lbl">Workout</div></div>`;
  return div;
}

// ── Injection slot/chips ─────────────────────────────────────
function buildInjSlot(slot, id) {
  const icons={mattino:'☀',pomeriggio:'◑',postWO:'◉',sera:'☾'};
  const hdr=`<div class="inj-slot-hdr">
    <span class="slot-icon ${slot.icon}" style="width:18px;height:18px;font-size:10px">${icons[slot.icon]}</span>
    <span class="inj-slot-label">${slot.label}</span>
    <span class="inj-slot-timing">${slot.timing}</span>
  </div>`;
  const chips=slot.drugs.map(drug=>{
    const fKey='inj_'+slot.n+'_'+drug.replace(/[\s\-\/]/g,'_');
    return `<span class="inj-chip" data-stato="" data-id="${id}" data-f="${fKey}" onclick="cycleChip(this)">
      <span class="chip-icon">○</span><span class="chip-label">${drug}</span><span class="chip-stato"></span>
    </span>`;
  }).join('');
  let muscle='';
  if(slot.hasMuscle){
    const ms=['Petto','Bicipiti','Deltoidi','Tricipiti','Quadricipiti'];
    muscle=`<div class="inj-distretto-row">
      <span class="inj-distretto-lbl">Distretto:</span>
      <select class="inj-distretto-sel" data-id="${id}" data-f="inj_${slot.n}_distretto">
        ${ms.map(m=>`<option>${m}</option>`).join('')}
      </select>
    </div>`;
  }
  return hdr+`<div class="inj-chips">${chips}</div>`+muscle;
}

function cycleChip(chip) {
  const stati=['','fatto','skip'];
  const next=stati[(stati.indexOf(chip.dataset.stato||'')+1)%3];
  chip.dataset.stato=next;
  const ic=chip.querySelector('.chip-icon'), st=chip.querySelector('.chip-stato');
  if(next==='fatto'){if(ic)ic.textContent='✓';if(st)st.textContent='fatto';}
  else if(next==='skip'){if(ic)ic.textContent='✗';if(st)st.textContent='skip';}
  else{if(ic)ic.textContent='○';if(st)st.textContent='';}
  // hidden input per collectAll
  const{id,f}=chip.dataset;
  if(id&&f){
    let h=document.querySelector(`input[type="hidden"][data-id="${id}"][data-f="${f}"]`);
    if(!h){h=document.createElement('input');h.type='hidden';h.dataset.id=id;h.dataset.f=f;chip.parentNode.appendChild(h);}
    h.value=next;
  }
}

function buildTimeline(elapsed) {
  // elapsed=0 può significare "non ancora iniziato" o "giorno 0"
  const today=new Date(); today.setHours(0,0,0,0);
  const startV2=new Date(START_V2); startV2.setHours(0,0,0,0);
  const actualElapsed=Math.floor((today-startV2)/86400000);
  const bar=document.getElementById('tl-bar');
  const phases=[
    {len:28,color:'#1a5a8a',label:'WK1–4'},
    {len:28,color:'#6d4c9e',label:'WK5–8 (BKK)'},
    {len:28,color:'#1d7040',label:'WK9–12'},
    {len:28,color:'#8a4a00',label:'WK13–16'},
  ];
  if(bar){
    bar.innerHTML=phases.map((p,i)=>{
      const phStart=i*28;
      const isActive=actualElapsed>=phStart&&actualElapsed<phStart+28;
      const isPast=actualElapsed>=phStart+28;
      const pctInPhase=isActive?Math.round(((actualElapsed-phStart)/28)*100):0;
      const bg=isPast?p.color:isActive?p.color:'var(--c-surface3)';
      const op=isPast?1:isActive?0.85:0.25;
      return `<div style="flex:${p.len};background:${bg};opacity:${op};position:relative" title="${p.label}: ${isPast?'completata':isActive?pctInPhase+'%':'futura'}">`+
        (isActive?`<div style="position:absolute;bottom:0;right:0;top:0;width:${100-pctInPhase}%;background:rgba(255,255,255,.5)"></div>`:'')
        +`</div>`;
    }).join('');
  }
  const mil=document.getElementById('tl-milestones');
  if(mil){
    const milestones=[
      {day:0,  label:'Inizio Ciclo 1 · 29 giu 2026'},
      {day:28, label:'WK5 · Bangkok 7 ago · + IGF-1 DES'},
      {day:39, label:'Bangkok · 7 ago – 21 ago'},
      {day:52, label:'Rientro Milano · 21 ago'},
      {day:56, label:'WK9 · continua con IGF-1 DES'},
      {day:84, label:'WK13 · fase finale'},
      {day:111,label:'Fine ciclo · 18 set · DEXA T1 + panel'},
    ];
    mil.innerHTML=milestones.map(m=>{
      const isPast=elapsed>m.day;
      const isActive=elapsed===m.day;
      return `<div class="milestone-row${isActive?' milestone-active':''}">
        <div class="milestone-dot" style="background:${isPast?'var(--c-green)':isActive?'var(--c-blue)':'var(--c-surface3)'}"></div>
        <div class="milestone-date">${formatDay(m.day)}</div>
        <div class="milestone-label">${m.label}</div>
      </div>`;
    }).join('');
  }
}

function formatDay(dayIdx) {
  const d=new Date(START_V2); d.setDate(d.getDate()+dayIdx);
  return d.toLocaleDateString('it-IT',{day:'numeric',month:'short'});
}

function getChartData(field, days) {
  const today=new Date(); today.setHours(0,0,0,0);
  const start1=new Date(START_WU); start1.setHours(0,0,0,0);
  const start2=new Date(START_V2); start2.setHours(0,0,0,0);
  const all=[];
  for(let offset=days-1;offset>=0;offset--){
    const d=new Date(today); d.setDate(d.getDate()-offset); d.setHours(0,0,0,0);
    let v=null;
    if(d>=start2){
      const i=Math.floor((d-start2)/86400000);
      if(i>=0&&i<DAYS_V2){const r=(_lastData2||{})['v2_'+i]||(_lastData2||{})['p2_day_'+i];if(r&&r[field]!==undefined&&r[field]!==''){const n=parseFloat(r[field]);if(!isNaN(n))v=n;}}
    } else if(d>=start1&&d<start2){
      const i=Math.floor((d-start1)/86400000);
      if(i>=0&&i<DAYS_WU){const r=(_lastData||{})['day_'+i];if(r&&r[field]!==undefined&&r[field]!==''){const n=parseFloat(r[field]);if(!isNaN(n))v=n;}}
    }
    all.push({d,v});
  }
  let first=0; for(let i=0;i<all.length;i++){if(all[i].v!==null){first=i;break;}}
  return all.slice(first);
}

function getSessionData(days) {
  const today=new Date(); today.setHours(0,0,0,0);
  const start2=new Date(START_V2); start2.setHours(0,0,0,0);
  const results=[];
  for(let offset=days-1;offset>=0;offset--){
    const d=new Date(today); d.setDate(d.getDate()-offset); d.setHours(0,0,0,0);
    if(d<start2) continue;
    const i=Math.floor((d-start2)/86400000);
    if(i<0||i>=DAYS_V2) continue;
    const rec=(_lastData2||{})['v2_'+i]||(_lastData2||{})['p2_day_'+i]||{};
    const motra=rec.motra_raw||'';
    if(!motra.trim()) continue;
    const wo=getWorkout(i,START_V2);
    const parsed=parseMotraText(motra);
    const vol=parsed?parsed.volume:0;
    const rpe=parseFloat(rec.rpe)||0;
    const colors={Push:'#c0392b',Pull:'#1d8348',Legs:'#b84c00','Upper Sab':'#6d4c9e','Upper Dom':'#1a5a8a'};
    const ds=d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'}).replace('/','');
    results.push({d,vol,rpe,dateStr:ds,color:colors[wo.type]||'#aeaeb2',type:wo.type});
  }
  return results;
}

function calcCompliance() {
  const today=new Date(); today.setHours(0,0,0,0);
  const start=new Date(START_V2); start.setHours(0,0,0,0);
  const elapsed=Math.floor((today-start)/86400000);
  if(elapsed<0){['inj','wo','stack'].forEach(k=>{const e=document.getElementById('crp-'+k);if(e)e.textContent='—';});return;}
  let injD=0,injT=0,woD=0,woT=0,stD=0,stT=0;
  for(let i=0;i<=Math.min(elapsed,DAYS_V2-1);i++){
    const rec=(_lastData2||{})['v2_'+i]||(_lastData2||{})['p2_day_'+i]||{};
    const slots=getInjSlotsV2(i);
    slots.forEach(s=>s.drugs.forEach(d=>{
      injT++;
      const fKey='inj_'+s.n+'_'+d.replace(/[\s\-\/]/g,'_');
      if((rec[fKey]||'')==='fatto')injD++;
    }));
    const wo=getWorkout(i,START_V2);
    if(wo.type!=='Riposo'){woT++;if((rec.motra_raw||'').trim().length>20)woD++;}
    stT++;
    if(rec.stack_ok==='1')stD++;
  }
  const setPct=(id,done,tot)=>{
    const pct=tot?Math.round((done/tot)*100):0;
    const pe=document.getElementById('crp-'+id), se=document.getElementById('crs-'+id);
    if(pe)pe.textContent=pct; if(se)se.textContent=done+'/'+tot;
    drawRing(id,pct,id==='wo'?'#1a5a8a':id==='inj'?'#1d7040':'#b84c00');
  };
  setPct('inj',injD,injT); setPct('wo',woD,woT); setPct('stack',stD,stT);
}

function drawRing(id,pct,color) {
  const canvas=document.getElementById('cr-'+id);
  if(!canvas) return;
  canvas.width=60; canvas.height=60;
  const ctx=canvas.getContext('2d');
  const C=2*Math.PI*22;
  ctx.clearRect(0,0,60,60);
  ctx.beginPath(); ctx.arc(30,30,22,0,Math.PI*2); ctx.strokeStyle='var(--c-surface3)'; ctx.lineWidth=5; ctx.stroke();
  ctx.beginPath(); ctx.arc(30,30,22,-Math.PI/2,-Math.PI/2+C*(pct/100),false);
  ctx.strokeStyle=color; ctx.lineWidth=5; ctx.lineCap='round'; ctx.stroke();
}

// ── Canvas helpers ───────────────────────────────────────────
function drawLineChart(id,data,color,opts={}) {
  const canvas=document.getElementById(id); if(!canvas) return;
  const W=canvas.parentElement.offsetWidth||300;
  const H=opts.h||120;
  const dpr=window.devicePixelRatio||1;
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
  const vals=data.filter(p=>p.v!==null).map(p=>p.v);
  if(vals.length<2){ctx.font='11px -apple-system';ctx.fillStyle='var(--c-placeholder)';ctx.textAlign='center';ctx.fillText('Dati insufficienti',W/2,H/2);return;}
  const mn=Math.min(...vals)*.98, mx=Math.max(...vals)*1.02, rng=mx-mn||1;
  const n=data.length;
  const pts=data.map((p,i)=>p.v!==null?{x:n>1?i/(n-1)*(W-20)+10:W/2,y:H-((p.v-mn)/rng)*(H-20)-10,v:p.v}:null);
  // Fill
  ctx.beginPath(); let st=false;
  pts.forEach(p=>{if(!p)return;if(!st){ctx.moveTo(p.x,p.y);st=true;}else ctx.lineTo(p.x,p.y);});
  const fp=pts.find(Boolean), lp=[...pts].reverse().find(Boolean);
  if(fp&&lp){ctx.lineTo(lp.x,H);ctx.lineTo(fp.x,H);ctx.closePath();
    const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,color+'30');g.addColorStop(1,color+'00');
    ctx.fillStyle=g;ctx.fill();}
  // Line
  ctx.beginPath(); st=false;
  pts.forEach(p=>{if(!p)return;if(!st){ctx.moveTo(p.x,p.y);st=true;}else ctx.lineTo(p.x,p.y);});
  ctx.strokeStyle=color; ctx.lineWidth=2; ctx.lineJoin='round'; ctx.lineCap='round'; ctx.stroke();
  // Dots (solo ultimi)
  pts.filter(Boolean).forEach((p,i,a)=>{
    if(i<a.length-3) return;
    ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2);
    ctx.fillStyle=color; ctx.fill();
    ctx.font='10px -apple-system'; ctx.fillStyle='var(--c-label)'; ctx.textAlign='center';
    ctx.fillText(p.v,p.x,p.y-7);
  });
}

function drawMultiLine(id,datasets,opts={}) {
  const canvas=document.getElementById(id); if(!canvas) return;
  const W=canvas.parentElement.offsetWidth||300;
  const H=opts.h||120;
  const dpr=window.devicePixelRatio||1;
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
  const allVals=datasets.flatMap(ds=>ds.data.filter(p=>p.v!==null).map(p=>p.v));
  if(allVals.length<2){ctx.font='11px -apple-system';ctx.fillStyle='var(--c-placeholder)';ctx.textAlign='center';ctx.fillText('Dati insufficienti',W/2,H/2);return;}
  const mn=Math.min(...allVals)*.95, mx=Math.max(...allVals)*1.05, rng=mx-mn||1;
  datasets.forEach(ds=>{
    const n=ds.data.length;
    const pts=ds.data.map((p,i)=>p.v!==null?{x:n>1?i/(n-1)*(W-20)+10:W/2,y:H-((p.v-mn)/rng)*(H-20)-10,v:p.v}:null);
    ctx.beginPath(); let st=false;
    pts.forEach(p=>{if(!p)return;if(!st){ctx.moveTo(p.x,p.y);st=true;}else ctx.lineTo(p.x,p.y);});
    ctx.strokeStyle=ds.color; ctx.lineWidth=2; ctx.lineJoin='round'; ctx.stroke();
  });
}

function drawBarCanvas(id,bars,opts={}) {
  const canvas=document.getElementById(id); if(!canvas||!bars.length) return;
  const W=canvas.parentElement.offsetWidth||300;
  const H=opts.h||120;
  const dpr=window.devicePixelRatio||1;
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
  const vals=bars.map(b=>b.v).filter(v=>v>0);
  if(!vals.length) return;
  const mx=opts.max||Math.max(...vals)*1.1||1;
  const gap=4, bw=(W-gap*(bars.length+1))/bars.length;
  bars.forEach((b,i)=>{
    const x=gap+i*(bw+gap), h=Math.max(2,((b.v||0)/mx)*(H-24));
    ctx.fillStyle=b.c||'#1a5a8a';
    ctx.beginPath(); ctx.roundRect(x,H-h-14,bw,h,3); ctx.fill();
    if(b.v){ctx.font='9px -apple-system';ctx.fillStyle='#fff';ctx.textAlign='center';
      if(h>16)ctx.fillText(b.v>1000?(b.v/1000).toFixed(1)+'t':b.v,x+bw/2,H-h-14+h/2+4);}
    ctx.font='9px -apple-system'; ctx.fillStyle='var(--c-placeholder)'; ctx.textAlign='center';
    ctx.fillText(b.l,x+bw/2,H-2);
  });
}

function drawSparkCanvas(id,data,color) {
  const canvas=document.getElementById(id); if(!canvas) return;
  const W=canvas.parentElement.offsetWidth||100, H=40;
  const dpr=window.devicePixelRatio||1;
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
  const vals=data.filter(p=>p.v!==null);
  if(vals.length<2) return;
  const n=vals.length, mn=Math.min(...vals.map(p=>p.v)), mx=Math.max(...vals.map(p=>p.v)), rng=mx-mn||1;
  ctx.beginPath();
  vals.forEach((p,i)=>{
    const x=i/(n-1)*(W-4)+2, y=H-((p.v-mn)/rng)*(H-4)-2;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.lineJoin='round'; ctx.stroke();
}

function setSyncStatus(s) {
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-label');
  if(dot){dot.className='sync-dot'+(s==='ok'?' ok':s==='err'?' err':'');}
  if(lbl){lbl.textContent=s==='ok'?'Sincronizzato':s==='err'?'Offline':'—';}
}

function collectAll() {
  const data={};
  document.querySelectorAll('[data-id][data-f]').forEach(el=>{
    const id=el.dataset.id, f=el.dataset.f;
    if(!id||!f) return;
    if(!data[id]) data[id]={};
    if(el.type==='hidden'&&!el.value) return;
    if(el.value==='skip'||el.value==='') return;
    if(el.type==='checkbox'){data[id][f]=el.checked?'1':'';return;}
    data[id][f]=el.value;
  });
  return data;
}

function applyAll(data, prefix) {
  Object.entries(data).forEach(([id,fields])=>{
    if(prefix){
      // Supporta sia 'day_' (warm-up) che 'v2_' / 'p2_day_' (proto v2)
      const altPrefix = prefix==='v2_' ? 'p2_day_' : (prefix==='p2_day_' ? 'v2_' : null);
      if(!id.startsWith(prefix) && !(altPrefix && id.startsWith(altPrefix))) return;
    }
    Object.entries(fields).forEach(([f,v])=>{
      if(!v) return;
      const el=document.querySelector(`[data-id="${id}"][data-f="${f}"]`);
      if(el){
        if(el.type==='checkbox'){el.checked=(v==='1');return;}
        if(el.tagName==='INPUT'||el.tagName==='SELECT'||el.tagName==='TEXTAREA') el.value=v;
        return;
      }
      // chip
      const chip=document.querySelector(`.inj-chip[data-id="${id}"][data-f="${f}"]`);
      if(chip&&(v==='fatto'||v==='skip')){
        chip.dataset.stato=v;
        const ic=chip.querySelector('.chip-icon'), st=chip.querySelector('.chip-stato');
        if(v==='fatto'){if(ic)ic.textContent='✓';if(st)st.textContent='fatto';}
        else{if(ic)ic.textContent='✗';if(st)st.textContent='skip';}
        let h=document.querySelector(`input[type="hidden"][data-id="${id}"][data-f="${f}"]`);
        if(!h){h=document.createElement('input');h.type='hidden';h.dataset.id=id;h.dataset.f=f;chip.parentNode.appendChild(h);}
        h.value=v;
      }
    });
  });
}

async function loadFromCloud() {
  setSyncStatus('—');
  document.getElementById('last-saved').textContent='Sincronizzazione...';
  try{
    const [r1,r2]=await Promise.all([
      fetch(SB_URL+'/rest/v1/diary?user_id=eq.'+USER_ID+'&select=data,updated_at&limit=1',{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}}),

    ]);

  }
  try{
    await upsert(SB_URL+'/rest/v1/diary',USER_ID,dataWU);
    upsert(SB_URL+'/rest/v1/diary',USER_ID2,dataV2).catch(()=>{});

}

function parseMotraText(text) {
  if(!text||!text.trim()) return null;
  const lines=text.split('\n');
  const exercises=[];
  let volume=0,duration=0;
  const durationMatch=text.match(/(\d+)h\s*(\d+)m|(\d+)\s*min/);
  if(durationMatch){duration=durationMatch[1]?parseInt(durationMatch[1])*60+parseInt(durationMatch[2]):parseInt(durationMatch[3]);}
  const volMatch=text.match(/([\d.]+)\s*t(?:on(?:nellate)?)?[^\w]/i);
  if(volMatch) volume=parseFloat(volMatch[1])*1000;
  for(const line of lines){
    const exMatch=line.match(/^(.+?)\s*[\:\-\|]\s*([\d,]+)\s*serie/i)||line.match(/^•?\s*(.+?)\s*\|\s*(\d+)×/);
    if(exMatch){
      const sets=[];
      const setMatches=[...line.matchAll(/(\d+)\s*×\s*([\d.]+)\s*(kg)?/g)];
      setMatches.forEach(m=>{sets.push({reps:parseInt(m[1]),kg:parseFloat(m[2])});if(!isNaN(m[2]))volume+=parseInt(m[1])*parseFloat(m[2]);});
      exercises.push({name:exMatch[1].trim(),sets});
    }
  }
  return {exercises,volume,duration};
}

function importMotra(id) {
  const ta=document.querySelector(`[data-id="${id}"][data-f="motra_raw"]`);
  const resultDiv=document.getElementById('motra-result-'+id);
  if(!ta||!resultDiv) return;
  const parsed=parseMotraText(ta.value);
  if(!parsed||!parsed.exercises.length){resultDiv.style.display='none';return;}
  resultDiv.style.display='';
  resultDiv.innerHTML=`
    <div class="motra-totals">
      <div><div class="motra-tot-val">${parsed.duration?parsed.duration+'min':'—'}</div><div class="motra-tot-lbl">Durata</div></div>
      <div><div class="motra-tot-val">${parsed.volume>0?(parsed.volume/1000).toFixed(1)+'t':'—'}</div><div class="motra-tot-lbl">Volume</div></div>
      <div><div class="motra-tot-val">${parsed.exercises.length}</div><div class="motra-tot-lbl">Esercizi</div></div>
    </div>
    ${parsed.exercises.map(e=>`<div class="motra-ex">
      <span class="motra-ex-name">${e.name}</span>
      <span class="motra-ex-sets">${e.sets.map(s=>s.reps+'×'+s.kg+'kg').join(', ')}</span>
    </div>`).join('')}`;
  // Salva dati parsed
  if(ta.dataset.id&&ta.dataset.f){
    const hidVol=document.querySelector(`[data-id="${id}"][data-f="motra_vol"]`)||createHidden(id,'motra_vol',ta.parentNode);
    const hidDur=document.querySelector(`[data-id="${id}"][data-f="motra_dur"]`)||createHidden(id,'motra_dur',ta.parentNode);
    hidVol.value=parsed.volume; hidDur.value=parsed.duration;
  }
}
function createHidden(id,f,parent){const h=document.createElement('input');h.type='hidden';h.dataset.id=id;h.dataset.f=f;parent.appendChild(h);return h;}

  // ── SPARKLINE SVG ─────────────────────────────
  function sparkline(pts, w, h, color, refMin, refMax) {
    if (pts.length < 2) {
      // punto singolo — solo dot
      return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
        <circle cx="${w/2}" cy="${h/2}" r="4" fill="${color}"/>
      </svg>`;
    }
    const vals = pts.map(p=>p.v);
    const minV = Math.min(...vals), maxV = Math.max(...vals);
    const pad = 6;
    const range = maxV - minV || 1;
    const toX = (i) => pad + (i / (pts.length-1)) * (w - pad*2);
    const toY = (v) => h - pad - ((v - minV) / range) * (h - pad*2);

    let refBand = '';
    if (refMin !== undefined && refMax !== undefined) {
      const y1 = Math.min(toY(refMin), toY(refMax));
      const y2 = Math.max(toY(refMin), toY(refMax));
      refBand = `<rect x="0" y="${Math.max(0,y1)}" width="${w}" height="${Math.min(h,y2)-Math.max(0,y1)}" fill="rgba(52,199,89,.08)"/>`;
    } else if (refMin !== undefined) {
      const yRef = toY(refMin);
      refBand = `<line x1="0" y1="${yRef}" x2="${w}" y2="${yRef}" stroke="rgba(52,199,89,.4)" stroke-width="1" stroke-dasharray="3,3"/>`;
    }

    const polyPts = pts.map((p,i) => `${toX(i)},${toY(p.v)}`).join(' ');
    // area fill
    const areaBottom = h - pad;
    const areaPts = `${toX(0)},${areaBottom} ${polyPts} ${toX(pts.length-1)},${areaBottom}`;

    const dots = pts.map((p,i) => {
      const ok = (refMin === undefined || p.v >= refMin) && (refMax === undefined || p.v <= refMax);
      const dc = ok ? color : '#ff3b30';
      return `<circle cx="${toX(i)}" cy="${toY(p.v)}" r="3" fill="${dc}" stroke="white" stroke-width="1.5"/>`;
    }).join('');

    const lastVal = pts[pts.length-1].v;
    const prevVal = pts[pts.length-2]?.v;
    const lastX = toX(pts.length-1), lastY = toY(lastVal);

    return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
      ${refBand}
      <polygon points="${areaPts}" fill="${color}" opacity="0.08"/>
      <polyline points="${polyPts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}
    </svg>`;
  }

  // ── BARRA PROGRESSO ──────────────────────────
  function progressBar(current, target, max, color, label) {
    const pct = Math.min(100, (current/target)*100).toFixed(0);
    const warn = current < target;
    const barColor = warn ? '#ff9500' : color;
    return `<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px">
        <span style="font-weight:500">${label}</span>
        <span style="color:${warn?'#ff9500':'#34c759'};font-weight:600">${current} <span style="color:var(--muted);font-weight:400">/ target ${target}</span></span>
      </div>
      <div style="background:var(--border);border-radius:4px;height:6px;overflow:hidden">
        <div style="background:${barColor};height:6px;width:${pct}%;border-radius:4px;transition:width .5s ease"></div>
      </div>
    </div>`;
  }

  // ── KPI CARD ─────────────────────────────────
  function kpiCard(label, pts, unit, refMin, refMax, targetLabel, color) {
    const last = pts[pts.length-1];
    const prev = pts[pts.length-2];
    const delta = prev ? (last.v - prev.v) : null;
    const isOk = (refMin === undefined || last.v >= refMin) && (refMax === undefined || last.v <= refMax);
    const valColor = isOk ? '#34c759' : (Math.abs(last.v - (refMin||refMax)) < (refMin||refMax)*0.15 ? '#ff9500' : '#ff3b30');
    const arrow = delta === null ? '' : delta > 0 ? '↑' : delta < 0 ? '↓' : '→';
    const arrowColor = delta === null ? '' :
      (refMin && delta > 0) || (refMax && delta < 0) ? '#34c759' : '#ff3b30';
    const spark = sparkline(pts, 120, 50, color, refMin, refMax);
    return `<div style="background:var(--surface);border-radius:12px;padding:16px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:6px">
      <div class="t-section-title" style="margin-bottom:6px">${label}</div>
      <div style="display:flex;align-items:flex-end;justify-content:space-between">
        <div>
          <span style="font-size:var(--fs-2xl);font-weight:var(--fw-semi);letter-spacing:-.03em;color:${valColor}">${last.v}</span>
          <span style="font-size:12px;color:var(--muted);margin-left:3px">${unit}</span>
          ${delta !== null ? `<span style="font-size:13px;font-weight:600;color:${arrowColor};margin-left:6px">${arrow}${Math.abs(delta).toFixed(delta%1===0?0:1)}</span>` : ''}
        </div>
        <div>${spark}</div>
      </div>
      <div style="font-size:var(--fs-xs);color:var(--muted)">${targetLabel} · ultimo: <span style="font-weight:500">${last.d}</span></div>
    </div>`;
  }

  // ── CHART A LINEE MULTI-SERIE ─────────────────
  function lineChart(series, w, h) {
    // series: [{label, pts:[{d,v}], color, refMin, refMax}]
    const allVals = series.flatMap(s=>s.pts.map(p=>p.v));
    const allDates = [...new Set(series.flatMap(s=>s.pts.map(p=>p.t)))].sort();
    const minV = Math.min(...allVals)*0.9, maxV = Math.max(...allVals)*1.1;
    const pad = {t:10,r:10,b:28,l:36};
    const iW = w-pad.l-pad.r, iH = h-pad.t-pad.b;
    const toX = (t) => pad.l + (allDates.indexOf(t)/Math.max(allDates.length-1,1))*iW;
    const toY = (v) => pad.t + iH - ((v-minV)/(maxV-minV||1))*iH;

    // grid lines
    const nGrid = 4;
    let gridLines = '', gridLabels = '';
    for (let i=0;i<=nGrid;i++) {
      const y = pad.t + (i/nGrid)*iH;
      const v = (maxV - (maxV-minV)*(i/nGrid)).toFixed(0);
      gridLines += `<line x1="${pad.l}" y1="${y}" x2="${w-pad.r}" y2="${y}" stroke="var(--border)" stroke-width="1"/>`;
      gridLabels += `<text x="${pad.l-4}" y="${y+4}" text-anchor="end" font-size="9" fill="var(--muted)">${v}</text>`;
    }

    // x labels (solo primo e ultimo e qualche intermedio)
    let xLabels = '';
    const showIdx = [0, Math.floor(allDates.length/2), allDates.length-1].filter((v,i,a)=>a.indexOf(v)===i);
    // ricavo label leggibile dalle date
    const dateLookup = {};
    series.forEach(s=>s.pts.forEach(p=>{ dateLookup[p.t]=p.d; }));
    showIdx.forEach(i => {
      const t = allDates[i];
      const x = toX(t);
      const lbl = (dateLookup[t]||t).replace(' 2026','').replace(' 20','\'');
      xLabels += `<text x="${x}" y="${h-4}" text-anchor="middle" font-size="9" fill="var(--muted)">${lbl}</text>`;
    });

    // ref band (prima serie)
    let refBands = '';
    series.forEach(s => {
      if (s.refMin !== undefined) {
        const yRef = toY(s.refMin);
        refBands += `<line x1="${pad.l}" y1="${yRef}" x2="${w-pad.r}" y2="${yRef}" stroke="${s.color}" stroke-width="1" stroke-dasharray="4,3" opacity=".4"/>`;
      }
    });

    // linee e dots
    let lines = '', dots = '';
    series.forEach(s => {
      const validPts = s.pts.filter(p=>allDates.includes(p.t));
      if (validPts.length < 1) return;
      const polyPts = validPts.map(p=>`${toX(p.t)},${toY(p.v)}`).join(' ');
      lines += `<polyline points="${polyPts}" fill="none" stroke="${s.color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
      validPts.forEach(p => {
        const ok = (s.refMin===undefined||p.v>=s.refMin)&&(s.refMax===undefined||p.v<=s.refMax);
        dots += `<circle cx="${toX(p.t)}" cy="${toY(p.v)}" r="3.5" fill="${ok?s.color:'#ff3b30'}" stroke="white" stroke-width="1.5"/>`;
      });
      // label ultimo valore
      const lastP = validPts[validPts.length-1];
      lines += `<text x="${toX(lastP.t)+7}" y="${toY(lastP.v)+4}" font-size="10" fill="${s.color}" font-weight="600">${lastP.v}</text>`;
    });

    return `<svg width="100%" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet" style="overflow:visible">
      ${gridLines}${gridLabels}${xLabels}${refBands}${lines}${dots}
    </svg>`;
  }

  // ══════════════════════════════════════════════
  //  RENDER
  // ══════════════════════════════════════════════
  let html = `<div class="app-view-inner view-wrap">

function statoColor(s) {
    if (s === 'intatto') return { bg:'rgba(52,199,89,.12)', color:'#1d7a3a', label:'Intatto' };
    if (s === 'in_uso')  return { bg:'rgba(0,113,227,.12)', color:'#0071e3', label:'In uso' };

    return { bg:'#f5f5f7', color:'#666', label:s };
  }

function sparkline(pts, w, h, color, refMin, refMax) {
    if (pts.length < 2) {
      // punto singolo — solo dot
      return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
        <circle cx="${w/2}" cy="${h/2}" r="4" fill="${color}"/>
      </svg>`;
    }
    const vals = pts.map(p=>p.v);
    const minV = Math.min(...vals), maxV = Math.max(...vals);
    const pad = 6;
    const range = maxV - minV || 1;
    const toX = (i) => pad + (i / (pts.length-1)) * (w - pad*2);
    const toY = (v) => h - pad - ((v - minV) / range) * (h - pad*2);

    let refBand = '';
    if (refMin !== undefined && refMax !== undefined) {
      const y1 = Math.min(toY(refMin), toY(refMax));
      const y2 = Math.max(toY(refMin), toY(refMax));
      refBand = `<rect x="0" y="${Math.max(0,y1)}" width="${w}" height="${Math.min(h,y2)-Math.max(0,y1)}" fill="rgba(52,199,89,.08)"/>`;
    } else if (refMin !== undefined) {
      const yRef = toY(refMin);
      refBand = `<line x1="0" y1="${yRef}" x2="${w}" y2="${yRef}" stroke="rgba(52,199,89,.4)" stroke-width="1" stroke-dasharray="3,3"/>`;
    }

    const polyPts = pts.map((p,i) => `${toX(i)},${toY(p.v)}`).join(' ');
    // area fill
    const areaBottom = h - pad;
    const areaPts = `${toX(0)},${areaBottom} ${polyPts} ${toX(pts.length-1)},${areaBottom}`;

    const dots = pts.map((p,i) => {
      const ok = (refMin === undefined || p.v >= refMin) && (refMax === undefined || p.v <= refMax);
      const dc = ok ? color : '#ff3b30';
      return `<circle cx="${toX(i)}" cy="${toY(p.v)}" r="3" fill="${dc}" stroke="white" stroke-width="1.5"/>`;
    }).join('');

    const lastVal = pts[pts.length-1].v;
    const prevVal = pts[pts.length-2]?.v;
    const lastX = toX(pts.length-1), lastY = toY(lastVal);

    return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
      ${refBand}
      <polygon points="${areaPts}" fill="${color}" opacity="0.08"/>
      <polyline points="${polyPts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}
    </svg>`;
  }

function progressBar(current, target, max, color, label) {
    const pct = Math.min(100, (current/target)*100).toFixed(0);
    const warn = current < target;
    const barColor = warn ? '#ff9500' : color;
    return `<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px">
        <span style="font-weight:500">${label}</span>
        <span style="color:${warn?'#ff9500':'#34c759'};font-weight:600">${current} <span style="color:var(--muted);font-weight:400">/ target ${target}</span></span>

      <div style="background:var(--border);border-radius:4px;height:6px;overflow:hidden">
        <div style="background:${barColor};height:6px;width:${pct}%;border-radius:4px;transition:width .5s ease"></div>
      </div>
    </div>`;
  }
