<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Diario Protocollo · 16 Settimane</title>
<style>
/* Apple-style design system */
:root {
  --bg: #f5f5f7;
  --surface: #ffffff;
  --surface2: #f5f5f7;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text: #1d1d1f;
  --text2: #424245;
  --muted: #6e6e73;
  --faint: #aeaeb2;
  --blue: #0071e3;
  --blue-hover: #0077ed;
  --blue-light: #e8f1fb;
  --red: #ff3b30;
  --green: #34c759;
  --orange: #ff9500;
  --purple: #af52de;
  --teal: #5ac8fa;
  --push: #ff3b30;
  --pull: #34c759;
  --legs: #ff9500;
  --upper: #af52de;
  --rest: #aeaeb2;
  --radius: 18px;
  --radius-sm: 12px;
  --radius-xs: 8px;
  --shadow: 0 2px 12px rgba(0,0,0,0.07);
  --shadow-md: 0 4px 24px rgba(0,0,0,0.10);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.5;
  min-height: 100vh;
}

/* Header — Apple nav bar style */
.header {
  background: rgba(255,255,255,0.85);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  position: sticky;
  top: 0;
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 52px;
}
.h-left h1 {
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.02em;
}
.h-left p {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.01em;
  margin-top: 1px;
}
.h-right { display: flex; align-items: center; gap: 8px; }
.h-btn {
  background: transparent;
  border: none;
  color: var(--blue);
  font-size: 15px;
  font-family: inherit;
  font-weight: 400;
  cursor: pointer;
  padding: 4px 10px;
  border-radius: 6px;
  transition: background .15s;
  white-space: nowrap;
}
.h-btn:hover { background: var(--blue-light); }
.h-btn.primary {
  background: var(--blue);
  color: #fff;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 980px;
  font-size: 13px;
}
.h-btn.primary:hover { background: var(--blue-hover); }
.sync-indicator {
  font-size: 12px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 5px;
}
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--faint); }
.sync-dot.ok { background: var(--green); }
.sync-dot.err { background: var(--red); }

/* Progress bar — thin Apple style */
.prog-wrap { height: 3px; background: transparent; }
.prog-bar { height: 3px; background: var(--blue); transition: width .4s ease; border-radius: 0 2px 2px 0; }

/* Week navigation */
.nav-strip {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  gap: 0;
}
.nav-strip::-webkit-scrollbar { display: none; }
.nav-tab {
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 400;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: color .15s;
  flex-shrink: 0;
  letter-spacing: -0.01em;
}
.nav-tab:hover { color: var(--text); }
.nav-tab.on { color: var(--blue); border-bottom-color: var(--blue); font-weight: 500; }

/* Main container */
.container { max-width: 720px; margin: 0 auto; padding: 28px 20px 120px; }

/* Cycle indicator card */
.cycle-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 22px 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 20px;
}
.cycle-ring { position: relative; width: 72px; height: 72px; flex-shrink: 0; }
.cycle-ring svg { transform: rotate(-90deg); }
.cycle-ring-label {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.cycle-ring-pct { font-size: 16px; font-weight: 600; color: var(--text); letter-spacing: -0.03em; line-height: 1; }
.cycle-ring-sub { font-size: 9px; color: var(--muted); margin-top: 2px; letter-spacing: 0.02em; text-transform: uppercase; }
.cycle-info { flex: 1 }
.cycle-info h3 { font-size: 17px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; margin-bottom: 3px; }
.cycle-info p { font-size: 13px; color: var(--muted); }
.cycle-next {
  margin-top: 8px;
  padding: 8px 12px;
  background: var(--blue-light);
  border-radius: var(--radius-xs);
  font-size: 12px;
  color: var(--blue);
  font-weight: 500;
}

/* Charts card */
.charts-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
}
.charts-card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.01em;
  text-transform: uppercase;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.chart-label { font-size: 11px; color: var(--muted); margin-bottom: 5px; font-weight: 500; letter-spacing: 0.02em; text-transform: uppercase; }
canvas.mini-chart { width: 100%; height: 64px; display: block; }

/* Week header */
.week-hdr {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 28px 0 10px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.week-hdr:first-of-type { margin-top: 0; }
.week-hdr h2 { font-size: 21px; font-weight: 600; letter-spacing: -0.03em; color: var(--text); }
.week-phase {
  font-size: 11px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 980px;
  white-space: nowrap;
}
.week-range { font-size: 12px; color: var(--muted); margin-left: auto; }

/* Day card */
.day-card {
  background: var(--surface);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: box-shadow .2s;
}
.day-card:hover { box-shadow: var(--shadow-md); }
.day-card.today { box-shadow: 0 0 0 2px var(--blue), var(--shadow); }

.day-head {
  display: flex;
  align-items: center;
  padding: 14px 18px;
  cursor: pointer;
  gap: 12px;
  user-select: none;
}
.day-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.day-info { flex: 1 }
.day-name { font-size: 15px; font-weight: 500; color: var(--text); letter-spacing: -0.01em; line-height: 1.2; }
.day-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
.today-badge {
  display: inline-block;
  font-size: 10px;
  background: var(--blue);
  color: #fff;
  border-radius: 980px;
  padding: 1px 7px;
  font-weight: 600;
  margin-left: 6px;
  vertical-align: middle;
  letter-spacing: 0.02em;
}
.day-quick { display: flex; gap: 14px; margin-right: 4px; }
.dq { text-align: center; }
.dq-v { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1; }
.dq-v.empty { color: var(--faint); }
.dq-l { font-size: 10px; color: var(--faint); margin-top: 1px; }
.day-badge {
  font-size: 11px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 980px;
  white-space: nowrap;
}
.day-chev { color: var(--faint); font-size: 11px; transition: transform .2s; flex-shrink: 0; }
.day-card.open .day-chev { transform: rotate(180deg); }

.day-body { display: none; padding: 0 18px 18px; border-top: 1px solid var(--border); }
.day-card.open .day-body { display: block; }

/* Section label */
.section-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin: 18px 0 10px;
}

/* Biometria grid */
.bio-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; }
.bio-box {
  background: var(--surface2);
  border-radius: var(--radius-xs);
  padding: 10px 8px;
  text-align: center;
}
.bio-box input {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  font-family: inherit;
  font-size: 17px;
  font-weight: 500;
  color: var(--text);
  text-align: center;
  letter-spacing: -0.02em;
}
.bio-box input::placeholder { color: var(--faint); font-size: 15px; }
.bio-lbl { font-size: 10px; color: var(--muted); margin-top: 3px; }

/* Field groups */
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
.field-row.tri { grid-template-columns: 1fr 1fr 1fr; }
.field-row.solo { grid-template-columns: 1fr; }
.field-row.two { grid-template-columns: 1fr 1fr; }

.fg {
  background: var(--surface2);
  border-radius: var(--radius-xs);
  padding: 10px 12px;
}
.fg label {
  display: block;
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 5px;
}
.fg input, .fg select, .fg textarea {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  font-size: 14px;
  color: var(--text);
  font-family: inherit;
  resize: none;
}
.fg textarea { height: 52px; line-height: 1.5; }
.fg select { cursor: pointer; }

/* Injection row */
.inj-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-top: 8px; }

/* Workout box */
.wo-box {
  background: var(--surface2);
  border-radius: var(--radius-xs);
  padding: 14px;
  margin-top: 8px;
}
.wo-header {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: -0.01em;
  margin-bottom: 10px;
}
.wo-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.wo-row.two { grid-template-columns: 1fr 1fr; }

/* Sentinel + Exercise log */
.log-table { width: 100%; margin-top: 12px; border-collapse: collapse; }
.log-table th {
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  text-align: center;
  padding: 0 4px 6px;
}
.log-table th:first-child { text-align: left; padding-left: 0; }
.log-table td { padding: 3px 4px; }
.log-table td:first-child { padding-left: 0; }
.log-table .ex-name {
  font-size: 13px;
  color: var(--text2);
  padding: 4px 0;
}
.log-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 6px;
  font-size: 13px;
  font-family: inherit;
  text-align: center;
  color: var(--text);
  outline: none;
  transition: border-color .15s;
}
.log-input:focus { border-color: var(--blue); }
.log-select {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 8px;
  font-size: 12px;
  font-family: inherit;
  color: var(--text);
  outline: none;
  cursor: pointer;
}
.sentinel-baseline {
  font-size: 10px;
  color: var(--faint);
  margin-top: 1px;
}
.log-section-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin: 14px 0 6px;
}

/* Note box */
.note-box {
  background: var(--surface2);
  border-radius: var(--radius-xs);
  padding: 12px 14px;
  margin-top: 8px;
}
.note-box label {
  display: block;
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.note-box textarea {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  font-size: 14px;
  color: var(--text);
  font-family: inherit;
  resize: none;
  line-height: 1.6;
  height: 76px;
}
.note-box textarea::placeholder { color: var(--faint); }

/* Rest banner */
.rest-banner {
  background: var(--surface2);
  border-radius: var(--radius-xs);
  padding: 14px 16px;
  margin-top: 10px;
  text-align: center;
  font-size: 14px;
  color: var(--muted);
}

/* Phase badge colors */
.p1b { background: #e8f1fb; color: #0071e3; }
.p2b { background: #fff5e6; color: #c26000; }
.p3b { background: #e8f8ed; color: #1a7a3a; }
.p4b { background: #feeeec; color: #cc2200; }

/* Workout type badges */
.badge-push  { background: #feeeec; color: #cc2200; }
.badge-pull  { background: #e8f8ed; color: #1a7a3a; }
.badge-legs  { background: #fff5e6; color: #c26000; }
.badge-upper { background: #f5eeff; color: #8522c0; }
.badge-rest  { background: #f5f5f7; color: #aeaeb2; }
.badge-bkk   { background: #e8f1fb; color: #0071e3; }

/* Save bar */
.save-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  z-index: 100;
}
.save-hint { font-size: 12px; color: var(--muted); }
.save-btn-main {
  background: var(--blue);
  color: #fff;
  border: none;
  padding: 10px 24px;
  border-radius: 980px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: -0.01em;
  transition: background .15s, transform .1s;
}
.save-btn-main:hover { background: var(--blue-hover); }
.save-btn-main:active { transform: scale(0.97); }
.save-btn-main:disabled { opacity: .5; cursor: not-allowed; }

/* Loading */
.loading-overlay {
  position: fixed; inset: 0;
  background: rgba(255,255,255,0.9);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 300; gap: 12px;
}
.loading-overlay p { font-size: 14px; color: var(--muted); }
.spinner {
  width: 28px; height: 28px;
  border: 2.5px solid var(--border);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Vita field */
.vita-field { margin-top: 8px; }

/* Mobile */
@media (max-width: 600px) {
  .bio-grid { grid-template-columns: repeat(3,1fr); }
  .inj-row { grid-template-columns: 1fr 1fr; }
  .wo-row { grid-template-columns: 1fr 1fr; }
  .day-quick { display: none; }
  .header { padding: 0 16px; }
  .container { padding: 20px 12px 110px; }
  .nav-strip { padding: 0 16px; }
  .charts-grid { grid-template-columns: 1fr; }
  .cycle-card { flex-direction: column; text-align: center; }
  .field-row.tri { grid-template-columns: 1fr 1fr; }
}

/* Motra import */
.motra-box {
  background: var(--surface2);
  border-radius: var(--radius-xs);
  padding: 14px;
  margin-top: 8px;
}
.motra-box label {
  display: block;
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.motra-textarea {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 13px;
  font-family: inherit;
  color: var(--text);
  resize: none;
  height: 100px;
  line-height: 1.5;
  outline: none;
  transition: border-color .15s;
}
.motra-textarea:focus { border-color: var(--blue); }
.motra-textarea::placeholder { color: var(--faint); }
.motra-import-btn {
  margin-top: 8px;
  background: var(--blue);
  color: #fff;
  border: none;
  padding: 8px 18px;
  border-radius: 980px;
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: background .15s;
}
.motra-import-btn:hover { background: var(--blue-hover); }
.motra-result {
  margin-top: 10px;
  font-size: 12px;
  color: var(--muted);
  display: none;
}
.motra-result.ok { color: var(--green); display: block; }
.motra-result.err { color: var(--red); display: block; }
.motra-parsed {
  margin-top: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  display: none;
}
.motra-parsed.show { display: block; }
.motra-ex-row {
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.motra-ex-row:last-child { border-bottom: none; padding-bottom: 0; }
.motra-ex-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 3px;
}
.motra-ex-sets {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.6;
}
.motra-meta {
  display: flex;
  gap: 16px;
  margin-bottom: 10px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.motra-meta-item { text-align: center; }
.motra-meta-val { font-size: 17px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
.motra-meta-lbl { font-size: 10px; color: var(--muted); margin-top: 1px; }

</style>
</head>

  'Legs':       ['Leg Press','RDL','Hip Thrust Machine','Leg Curl','Leg Extension','Calf Raise','Goblet Squat'],
  'Upper Body': ['BB Bench Press','Incline Press','Cable Row','Lat Pulldown','Military Press','DB Lateral Raise','Curl','Tricep Pushdown'],
  'BKK_FREE':   ['Smith Bench','Smith Incline','Smith Shoulder Press','Smith RDL','Smith Bent Row','DB Curl','DB Shoulder Press','Shotgun Row','Face Pull','Tricep Pushdown','Goblet Squat','Cable Row'],
};

function getPhase(dayIdx) {
  const wk = Math.floor(dayIdx/7)+1;
  if (wk<=4)  return {label:'Tesamorelin 1mg',    badge:'p1b', wk};
  if (wk<=6)  return {label:'Tesamorelin 2mg',    badge:'p2b', wk};
  if (wk<=12) return {label:'Stack completo',     badge:'p3b', wk};
  return             {label:'Stack + BPC-157',    badge:'p4b', wk};
}

function getWeekRange(wkIdx) {
  const s = new Date(START); s.setDate(s.getDate()+wkIdx*7);
  const e = new Date(s); e.setDate(e.getDate()+6);
  const fmt = d => d.toLocaleDateString('it-IT',{day:'2-digit',month:'short'});
  return fmt(s)+' – '+fmt(e);
}

function isBKK(i){ return i>=56&&i<=83; }
function isVitaDay(i){ return i%7===0; }
function formatDate(d){ return d.toLocaleDateString('it-IT',{weekday:'long',day:'2-digit',month:'long'}); }
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }

function getDotColor(type){
  if(type==='Push')return '#ff3b30';
  if(type==='Pull')return '#34c759';
  if(type==='Legs')return '#ff9500';
  if(type.includes('Upper'))return '#af52de';
  if(type==='BKK_FREE')return '#0071e3';
  return '#aeaeb2';
}

function getWorkout(i){
  const d=new Date(START); d.setDate(d.getDate()+i);
  const dow=d.getDay();
  if(isBKK(i)) return {type:'BKK_FREE', badge:'badge-bkk', label:'BKK'};
  if(dow===4) return {type:'Riposo', badge:'badge-rest', label:'RIPOSO'};
  if(dow===0) return {type:'Upper Body', badge:'badge-upper', label:'UPPER'};
  return SPLIT[dow];
}

function getNextEvent(elapsed){
  const wk=Math.floor(elapsed/7)+1;
  if(wk<5){ const d=(4-wk)*7; return `Dose 2mg tra ${d} giorni (settimana 5)`; }
  if(wk<7){ const d=(6-wk)*7; return `MOTS-C + GHK-Cu tra ${d} giorni (settimana 7)`; }
  if(wk<9){ return `Bangkok tra ${(8-wk)*7} giorni (settimana 9)`; }
  if(wk<13){ const d=(12-wk)*7; return `BPC-157 tra ${d} giorni (settimana 13)`; }
  return 'Mini-panel sangue · DEXA T1 fine ciclo';
}

function buildCycleCard(container){
  const today=new Date(); today.setHours(0,0,0,0);
  const start=new Date(START); start.setHours(0,0,0,0);
  const elapsed=Math.floor((today-start)/86400000);
  if(elapsed<0||elapsed>=TOTAL_DAYS) return;
  const pct=Math.min(100,Math.round((elapsed/TOTAL_DAYS)*100));
  const wk=Math.floor(elapsed/7)+1;
  const ph=getPhase(elapsed);
  const C=2*Math.PI*30;
  const offset=C*(1-pct/100);
  const nextEv=getNextEvent(elapsed);
  const card=document.createElement('div');
  card.className='cycle-card';
  card.innerHTML=`
    <div class="cycle-ring">
      <svg width="72" height="72" viewBox="0 0 72 72">
        <circle cx="36" cy="36" r="30" fill="none" stroke="#e8e8ed" stroke-width="5"/>
        <circle cx="36" cy="36" r="30" fill="none" stroke="#0071e3" stroke-width="5"
          stroke-dasharray="${C.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}" stroke-linecap="round"/>
      </svg>
      <div class="cycle-ring-label">
        <span class="cycle-ring-pct">${pct}%</span>
        <span class="cycle-ring-sub">ciclo</span>
      </div>
    </div>
    <div class="cycle-info">
      <h3>Settimana ${wk} · ${ph.label}</h3>
      <p>Giorno ${elapsed+1} di ${TOTAL_DAYS} · ${TOTAL_DAYS-elapsed-1} giorni al termine</p>
      <div class="cycle-next">⟶ ${nextEv}</div>
    </div>`;
  container.insertBefore(card, container.firstChild);
}

function buildCharts(container){
  const today=new Date(); today.setHours(0,0,0,0);
  const start=new Date(START); start.setHours(0,0,0,0);
  const elapsed=Math.floor((today-start)/86400000);
  if(elapsed<2) return;
  const from=Math.max(0,elapsed-13);
  const pesoData=[],hrvData=[];
  for(let i=from;i<=elapsed&&i<TOTAL_DAYS;i++){
    const ep=document.querySelector(`[data-id="day_${i}"][data-f="peso"]`);
    const eh=document.querySelector(`[data-id="day_${i}"][data-f="hrv"]`);
    pesoData.push(ep?.value?parseFloat(ep.value):null);
    hrvData.push(eh?.value?parseFloat(eh.value):null);
  }
  if(!pesoData.some(v=>v!==null)&&!hrvData.some(v=>v!==null)) return;
  const card=document.createElement('div');
  card.className='charts-card'; card.id='charts-card';
  card.innerHTML=`
    <div class="charts-card-title">Andamento · ultimi 14 giorni</div>
    <div class="charts-grid">
      <div><div class="chart-label">Peso kg</div><canvas class="mini-chart" id="chart-peso" height="64"></canvas></div>
      <div><div class="chart-label">HRV ms</div><canvas class="mini-chart" id="chart-hrv" height="64"></canvas></div>
    </div>`;
  // Insert after cycle card
  const cycleCard=container.querySelector('.cycle-card');
  if(cycleCard) cycleCard.after(card);
  else container.insertBefore(card, container.firstChild);
  setTimeout(()=>{
    drawChart('chart-peso',pesoData,'#0071e3');
    drawChart('chart-hrv',hrvData,'#34c759');
  },100);
}

function drawChart(id,data,color){
  const canvas=document.getElementById(id);
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*dpr; canvas.height=64*dpr;
  ctx.scale(dpr,dpr);
  const W=rect.width,H=64;
  const pts=data.filter(v=>v!==null);
  if(pts.length<2){ ctx.font='11px -apple-system'; ctx.fillStyle='#aeaeb2'; ctx.fillText('Dati insufficienti',8,32); return; }
  const mn=Math.min(...pts)*0.995, mx=Math.max(...pts)*1.005, rng=mx-mn||1;
  const valid=data.map((v,i)=>v!==null?{x:i/(data.length-1)*(W-4)+2, y:H-((v-mn)/rng)*(H-16)-6, v}:null);
  // Fill
  ctx.beginPath();
  let st=false;
  valid.forEach(p=>{ if(!p)return; if(!st){ctx.moveTo(p.x,p.y);st=true;}else ctx.lineTo(p.x,p.y); });
  const lp=valid.filter(Boolean).pop(), fp=valid.filter(Boolean)[0];
  if(lp&&fp){ ctx.lineTo(lp.x,H);ctx.lineTo(fp.x,H);ctx.closePath(); const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,color+'28');g.addColorStop(1,color+'00'); ctx.fillStyle=g; ctx.fill(); }
  // Line
  ctx.beginPath(); st=false;
  valid.forEach(p=>{ if(!p)return; if(!st){ctx.moveTo(p.x,p.y);st=true;}else ctx.lineTo(p.x,p.y); });
  ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.lineJoin='round'; ctx.lineCap='round'; ctx.stroke();
  // Dots
  valid.forEach(p=>{ if(!p)return; ctx.beginPath();ctx.arc(p.x,p.y,2.5,0,Math.PI*2); ctx.fillStyle=color; ctx.fill(); });
  // Last value
  if(lp){ ctx.font='500 11px -apple-system'; ctx.fillStyle=color; ctx.fillText(lp.v.toFixed(1),Math.min(lp.x,W-32),lp.y-6); }
}

function toggleDay(id){ document.getElementById('card-'+id).classList.toggle('open'); }

function setSyncStatus(state){
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-label');
  if(state==='ok'){dot.className='sync-dot ok';lbl.textContent='Sincronizzato';}
  else if(state==='err'){dot.className='sync-dot err';lbl.textContent='Errore sync';}
  else{dot.className='sync-dot';lbl.textContent='—';}
}

function onInput(el,id,f){
  const v=el.value;
  const q=document.getElementById('q-'+id+'-'+f);
  if(q){
    if(v){q.textContent=parseFloat(v).toFixed(1);q.classList.remove('empty');}
    else{q.textContent='—';q.classList.add('empty');}
  }
  updateProgress();
}

function updateProgress(){
  const all=document.querySelectorAll('[data-f="peso"]');
  let filled=0; all.forEach(el=>{if(el.value)filled++;});
  document.getElementById('prog-bar').style.width=Math.round((filled/TOTAL_DAYS)*100)+'%';
}

function collectAll(){
  const data={};
  document.querySelectorAll('[data-id][data-f]').forEach(el=>{
    const id=el.dataset.id,f=el.dataset.f;
    if(!data[id])data[id]={};
    if(el.value)data[id][f]=el.value;
  });
  return data;
}

function applyAll(data){
  Object.entries(data).forEach(([id,fields])=>{
    Object.entries(fields).forEach(([f,v])=>{
      const el=document.querySelector(`[data-id="${id}"][data-f="${f}"]`);
      if(el&&v){
        el.value=v;
        if(f==='peso')onInput(el,id,'peso');
        if(f==='hrv')onInput(el,id,'hrv');
        if(f==='qualita_sonno')onInput(el,id,'sonno');
      }
    });
  });
  updateProgress();
}

async function saveData(){
  const btn=document.getElementById('save-btn');
  btn.disabled=true; btn.textContent='Salvataggio...';
  setSyncStatus('—');
  const data=collectAll();
  const ts=Date.now();
  try{localStorage.setItem(KEY,JSON.stringify({data,ts}));}catch(e){}
  try{
    const res=await fetch(SB_URL+'/rest/v1/diary',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify({user_id:USER_ID,data,updated_at:new Date(ts).toISOString()})
    });
    const now=new Date();
    if(res.ok||res.status===201||res.status===200){
      document.getElementById('last-saved').textContent='Salvato '+now.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
      setSyncStatus('ok');
      refreshCharts();
    } else {
      document.getElementById('last-saved').textContent='Salvato localmente · cloud err '+res.status;
      setSyncStatus('err');
    }
  }catch(e){
    document.getElementById('last-saved').textContent='Salvato localmente (offline)';
    setSyncStatus('err');
  }
  btn.disabled=false; btn.textContent='Salva dati';
}

async function loadFromCloud(){
  setSyncStatus('—');
  document.getElementById('last-saved').textContent='Sincronizzazione...';
  try{
    const res=await fetch(SB_URL+'/rest/v1/diary?user_id=eq.'+USER_ID+'&select=data,updated_at&limit=1',
      {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
    if(res.ok){
      const rows=await res.json();
      if(rows&&rows.length>0&&rows[0].data){
        const cd=rows[0].data,ct=rows[0].updated_at;
        const lr=localStorage.getItem(KEY);
        let lt=0; if(lr){try{lt=JSON.parse(lr).ts||0;}catch(e){}}
        const ctMs=new Date(ct).getTime();
        if(ctMs>lt){
          applyAll(cd);
          localStorage.setItem(KEY,JSON.stringify({data:cd,ts:ctMs}));
          document.getElementById('last-saved').textContent='Caricato dal cloud · '+new Date(ct).toLocaleString('it-IT');
          setSyncStatus('ok');
          setTimeout(refreshCharts,200);
        } else {
          document.getElementById('last-saved').textContent='Dati locali aggiornati';
          setSyncStatus('ok');
        }
      } else {
        document.getElementById('last-saved').textContent='Nessun dato nel cloud';
        setSyncStatus('—');
      }
    } else throw new Error('HTTP '+res.status);
  }catch(e){
    const lr=localStorage.getItem(KEY);
    if(lr){try{const p=JSON.parse(lr);applyAll(p.data||p);document.getElementById('last-saved').textContent='Locale (offline)';setSyncStatus('err');}catch(e2){}}
    else{document.getElementById('last-saved').textContent='Errore connessione';setSyncStatus('err');}
  }
}

function jumpToday(){
  const today=new Date(); today.setHours(0,0,0,0);
  const start=new Date(START); start.setHours(0,0,0,0);
  const diff=Math.floor((today-start)/86400000);
  if(diff>=0&&diff<TOTAL_DAYS){
    const card=document.getElementById('card-day_'+diff);
    if(card){card.classList.add('open');card.scrollIntoView({behavior:'smooth',block:'center'});}
  }
}

function updateNavHighlight(){
  const today=new Date(); today.setHours(0,0,0,0);
  const start=new Date(START); start.setHours(0,0,0,0);
  const diff=Math.floor((today-start)/86400000);
  if(diff>=0&&diff<TOTAL_DAYS){
    const wk=Math.floor(diff/7)+1;
    document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('on'));
    const tab=document.getElementById('nav-w'+wk);
    if(tab){tab.classList.add('on');tab.scrollIntoView({inline:'center',behavior:'smooth'});}
  }
}

window.addEventListener('load',async()=>{
  buildNav();
  buildDays();
  document.getElementById('loading').style.display='none';
  const container=document.getElementById('container');
  buildCycleCard(container);
  const lr=localStorage.getItem(KEY);
  if(lr){
    try{
      const p=JSON.parse(lr);
      applyAll(p.data||p);
      const ts=p.ts?new Date(p.ts).toLocaleString('it-IT'):'—';
      document.getElementById('last-saved').textContent='Locale: '+ts;
      setSyncStatus('ok');
    }catch(e){}
  }
  updateNavHighlight();
  jumpToday();
  try{await loadFromCloud();}catch(e){}
  setTimeout(()=>buildCharts(container),400);
});

window.addEventListener('beforeunload',()=>{
  const data=collectAll();
  if(Object.values(data).some(d=>Object.keys(d).length>0))
    localStorage.setItem(KEY,JSON.stringify({data,ts:Date.now()}));
});

function buildMotraSection(dayId) {
  return `
    <div class="motra-box" style="margin-top:12px">
      <label>Importa da Motra</label>
      <textarea class="motra-textarea" id="motra-ta-${dayId}"
        placeholder="Incolla qui il testo del log Motra (copia tutto dal titolo fino a 'Tracciato con Motra.')..."></textarea>
      <button class="motra-import-btn" onclick="importMotra('${dayId}')">Importa log</button>
      <div class="motra-result" id="motra-res-${dayId}"></div>
      <div class="motra-parsed" id="motra-parsed-${dayId}"></div>
    </div>`;
}

function parseMotraText(text) {
  const lines = text.trim().split('\n').map(l => l.trim()).filter(l => l && !l.startsWith('http') && l !== 'Tracciato con Motra.');

  const result = { title: '', date: '', durata: '', volume: '', calorie: '', exercises: [] };

  // Skip "Il mio allenamento:" header
  let i = 0;
  if (lines[i] && lines[i].toLowerCase().includes('allenamento')) i++;

  // Title (workout name)
  if (lines[i] && !lines[i].match(/^\d/) && !lines[i].includes(':')) {
    result.title = lines[i]; i++;
  }

  // Date
  if (lines[i] && lines[i].match(/\d+ \w+ \d+/)) {
    result.date = lines[i]; i++;
  }

  // Meta fields
  while (i < lines.length) {
    const l = lines[i];
    if (l.startsWith('Durata:'))   { result.durata  = l.replace('Durata:', '').trim(); i++; continue; }
    if (l.startsWith('Voume:') || l.startsWith('Volume:')) { result.volume = l.replace(/Vo[lu]+me:/i,'').trim(); i++; continue; }
    if (l.startsWith('Calorie:'))  { result.calorie = l.replace('Calorie:', '').trim(); i++; continue; }
    if (l.startsWith('Esercizi:')) { i++; break; }
    i++;
  }

  // Parse exercises
  const setPattern = /^(\d+|[Rr]iscaldamento):\s*(\d+)\s+ripetizioni\s+x\s+([\d,\.]+)\s*kg/i;
  let currentEx = null;

  while (i < lines.length) {
    const l = lines[i];
    const setMatch = l.match(setPattern);
    if (setMatch) {
      if (currentEx) {
        const label = setMatch[1].toLowerCase() === 'riscaldamento' ? 'W' : setMatch[1];
        const reps = setMatch[2];
        const kg = setMatch[3].replace(',', '.');
        currentEx.sets.push({ label, reps, kg });
      }
    } else if (l && !l.match(/^\d+:/) && !l.toLowerCase().startsWith('riscaldamento')) {
      if (currentEx) result.exercises.push(currentEx);
      currentEx = { name: l, sets: [] };
    }
    i++;
  }
  if (currentEx && currentEx.sets.length > 0) result.exercises.push(currentEx);

  return result;
}

function importMotra(dayId) {
  const ta = document.getElementById('motra-ta-' + dayId);
  const res = document.getElementById('motra-res-' + dayId);
  const parsed = document.getElementById('motra-parsed-' + dayId);

  const text = ta.value.trim();
  if (!text) { res.className = 'motra-result err'; res.textContent = 'Incolla prima il testo del log Motra.'; return; }

  try {
    const data = parseMotraText(text);

    if (!data.exercises.length) {
      res.className = 'motra-result err';
      res.textContent = 'Nessun esercizio trovato. Controlla di aver copiato tutto il testo.';
      return;
    }

    // Auto-populate workout fields
    if (data.durata) {
      const durEl = document.querySelector(`[data-id="${dayId}"][data-f="wo_durata"]`);
      if (durEl) {
        // Convert "1h 21m" to minutes
        const hm = data.durata.match(/(\d+)h\s*(\d+)m/);
        const m = data.durata.match(/^(\d+)m/);
        if (hm) durEl.value = parseInt(hm[1])*60 + parseInt(hm[2]);
        else if (m) durEl.value = m[1];
      }
    }
    if (data.calorie) {
      const calEl = document.querySelector(`[data-id="${dayId}"][data-f="wo_kcal"]`);
      if (calEl) calEl.value = data.calorie.replace(' cal','').trim();
    }
    if (data.volume) {
      const volEl = document.querySelector(`[data-id="${dayId}"][data-f="wo_volume"]`);
      if (volEl) {
        // Convert "14,4K kg" to number
        const vMatch = data.volume.match(/([\d,\.]+)([Kk])?/);
        if (vMatch) {
          let val = parseFloat(vMatch[1].replace(',','.'));
          if (vMatch[2]) val *= 1000;
          volEl.value = Math.round(val);
        }
      }
    }

    // Store parsed data as JSON in a hidden field
    let hidden = document.querySelector(`[data-id="${dayId}"][data-f="motra_log"]`);
    if (!hidden) {
      hidden = document.createElement('input');
      hidden.type = 'hidden';
      hidden.dataset.id = dayId;
      hidden.dataset.f = 'motra_log';
      ta.parentNode.appendChild(hidden);
    }
    hidden.value = JSON.stringify(data);

    // Render parsed result
    const metaHtml = `
      <div class="motra-meta">
        ${data.durata ? `<div class="motra-meta-item"><div class="motra-meta-val">${data.durata}</div><div class="motra-meta-lbl">Durata</div></div>` : ''}
        ${data.volume ? `<div class="motra-meta-item"><div class="motra-meta-val">${data.volume}</div><div class="motra-meta-lbl">Volume</div></div>` : ''}
        ${data.calorie ? `<div class="motra-meta-item"><div class="motra-meta-val">${data.calorie}</div><div class="motra-meta-lbl">Calorie</div></div>` : ''}
        <div class="motra-meta-item"><div class="motra-meta-val">${data.exercises.length}</div><div class="motra-meta-lbl">Esercizi</div></div>
      </div>`;

    const exHtml = data.exercises.map(ex => {
      const workSets = ex.sets.filter(s => s.label !== 'W');
      const warmSets = ex.sets.filter(s => s.label === 'W');
      const setsStr = workSets.map(s => `${s.reps}×${s.kg}kg`).join(' · ');
      const warnStr = warmSets.length ? ` <span style="color:var(--faint);font-size:11px">(+${warmSets.length} riscald.)</span>` : '';
      return `<div class="motra-ex-row">
        <div class="motra-ex-name">${ex.name}</div>
        <div class="motra-ex-sets">${setsStr}${warnStr}</div>
      </div>`;
    }).join('');

    parsed.innerHTML = metaHtml + exHtml;
    parsed.className = 'motra-parsed show';

    res.className = 'motra-result ok';
    res.textContent = `✓ Importati ${data.exercises.length} esercizi · durata e kcal compilati automaticamente`;

  } catch(e) {
    res.className = 'motra-result err';
    res.textContent = 'Errore nel parsing: ' + e.message;
  }
}
