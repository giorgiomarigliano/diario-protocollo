function drawBarChart(canvasId, bars, options = {}) {
  // bars: [{label, value, color}]
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  if (rect.width <= 0) { requestAnimationFrame(() => drawBarChart(canvasId, bars, options)); return; }
  const H = options.height || 110;
  canvas.width = rect.width * dpr;
  canvas.height = H * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width;

  const vals = bars.map(b => b.value).filter(v => v != null && v > 0);
  if (vals.length < 1) {
    ctx.font = '11px -apple-system'; ctx.fillStyle = '#aeaeb2';
    ctx.fillText('Dati insufficienti — continua a compilare il diario', 8, H/2); return;
  }
  const maxV = Math.max(...vals);
  const pad = 4, labelH = 16, barAreaH = H - labelH - 4;
  const bw = Math.max(4, (W - pad * 2) / bars.length - 3);
  const gap = (W - pad * 2 - bw * bars.length) / Math.max(bars.length - 1, 1);

  // Grid
  ctx.strokeStyle = 'rgba(0,0,0,0.05)'; ctx.lineWidth = 1;
  [0.25, 0.5, 0.75, 1].forEach(r => {
    const y = barAreaH - r * barAreaH + 2;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  });

  bars.forEach((b, i) => {
    if (b.value == null) return;
    const x = pad + i * (bw + gap);
    const bh = (b.value / maxV) * (barAreaH - 4);
    const y = barAreaH - bh + 2;

    // Bar with rounded top
    const r2 = Math.min(3, bw / 2);
    ctx.beginPath();
    ctx.moveTo(x + r2, y);
    ctx.lineTo(x + bw - r2, y);
    ctx.quadraticCurveTo(x + bw, y, x + bw, y + r2);
    ctx.lineTo(x + bw, barAreaH + 2);
    ctx.lineTo(x, barAreaH + 2);
    ctx.lineTo(x, y + r2);
    ctx.quadraticCurveTo(x, y, x + r2, y);
    ctx.closePath();
    ctx.fillStyle = b.color || '#0071e3';
    ctx.globalAlpha = b.alpha || 1;
    ctx.fill();
    ctx.globalAlpha = 1;

    // Value on top if fits
    if (bh > 18 && options.showValues !== false) {
      ctx.font = '500 9px -apple-system'; ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.fillText(options.valFormat ? options.valFormat(b.value) : Math.round(b.value), x + bw/2, y + 11);
      ctx.textAlign = 'left';
    }

    // Label below
    if (b.label) {
      ctx.font = '9px -apple-system'; ctx.fillStyle = '#aeaeb2';
      ctx.textAlign = 'center';
      ctx.fillText(b.label, x + bw/2, H - 1);
      ctx.textAlign = 'left';
    }
  });
}

function drawStackedBarChart(canvasId, weeks, options = {}) {
  // weeks: [{week, push, pull, legs, upperSab, upperDom, total}]
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const H = options.height || 120;
  canvas.width = rect.width * dpr;
  canvas.height = H * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width;

  const maxV = Math.max(...weeks.map(w => w.total || 0));
  if (maxV === 0) {
    ctx.font = '11px -apple-system'; ctx.fillStyle = '#aeaeb2';
    ctx.fillText('Dati insufficienti — continua a compilare il diario', 8, H/2); return;
  }
  const labelH = 16, barAreaH = H - labelH - 4;
  const bw = Math.max(4, (W - 8) / weeks.length - 4);
  const gap = (W - 8 - bw * weeks.length) / Math.max(weeks.length - 1, 1);
  const colors = { push:'#ff3b30', pull:'#34c759', legs:'#ff9500', upperSab:'#af52de', upperDom:'#0071e3' };

  // Grid lines
  ctx.strokeStyle = 'rgba(0,0,0,0.05)'; ctx.lineWidth = 1;
  [0.25,0.5,0.75].forEach(r => {
    const y = barAreaH - r * (barAreaH-4) + 2;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  });

  weeks.forEach((wk, i) => {
    const x = 4 + i * (bw + gap);
    let yOffset = barAreaH + 2;
    ['push','pull','legs','upperSab','upperDom'].forEach(type => {
      const v = wk[type] || 0;
      if (!v) return;
      const bh = Math.max(1, (v / maxV) * (barAreaH - 4));
      yOffset -= bh;
      ctx.fillStyle = colors[type];
      ctx.fillRect(x, yOffset, bw, bh);
    });
    // Total label on bar
    if (wk.total > 0) {
      const totalH = (wk.total / maxV) * (barAreaH - 4);
      const topY = barAreaH + 2 - totalH;
      if (totalH > 18) {
        ctx.font = '500 8px -apple-system'; ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.fillText((wk.total/1000).toFixed(1)+'t', x + bw/2, topY + 10);
      }
    }
    ctx.font = '9px -apple-system'; ctx.fillStyle = '#aeaeb2';
    ctx.textAlign = 'center';
    ctx.fillText('W' + wk.week, x + bw/2, H - 1);
    ctx.textAlign = 'left';
  });
}

function drawScatterChart(canvasId, points, options = {}) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const H = options.height || 120;
  canvas.width = rect.width * dpr;
  canvas.height = H * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width;

  if (points.length < 3) {
    ctx.font = '11px -apple-system'; ctx.fillStyle = '#aeaeb2';
    ctx.fillText('Dati insufficienti — continua a compilare il diario', 8, H/2); return;
  }

  const pad = 28;
  const hrvVals = points.map(p => p.hrv);
  const volVals = points.map(p => p.vol);
  const minH = Math.min(...hrvVals), maxH = Math.max(...hrvVals);
  const minV = Math.min(...volVals), maxV = Math.max(...volVals);
  const rngH = maxH - minH || 1, rngV = maxV - minV || 1;

  // Axis labels
  ctx.font = '9px -apple-system'; ctx.fillStyle = '#aeaeb2';
  ctx.textAlign = 'center';
  ctx.fillText('HRV (ms)', W/2, H - 1);
  ctx.save(); ctx.translate(10, H/2); ctx.rotate(-Math.PI/2);
  ctx.fillText('Volume (kg)', 0, 0); ctx.restore();
  ctx.textAlign = 'left';

  // Grid
  ctx.strokeStyle = 'rgba(0,0,0,0.05)'; ctx.lineWidth = 1;
  [0.25,0.5,0.75].forEach(r => {
    const y = pad + r * (H - pad*2);
    ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(W-4, y); ctx.stroke();
    const x = pad + r * (W - pad - 4);
    ctx.beginPath(); ctx.moveTo(x, pad); ctx.lineTo(x, H-pad); ctx.stroke();
  });

  // Linear regression line
  const n = points.length;
  const sumX = hrvVals.reduce((a,b)=>a+b,0);
  const sumY = volVals.reduce((a,b)=>a+b,0);
  const sumXY = points.reduce((a,p)=>a+p.hrv*p.vol,0);
  const sumX2 = hrvVals.reduce((a,b)=>a+b*b,0);
  const slope = (n*sumXY - sumX*sumY) / (n*sumX2 - sumX*sumX);
  const intercept = (sumY - slope*sumX) / n;
  const toX = hrv => pad + ((hrv - minH) / rngH) * (W - pad - 4);
  const toY = vol => (H - pad) - ((vol - minV) / rngV) * (H - pad*2);
  ctx.beginPath();
  ctx.moveTo(toX(minH), toY(slope * minH + intercept));
  ctx.lineTo(toX(maxH), toY(slope * maxH + intercept));
  ctx.strokeStyle = '#0071e322'; ctx.lineWidth = 1.5; ctx.stroke();

  // Points
  points.forEach(p => {
    ctx.beginPath();
    ctx.arc(toX(p.hrv), toY(p.vol), 4, 0, Math.PI*2);
    ctx.fillStyle = '#0071e3bb'; ctx.fill();
  });

  // Correlation label
  const corrNum = (n*sumXY - sumX*sumY) / Math.sqrt((n*sumX2 - sumX*sumX) * (n*volVals.reduce((a,b)=>a+b*b,0) - sumY*sumY));
  if (!isNaN(corrNum)) {
    ctx.font = '10px -apple-system'; ctx.fillStyle = '#aeaeb2';
    ctx.fillText('r = ' + corrNum.toFixed(2), W - 44, 16);
  }
}

function getInjComplianceV2() {
  const today=new Date(); today.setHours(0,0,0,0);
  const start=new Date(START2); start.setHours(0,0,0,0);
  const elapsed=Math.floor((today-start)/86400000);
  if (elapsed<0) return {done:0,total:0,pct:0};
  let done=0,total=0;
  for (let i=0;i<=Math.min(elapsed,TOTAL_DAYS2-1);i++) {
    const rec=_lastData2['p2_day_'+i]||{};
    const slots=getInjectionSlots2(i);
    slots.forEach(s=>s.fields.forEach(f=>{
      total++;
      const k='inj_'+s.n+'_'+f.replace(/[\s\-]/g,'_');
      if((rec[k]||'')==='fatto') done++;
    }));
  }
  return {done,total,pct:total?Math.round((done/total)*100):0};
}

// ResizeObserver globale: ridisegna i chart al cambio dimensione finestra/layout
(function() {
  let _roTimer = null;
  function _scheduleRefresh() {
    clearTimeout(_roTimer);
    _roTimer = setTimeout(function() {
      if (document.getElementById('dash-view') && document.getElementById('dash-view').classList.contains('visible')) {
        refreshDashCharts();
      }
    }, 150);
  }
  if (window.ResizeObserver) {
    const ro = new ResizeObserver(_scheduleRefresh);
    const tryObserve = function() {
      const el = document.getElementById('dash-view');
      if (el) { ro.observe(el); } else { setTimeout(tryObserve, 500); }
    };
    tryObserve();
  }
  window.addEventListener('resize', _scheduleRefresh, {passive: true});
})();

function refreshDashCharts() {
  // ── Badge "pronti per aumentare il carico" ──────────────────
  const _readyEl = document.getElementById('dash-ready-flags');
  if (_readyEl) {
    const flags = (_lastData && _lastData.ready_to_progress) || [];
    _readyEl.innerHTML = flags.length ? `<div style="background:rgba(52,199,89,.08);border:0.5px solid rgba(52,199,89,.3);border-radius:10px;padding:10px 14px;margin-bottom:14px">
      <div style="font-size:11px;font-weight:600;color:#1a7a3a;margin-bottom:4px">💪 Pronti per aumentare il carico</div>
      <div style="font-size:12px;color:var(--text-secondary)">${flags.map(f=>`<strong style="color:var(--text-primary)">${f.label}</strong> ${f.weight}kg`).join(' · ')}</div>
    </div>` : '';
  }

  // ── Biometria (60gg unificata WU+V2) ──────────────────────
  const peso60 = getDayDataAll('peso', 60);
  const hrv60  = getDayDataAll('hrv',  60);
  const rhr60  = getDayDataAll('rhr',  60);
  const bpSys  = getDayDataAll('bp_sys',60);
  const bpDia  = getDayDataAll('bp_dia',60);

  // ── Soggettivo (30gg) ──────────────────────────────────────
  const energ = getDayDataAll('energia', 30);
  const recup = getDayDataAll('recupero',30);
  const umore = getDayDataAll('umore',   30);

  // ── Sparkline KPI ──────────────────────────────────────────
  drawSparkline('spark-peso', peso60, '#0071e3');
  drawSparkline('spark-hrv',  hrv60,  '#34c759');
  drawSparkline('spark-rhr',  rhr60,  '#ff3b30');

  // ── Grafici biometria ──────────────────────────────────────
  drawDashChart('dc-peso',[{data:peso60,color:'#0071e3'}],{height:110,minScale:0.98,maxScale:1.02,refLine:71.1});
  drawDashChart('dc-hrv', [{data:hrv60, color:'#34c759'}],{height:110,refLine:37});
  drawDashChart('dc-rhr', [{data:rhr60, color:'#ff3b30'}],{height:110});

  const allBp=[...bpSys,...bpDia].filter(p=>p.value!==null);
  if(allBp.length>=2)
    drawDashChart('dc-bp',[{data:bpSys,color:'#ff3b30'},{data:bpDia,color:'#0071e3'}],{height:110});

  // ── Soggettivo ─────────────────────────────────────────────
  const hasSubj=[...energ,...recup,...umore].some(p=>p.value!==null);
  if(hasSubj)
    drawDashChart('dc-subj',[
      {data:energ,color:'#0071e3'},
      {data:recup,color:'#34c759'},
      {data:umore,color:'#af52de'}
    ],{height:100,minVal:1,maxVal:10});

  // ── Allenamento sessioni (60gg WU+V2) ──────────────────────
  const sessions = getSessionsAll(60);
  if(sessions.length>0){
    // Volume bar chart
    const volBars = sessions.filter(s=>s.volume).map(s=>({
      label: s.date.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'}),
      value: s.volume/1000,
      color: {Push:'#ff3b30',Pull:'#34c759',Legs:'#ff9500','Upper Sab':'#af52de','Upper Dom':'#0071e3'}[s.type]||'#aeaeb2'
    }));
    if(volBars.length) drawBarChart('dc-vol', volBars, {height:120, unit:'t'});

    // RPE line
    const rpeData = sessions.filter(s=>s.rpe).map(s=>({
      date:s.date, value:s.rpe
    }));
    if(rpeData.length) drawDashChart('dc-rpe',[{data:rpeData,color:'#ff9500'}],{height:120,minVal:1,maxVal:10});

    // Breakdown tipo
    const breakdown = {};
    sessions.filter(s=>s.volume!==null).forEach(s=>{breakdown[s.type]=(breakdown[s.type]||0)+1;});
    const bdEl = document.getElementById('dc-breakdown');
    if(bdEl){
      const colors={Push:'#ff3b30',Pull:'#34c759',Legs:'#ff9500','Upper Sab':'#af52de','Upper Dom':'#0071e3'};
      const tot=Object.values(breakdown).reduce((a,b)=>a+b,0);
      bdEl.innerHTML=Object.entries(breakdown).map(([type,n])=>`
        <div class="comp-bar-row">
          <div class="comp-bar-label" style="color:${colors[type]||'#aeaeb2'}">${type}</div>
          <div class="comp-bar-track"><div class="comp-bar-fill" style="width:${Math.round((n/tot)*100)}%;background:${colors[type]||'#aeaeb2'}"></div></div>
          <div class="comp-bar-pct">${n} sessioni</div>
        </div>`).join('');
    }

    // Riepilogo sessioni (tabella: data, tipo, vol, HRV, RPE)
    const sessionRows = [];
    for (let i = 0; i < TOTAL_DAYS; i++) {
      const rec = _lastData['day_'+i]||{};
      const hrv = parseFloat(rec.hrv);
      const vol = parseFloat(rec.wo_volume);
      const rpe = parseFloat(rec.wo_rpe||rec.rpe);
      const wo  = getWorkout(i);
      if (wo.type === 'Riposo') continue;
      if (!isNaN(hrv) || !isNaN(vol)) {
        const d = new Date(START); d.setDate(d.getDate()+i);
        sessionRows.push({date:d.toLocaleDateString('it-IT',{day:'2-digit',month:'short'}), type:wo.type, hrv, vol, rpe});
      }
    }
    const tblEl = document.getElementById('dc-scatter-table');
    if (tblEl) {
      const C = {Push:'#ff3b30',Pull:'#34c759',Legs:'#ff9500','Upper Sab':'#af52de','Upper Dom':'#0071e3'};
      tblEl.innerHTML = sessionRows.length ? `<table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="color:var(--muted);font-size:10px;border-bottom:1px solid var(--border)">
          <th style="text-align:left;padding:4px 6px">Data</th><th style="text-align:left;padding:4px 6px">Tipo</th>
          <th style="text-align:right;padding:4px 6px">Vol t</th><th style="text-align:right;padding:4px 6px">HRV</th><th style="text-align:right;padding:4px 6px">RPE</th>
        </tr></thead><tbody>${sessionRows.map(r=>`<tr style="border-bottom:1px solid var(--border)">
          <td style="padding:4px 6px;color:var(--muted)">${r.date}</td>
          <td style="padding:4px 6px;font-weight:600;color:${C[r.type]||'#6e6e73'}">${r.type}</td>
          <td style="padding:4px 6px;text-align:right">${isNaN(r.vol)?'—':(r.vol/1000).toFixed(1)}</td>
          <td style="padding:4px 6px;text-align:right">${isNaN(r.hrv)?'—':Math.round(r.hrv)}</td>
          <td style="padding:4px 6px;text-align:right">${isNaN(r.rpe)?'—':r.rpe}</td>
        </tr>`).join('')}</tbody></table>`
        : '<div style="font-size:11px;color:var(--muted);padding:12px">Nessuna sessione</div>';
    }
  }

  // ── Sentinel lifts (dati da DOM e _lastData/_lastData2) ────
  function sentData(fieldId, days) {
    const result=[];
    const today=new Date(); today.setHours(0,0,0,0);
    const startWU=new Date(START); startWU.setHours(0,0,0,0);
    const startV2=new Date(START2); startV2.setHours(0,0,0,0);
    const hist = (_lastData && _lastData.history_sentinels) || {};
    for(let offset=days-1;offset>=0;offset--){
      const d=new Date(today);d.setDate(d.getDate()-offset);d.setHours(0,0,0,0);
      let v=null;
      if(d>=startV2){
        const i=Math.floor((d-startV2)/86400000);
        if(i>=0&&i<TOTAL_DAYS2){const rec=_lastData2['p2_day_'+i]||{};const fv=parseFloat(rec['sl_'+fieldId+'_kg'])||parseFloat(rec['sent_'+fieldId]);if(!isNaN(fv))v=fv;}
      } else if(d>=startWU){
        const i=Math.floor((d-startWU)/86400000);
        if(i>=0&&i<TOTAL_DAYS){const rec=_lastData['day_'+i]||{};const fv=parseFloat(rec['sl_'+fieldId+'_kg'])||parseFloat(rec['sent_'+fieldId]);if(!isNaN(fv))v=fv;}
      } else {
        // Dati storici pre-warm-up (sessioni Motra importate, keyed by data reale YYYY-MM-DD)
        const dstr = localDateStr(d);
        const rec = hist[dstr];
        if(rec){ const fv=parseFloat(rec['sl_'+fieldId+'_kg']); if(!isNaN(fv)) v=fv; }
      }
      if(v!==null) result.push({date:d,value:v});
    }
    return result;
  }
  // Baseline T0 (15/05/2026, pre-WU)
  const T0date = new Date('2026-05-15'); T0date.setHours(0,0,0,0);
  function withT0(data, baseKg) {
    if (!baseKg) return data;
    const t0pt = {date: new Date(T0date), value: baseKg};
    const hasT0 = data.some(p => Math.abs(p.date - T0date) < 86400000);
    return hasT0 ? data : [t0pt, ...data];
  }
  function dc(id, fieldId, color, base) {
    const d = sentData(fieldId, 120);
    const ds = [{data: withT0(d, base), color}];
    drawDashChart(id, ds, {height:90, refLine:base||null, minPts:1});
  }
  function dc2(id, fA, fB, cA, cB, bA, bB) {
    const dA = sentData(fA, 120), dB = sentData(fB, 120);
    drawDashChart(id, [
      {data:withT0(dA,bA),color:cA},
      {data:withT0(dB,bB),color:cB}
    ], {height:90, minPts:1});

function buildMotraSection(dayId) {
  return `
    <div class="motra-box" style="margin-top:12px">

      <button class="motra-import-btn" onclick="importMotra('${dayId}')">Importa log</button>
      <input type="hidden" data-id="${dayId}" data-f="motra_log">
      <div class="motra-result" id="motra-res-${dayId}"></div>
      <div class="motra-parsed" id="motra-parsed-${dayId}"></div>
    </div>`;
}

function parseMotraText(text) {
  const lines = text.trim().split('\n').map(l => l.trim()).filter(l => l && !l.startsWith('http') && l !== 'Tracciato con Motra.');

  const result = { title: '', date: '', durata: '', volume: '', calorie: '', exercises: [] };

  // Skip "Il mio allenamento:" header
  let i = 0;
  if (lines[i] && lines[i].toLowerCase().includes('allenamento')) i++;

  // Title (workout name)
  if (lines[i] && !lines[i].match(/^\d/) && !lines[i].includes(':')) {
    result.title = lines[i]; i++;
  }

  // Date
  if (lines[i] && lines[i].match(/\d+ \w+ \d+/)) {
    result.date = lines[i]; i++;
  }

  // Meta fields
  while (i < lines.length) {
    const l = lines[i];
    if (l.startsWith('Durata:'))   { result.durata  = l.replace('Durata:', '').trim(); i++; continue; }
    if (l.startsWith('Voume:') || l.startsWith('Volume:')) { result.volume = l.replace(/Vo[lu]+me:/i,'').trim(); i++; continue; }
    if (l.startsWith('Calorie:'))  { result.calorie = l.replace('Calorie:', '').trim(); i++; continue; }
    if (l.startsWith('Esercizi:')) { i++; break; }
    i++;
  }

  // Parse exercises
  const setPattern = /^(\d+|[Rr]iscaldamento):\s*(\d+)\s+ripetizioni\s+x\s+([\d,\.]+)\s*kg/i;
  let currentEx = null;

  while (i < lines.length) {
    const l = lines[i];
    const setMatch = l.match(setPattern);
    if (setMatch) {
      // BUG FIX: aggiunge il set a currentEx se esiste, altrimenti lo ignora
      if (currentEx) {
        const label = setMatch[1].toLowerCase() === 'riscaldamento' ? 'W' : setMatch[1];
        const reps = parseInt(setMatch[2]);
        const kg = parseFloat(setMatch[3].replace(',', '.'));
        currentEx.sets.push({ label, reps, kg });
      }
    } else if (l && !setMatch) {
      // Nuova riga non-set = nome esercizio
      if (currentEx && currentEx.sets.length > 0) result.exercises.push(currentEx);
      currentEx = { name: l, sets: [] };
    }
    i++;
  }
  if (currentEx && currentEx.sets.length > 0) result.exercises.push(currentEx);

  return result;
}

function importMotra(dayId) {
  const ta = document.getElementById('motra-ta-' + dayId);
  const res = document.getElementById('motra-res-' + dayId);
  const parsed = document.getElementById('motra-parsed-' + dayId);

  const text = ta.value.trim();
  if (!text) { res.className = 'motra-result err'; res.textContent = 'Incolla prima il testo del log Motra.'; return; }

  try {
    const data = parseMotraText(text);

    if (!data.exercises.length) {
      res.className = 'motra-result err';
      res.textContent = 'Nessun esercizio trovato. Controlla di aver copiato tutto il testo.';
      return;
    }

    // Auto-populate workout fields
    if (data.durata) {
      const durEl = document.querySelector(`[data-id="${dayId}"][data-f="wo_durata"]`);
      if (durEl) {
        // Convert "1h 21m" to minutes
        const hm = data.durata.match(/(\d+)h\s*(\d+)m/);
        const m = data.durata.match(/^(\d+)m/);
        if (hm) durEl.value = parseInt(hm[1])*60 + parseInt(hm[2]);
        else if (m) durEl.value = m[1];
      }
    }
    if (data.calorie) {
      const calEl = document.querySelector(`[data-id="${dayId}"][data-f="wo_kcal"]`);
      if (calEl) calEl.value = data.calorie.replace(' cal','').trim();
    }
    if (data.volume) {
      const volEl = document.querySelector(`[data-id="${dayId}"][data-f="wo_volume"]`);
      if (volEl) {
        // Convert "14,4K kg" to number
        const vMatch = data.volume.match(/([\d,\.]+)([Kk])?/);
        if (vMatch) {
          let val = parseFloat(vMatch[1].replace(',','.'));
          if (vMatch[2]) val *= 1000;
          volEl.value = Math.round(val);
        }
      }
    }

    // Auto-fill sentinel lifts from parsed exercises
    // Each entry: sentinelId → [keywords to match in exercise name]
    // More specific keywords first to avoid false matches
    const sentinelMap = {
      // PETTO — BB Bench Press (bilanciere, panca piana)
      'bench':      ['barbell bench press','bb bench press','panca piana bilanciere'],
      // PETTO — Machine Incline Bench Press
      'incbench':   ['machine incline bench press','incline bench press machine','incline bench press'],
      // PETTO — Pec Fly / Pec Dec
      'pecfly':     ['machine fly','pec dec','pec-dec','cable fly','crossover','chest fly','pectoral'],
      // DORSO — Lat Machine Wide-Grip
      'lat':        ['lat pull down wide','lat pulldown wide','wide grip pulldown','wide-grip pulldown','wide grip lat','machine lat pull down wide'],
      // DORSO — T-Bar Row
      'tbar':       ['t-bar row','t bar row','machine t-bar','tbar row'],
      // DORSO — BB Bent Over Row
      'bbrow':      ['barbell bent over row','barbell row','bb bent over row','bent over row barbell'],
      // SPALLE — BB OHP in piedi (bilanciere)
      'bbohp':      ['barbell overhead press','barbell military press','overhead press / military press','barbell ohp','bb overhead press'],
      // SPALLE — DB Shoulder Press seduto
      'dbpress':    ['dumbbell shoulder press','db shoulder press','dumbbell press seated','db press shoulder'],
      // SPALLE — DB Lateral Raise
      'dblateral':  ['dumbbell lateral raise','db lateral raise','lateral raise dumbbell'],
      // BICIPITI — DB Curl (manubri, NON cavi)
      'dbcurl':     ['dumbbell bicep curl','db bicep curl','dumbbell curl','db curl'],
      // BICIPITI — DB Hammer Curl
      'hammercurl': ['dumbbell hammer curl','db hammer curl','hammer curl','curl martello manubri'],
      // TRICIPITI — Rope Pushdown
      'tridown':    ['rope tricep pushdown','cable rope tricep pushdown','rope pushdown','tricep pushdown rope'],
      // TRICIPITI — Rope Overhead
      'triover':    ['rope overhead tricep','cable rope overhead tricep','overhead tricep extension high','overhead tricep rope'],
      // GAMBE — Leg Extension
      'legext':     ['machine leg extension','leg extension','estensione gambe'],
      // GAMBE — Leg Press (macchina fissa, NON moving chair)
      'legpress':   ['machine leg press','leg press'],
      // GAMBE — RDL
      'rdl':        ['barbell romanian deadlift','romanian deadlift','rdl','stacco rumeno'],
      // GAMBE — Calf Raise seduto
      'calf':       ['machine seated calf raise','seated calf raise','calf raise seated'],
      // GAMBE — Hip Thrust
      'hipthrust':  ['machine hip thrust','hip thrust','glute bridge','hip-thrust'],
      // GAMBE — Leg Curl
      'legcurl':    ['machine leg / hamstring curl prone','hamstring curl prone','leg curl prone','leg / hamstring curl'],
    };

    // Get session type to know which sentinels are expected
    for (const [sentinelId, keywords] of Object.entries(sentinelMap)) {
      // Find matching exercise in parsed data — try most specific keyword first
      // Trova TUTTI gli esercizi che matchano, poi sceglie il best set tra tutti
      const matches = data.exercises.filter(ex => {
        const name = ex.name.toLowerCase();
        return keywords.some(kw => name.includes(kw.toLowerCase()));
      });
      if (!matches.length) continue;

      const allWorkSets = matches.flatMap(ex => ex.sets.filter(s => s.label !== 'W'));
      if (!allWorkSets.length) continue;

      // Best set = set col kg più alto (tra tutti i match), a parità più reps
      const maxKg = Math.max(...allWorkSets.map(s => parseFloat(s.kg)));
      const topSets = allWorkSets.filter(s => parseFloat(s.kg) >= maxKg * 0.97);
      const best = topSets.reduce((a, b) => parseInt(b.reps) > parseInt(a.reps) ? b : a);
      const workSets = allWorkSets; // per il conteggio serie

      const kgEl   = document.querySelector(`[data-id="${dayId}"][data-f="sl_${sentinelId}_kg"]`);
      const repsEl = document.querySelector(`[data-id="${dayId}"][data-f="sl_${sentinelId}_reps"]`);
      const setsEl = document.querySelector(`[data-id="${dayId}"][data-f="sl_${sentinelId}_sets"]`);
      if (kgEl) kgEl.value = best.kg;
      if (repsEl) repsEl.value = best.reps;
      if (setsEl) setsEl.value = workSets.length;
    }

    // Store parsed data as JSON in a hidden field
    let hidden = document.querySelector(`[data-id="${dayId}"][data-f="motra_log"]`);
    if (!hidden) {
      hidden = document.createElement('input');
      hidden.type = 'hidden';
      hidden.dataset.id = dayId;
      hidden.dataset.f = 'motra_log';
      ta.parentNode.appendChild(hidden);
    }
    hidden.value = JSON.stringify(data);

    // Render parsed result
    const metaHtml = `
      <div class="motra-meta">
        ${data.durata ? `<div class="motra-meta-item"><div class="motra-meta-val">${data.durata}</div><div class="motra-meta-lbl">Durata</div></div>` : ''}
        ${data.volume ? `<div class="motra-meta-item"><div class="motra-meta-val">${data.volume}</div><div class="motra-meta-lbl">Volume</div></div>` : ''}
        ${data.calorie ? `<div class="motra-meta-item"><div class="motra-meta-val">${data.calorie}</div><div class="motra-meta-lbl">Calorie</div></div>` : ''}
        <div class="motra-meta-item"><div class="motra-meta-val">${data.exercises.length}</div><div class="motra-meta-lbl">Esercizi</div></div>
      </div>`;

    const exHtml = data.exercises.map(ex => {
      const workSets = ex.sets.filter(s => s.label !== 'W');
      const warmSets = ex.sets.filter(s => s.label === 'W');
      const setsStr = workSets.map(s => `${s.reps}×${s.kg}kg`).join(' · ');
      const warnStr = warmSets.length ? ` <span style="color:var(--faint);font-size:11px">(+${warmSets.length} riscald.)</span>` : '';
      return `<div class="motra-ex-row">
        <div class="motra-ex-name">${ex.name}</div>
        <div class="motra-ex-sets">${setsStr}${warnStr}</div>
      </div>`;
    }).join('');

    parsed.innerHTML = metaHtml + exHtml;
    parsed.className = 'motra-parsed show';

    res.className = 'motra-result ok';
    res.textContent = `✓ Importati ${data.exercises.length} esercizi · durata e kcal compilati automaticamente`;

  } catch(e) {
    res.className = 'motra-result err';
    res.textContent = 'Errore nel parsing: ' + e.message;
  }
}

function getPhase2(dayIdx) {
  const wk = Math.floor(dayIdx/7)+1;
  const peptidi = 'Fragment · Tesa · Ipa · BPC-157 · TB-500 · IGF-1 DES';
  if (wk<=4)  return {label:'Fase 1',  peptidi, badge:'p1'};
  if (wk<=8)  return {label:'Fase 2',  peptidi, badge:'p2', note:'BKK WK5–8'};
  if (wk<=12) return {label:'Fase 3',  peptidi, badge:'p3'};
  return             {label:'Fase 4',  peptidi, badge:'p4b'};
}

function getNextEvent2(elapsed) {
  const wk = Math.floor(elapsed/7)+1;
  if (wk<5)  { return `+ GHK-Cu tra ${(4-wk)*7} giorni (sett. 5)`; }
  if (wk<7)  { return `+ MOTS-C + IGF-1 DES tra ${(6-wk)*7} giorni (sett. 7)`; }
  if (wk<13) { return `+ BPC-157 + TB-500 tra ${(12-wk)*7} giorni (sett. 13)`; }
  return 'Fine ciclo · DEXA T1 + panel sangue';
}

function getWorkout2(dayIdx) {
  const d = new Date(START2); d.setDate(d.getDate()+dayIdx);

function getWeekRange2(wkIdx) {

function buildCycleCard2(container) {
  const today = new Date(); today.setHours(0,0,0,0);
  const start = new Date(START2); start.setHours(0,0,0,0);
  const elapsed = Math.floor((today-start)/86400000);
  const C = 2*Math.PI*30;

  let pct, wk, ph, nextEv, ringHtml, infoHtml;

  if (elapsed < 0) {
    const daysTo = Math.abs(elapsed);
    pct = 0;
    ringHtml = `<svg width="72" height="72" viewBox="0 0 72 72">
      <circle cx="36" cy="36" r="30" fill="none" stroke="#e8e8ed" stroke-width="5"/>
    </svg><div class="cycle-ring-label"><span class="cycle-ring-pct">—</span><span class="cycle-ring-sub">ciclo</span></div>`;
    infoHtml = `<h3>Protocollo peptidico · Ciclo 1</h3><p>Inizio tra <b>${daysTo}</b> giorni · 13 lug 2026</p><div class="cycle-next">⟶ Preparazione in corso</div>`;
  } else if (elapsed >= TOTAL_DAYS2) {
    ringHtml = `<svg width="72" height="72" viewBox="0 0 72 72">
      <circle cx="36" cy="36" r="30" fill="none" stroke="#34c759" stroke-width="5"/>
    </svg><div class="cycle-ring-label"><span class="cycle-ring-pct">✓</span><span class="cycle-ring-sub">fine</span></div>`;
    infoHtml = `<h3>Ciclo 1 completato</h3><p>112 giorni · 13 lug – 1 nov 2026</p>`;
  } else {
    pct = Math.min(100, Math.round((elapsed/TOTAL_DAYS2)*100));
    wk  = Math.floor(elapsed/7)+1;
    ph  = getPhase2(elapsed);
    nextEv = getNextEvent2(elapsed);
    const offset = C*(1-pct/100);
    ringHtml = `<svg width="72" height="72" viewBox="0 0 72 72">
      <circle cx="36" cy="36" r="30" fill="none" stroke="#e8e8ed" stroke-width="5"/>
      <circle cx="36" cy="36" r="30" fill="none" stroke="#0071e3" stroke-width="5"
        stroke-dasharray="${C.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}" stroke-linecap="round"/>
    </svg><div class="cycle-ring-label"><span class="cycle-ring-pct">${pct}%</span><span class="cycle-ring-sub">ciclo</span></div>`;
    infoHtml = `<h3>Settimana ${wk} · ${ph.label}</h3><p>Giorno ${elapsed+1} di ${TOTAL_DAYS2} · ${TOTAL_DAYS2-elapsed-1} giorni al termine</p><div class="cycle-next">⟶ ${nextEv}</div>`;
  }

  const card = document.createElement('div');
  card.className = 'cycle-card';
  card.innerHTML = `<div class="cycle-ring">${ringHtml}</div><div class="cycle-info">${infoHtml}</div>`;
  container.insertBefore(card, container.firstChild);
}

function buildWeekSummary2(container, wkIdx) {
  const today = new Date(); today.setHours(0,0,0,0);
  const start = new Date(START2); start.setHours(0,0,0,0);
  const elapsed = Math.floor((today - start) / 86400000);
  const currentWk = Math.floor(elapsed / 7);
  if (wkIdx !== currentWk) return null;

  const wkStart = wkIdx * 7;
  const wkEnd   = Math.min(wkStart + 7, TOTAL_DAYS2);
  const get = (id, f) => (_lastData2[id] && _lastData2[id][f]) || '';

  let totalInj=0,doneInj=0,totalWo=0,doneWo=0;
  let pesoSum=0,pesoCount=0,hrvSum=0,hrvCount=0;
  let rpeSum=0,rpeCount=0,sysSum=0,sysCount=0;
  let energiaSum=0,energiaCount=0,kcalTotal=0;

  for (let i=wkStart; i<wkEnd && i<=elapsed; i++) {
    const id = 'p2_day_'+i;
    const slots = getInjectionSlots2(i);
    totalInj += slots.length;
    slots.forEach(s => {
      s.fields.forEach(f => {
        if (get(id, 'inj_'+s.n+'_'+f.replace(/[\s\-]/g,'_')) === 'fatto') doneInj++;
      });
    });
    const wo = getWorkout2(i);
    if (wo.type !== 'Riposo') {
      totalWo++;
      const kcal = parseFloat(get(id,'wo_kcal'));
      const vol  = parseFloat(get(id,'wo_volume'));
      const rpe  = parseFloat(get(id,'rpe'));
      if (!isNaN(kcal)&&kcal>0 || !isNaN(vol)&&vol>0 || !isNaN(rpe)) {
        doneWo++;
        if (!isNaN(rpe)) { rpeSum+=rpe; rpeCount++; }
      }
    }
    const peso = parseFloat(get(id,'peso'));
    if (!isNaN(peso)) { pesoSum+=peso; pesoCount++; }
    const hrv = parseFloat(get(id,'hrv'));
    if (!isNaN(hrv)) { hrvSum+=hrv; hrvCount++; }
    const sys = parseFloat(get(id,'bp_sys'));
    if (!isNaN(sys)) { sysSum+=sys; sysCount++; }
    const en = parseFloat(get(id,'energia'));
    if (!isNaN(en)) { energiaSum+=en; energiaCount++; }
    const kcal2 = parseFloat(get(id,'wo_kcal'));
    if (!isNaN(kcal2)) kcalTotal+=kcal2;
  }

  const avgPeso    = pesoCount    ? (pesoSum/pesoCount).toFixed(1) : '—';
  const avgHrv     = hrvCount     ? Math.round(hrvSum/hrvCount)    : '—';
  const avgRpe     = rpeCount     ? (rpeSum/rpeCount).toFixed(1)   : '—';
  const avgSys     = sysCount     ? Math.round(sysSum/sysCount)    : '—';
  const avgEnergia = energiaCount ? (energiaSum/energiaCount).toFixed(1) : '—';
  const injColor   = totalInj>0 && doneInj===totalInj ? '#34c759' : doneInj>0 ? '#ff9500' : 'var(--text)';
  const daysLogged = pesoCount;

  const card = document.createElement('div');
  card.className = 'week-summary-card';
  card.id = 'week-summary2-'+wkIdx;
  card.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px">
      <div style="font-size:var(--fs-xs);font-weight:var(--fw-semi);color:var(--muted);letter-spacing:.06em;text-transform:uppercase">Riepilogo settimana ${wkIdx+1}</div>
      <div style="font-size:11px;color:var(--muted)">${daysLogged} gg registrati · ${getWeekRange2(wkIdx)}</div>
    </div>
    <div class="week-summary-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="ws-item"><div class="ws-val">${avgPeso}<span style="font-size:12px;font-weight:400"> kg</span></div><div class="ws-lbl">Peso medio</div></div>
      <div class="ws-item"><div class="ws-val">${avgHrv}<span style="font-size:12px;font-weight:400"> ms</span></div><div class="ws-lbl">HRV medio</div></div>
      <div class="ws-item"><div class="ws-val" style="color:${injColor}">${doneInj}/${totalInj}</div><div class="ws-lbl">Iniezioni</div></div>
      <div class="ws-item"><div class="ws-val">${doneWo}/${totalWo}</div><div class="ws-lbl">Workout</div></div>
    </div>
    <div class="week-summary-grid" style="grid-template-columns:repeat(4,1fr);margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
      <div class="ws-item"><div class="ws-val">${avgRpe}<span style="font-size:12px;font-weight:400">/10</span></div><div class="ws-lbl">RPE medio</div></div>
      <div class="ws-item"><div class="ws-val">${avgSys}<span style="font-size:12px;font-weight:400"> mmHg</span></div><div class="ws-lbl">Sistolica media</div></div>
      <div class="ws-item"><div class="ws-val">${avgEnergia}<span style="font-size:12px;font-weight:400">/10</span></div><div class="ws-lbl">Energia media</div></div>
      <div class="ws-item"><div class="ws-val">${kcalTotal>0?kcalTotal:'—'}<span style="font-size:12px;font-weight:400">${kcalTotal>0?' kcal':''}</span></div><div class="ws-lbl">Kcal totali</div></div>
    </div>`;
  return card;
}

function colorInjSelects(root) {

  r.querySelectorAll('.inj-grid select').forEach(sel => {

    sel.style.color = v === 'fatto' ? '#34c759' : v === 'skip' ? 'var(--muted)' : 'var(--text)';

    sel.style.background = v === 'fatto' ? 'rgba(52,199,89,.07)' : v === 'skip' ? 'var(--surface2)' : '';
  });
}

function saveProto2Data() {
  const data = _lastData2;
  document.querySelectorAll('#container2 [data-id]').forEach(el => {
    const id=el.dataset.id, f=el.dataset.f;
    if (!id||!f) return;
    if (!data[id]) data[id]={};
    data[id][f] = el.type==='checkbox' ? el.checked : el.value;
  });
  localStorage.setItem(KEY2, JSON.stringify(data));
}

function applyProto2Data() {
  Object.entries(_lastData2).forEach(([id,fields]) => {
    Object.entries(fields).forEach(([f,v]) => {
      const el = document.querySelector(`#container2 [data-id="${id}"][data-f="${f}"]`);
      if (!el) return;
      if (el.type==='checkbox') el.checked = !!v;
      else if (v!==''&&v!=null) el.value = v;
    });
    // Aggiorna quick-data visibili nella card chiusa
    const qPeso  = document.getElementById('q-'+id+'-peso');
    const qHrv   = document.getElementById('q-'+id+'-hrv');
    const qSonno = document.getElementById('q-'+id+'-ore_sonno');
    if (qPeso  && fields.peso)     { qPeso.textContent  = fields.peso;     qPeso.classList.remove('empty'); }
    if (qHrv   && fields.hrv)      { qHrv.textContent   = fields.hrv;      qHrv.classList.remove('empty'); }
    if (qSonno && fields.ore_sonno){ qSonno.textContent = fields.ore_sonno; qSonno.classList.remove('empty'); }
    // Iniezioni fatte vs totale
    if (id.startsWith('p2_day_')) {
      const dayIdx = parseInt(id.replace('p2_day_',''));
      if (!isNaN(dayIdx)) {
        const slots2 = getInjectionSlots2(dayIdx);
        let doneInj2 = 0, totalInj2 = 0;
        slots2.forEach(s => {
          s.fields.forEach(f2 => {
            totalInj2++;
            const key = 'inj_'+s.n+'_'+f2.replace(/[\s\-]/g,'_');
            if (fields[key] === 'fatto') doneInj2++;
          });
        });
        const qInj = document.getElementById('q-'+id+'-inj');
        if (qInj && totalInj2 > 0) {
          qInj.textContent = doneInj2+'/'+totalInj2;
          qInj.classList.remove('empty');
          qInj.style.color = doneInj2 === totalInj2 ? '#34c759' : doneInj2 > 0 ? '#ff9500' : '';
        }
        // Aderenza integratori — tutti i checkbox stack mattutino + serale
        const integrKeys = ['ck_d3','ck_b12','ck_omega','ck_creat','ck_zinc','ck_norm','ck_mag','ck_gly','ck_melatonina'];
        const doneIntegr = integrKeys.filter(k => fields[k] === true || fields[k] === '1' || fields[k] === 1).length;
        const qIntegr = document.getElementById('q-'+id+'-integr');
        if (qIntegr && doneIntegr > 0) {
          qIntegr.textContent = Math.round(doneIntegr/integrKeys.length*100)+'%';
          qIntegr.classList.remove('empty');
          qIntegr.style.color = doneIntegr === integrKeys.length ? '#34c759' : '#ff9500';
        }
      }
    }
  });
  colorInjSelects();
}

function ucFillDefaults(id) {
  const p = UC_PEPTIDES.find(x => x.id === id);
  if (!p) return;
  const mgEl = document.getElementById('uc-mg');
  const bacEl = document.getElementById('uc-bac');
  const targetEl = document.getElementById('uc-target');
  if (mgEl) mgEl.value = p.defaultMg;
  if (bacEl) bacEl.value = p.defaultBac;
  if (id !== 'custom' && targetEl) targetEl.value = p.dose_mcg;
  ucUpdate();
}

function ucUpdate() {
  const mgEl = document.getElementById('uc-mg');
  const bacEl = document.getElementById('uc-bac');
  const targetEl = document.getElementById('uc-target');
  const selEl = document.getElementById('uc-peptide');
  if (!mgEl || !bacEl || !targetEl || !selEl) return;

  const mg = parseFloat(mgEl.value) || 0;
  const bac = parseFloat(bacEl.value) || 0;
  const target = parseFloat(targetEl.value) || 0;
  const p = UC_PEPTIDES.find(x => x.id === selEl.value);

  const concEl = document.getElementById('uc-conc');
  const drawEl = document.getElementById('uc-draw');
  const dosesEl = document.getElementById('uc-doses');
  const bilatEl = document.getElementById('uc-bilat');

  if (bac <= 0) {
    if (concEl) concEl.textContent = '—';
    if (drawEl) drawEl.textContent = '—';
    if (dosesEl) dosesEl.textContent = '—';
    if (bilatEl) bilatEl.style.display = 'none';
    return;
  }

  const concMcgMl = (mg * 1000) / bac; // mcg/ml
  const drawUnits = concMcgMl > 0 ? (target / concMcgMl) * 100 : 0; // unità su siringa U-100
  const dosesPerVial = target > 0 ? Math.floor((mg * 1000) / target) : 0;

  if (concEl) concEl.textContent = concMcgMl.toFixed(0);
  if (drawEl) drawEl.textContent = drawUnits.toFixed(1);
  if (dosesEl) dosesEl.textContent = dosesPerVial;

  if (bilatEl) {
    if (p && p.bilat) {
      bilatEl.style.display = 'block';
      bilatEl.textContent = `→ ${(drawUnits/2).toFixed(1)} UI/lato (dose divisa bilaterale)`;
    } else {
      bilatEl.style.display = 'none';
    }
  }
}

function stockSaveNote(cid, vn, val) {
  const VKEY='stock_v2_vials'; let vd={};
  try{vd=JSON.parse(localStorage.getItem(VKEY)||'{}');}catch(e){}
  const k=cid+'_v'+vn; if(!vd[k])vd[k]={};
  vd[k].note=val; localStorage.setItem(VKEY,JSON.stringify(vd));
}


function stockCalcRecon(mg, bac, dosePerInj, stabilityDays, recoDate) {
  const conc = mg / bac;
  const ui = Math.round((dosePerInj / conc) * 100 * 10) / 10;
  let expire = '—';
  if (recoDate) {
    const d = new Date(recoDate); d.setDate(d.getDate() + stabilityDays);
    const today = new Date(); today.setHours(0,0,0,0); d.setHours(0,0,0,0);
    const dLeft = Math.floor((d - today) / 86400000);
    expire = d.toLocaleDateString('it-IT',{day:'numeric',month:'short',year:'numeric'});
    expire += dLeft < 0 ? ' ⛔ SCADUTO' : dLeft <= 5 ? ` ⚠️ ${dLeft}gg` : ` (+${dLeft}gg)`;
  }
  return { conc: conc.toFixed(1), ui: ui.toFixed(1), expire };
}

function stockSaveRecon(cid, vn) {
  const VKEY = 'stock_v2_vials';
  let vd = {}; try { vd = JSON.parse(localStorage.getItem(VKEY)||'{}'); } catch(e) {}
  const k = `${cid}_v${vn}`;
  if (!vd[k]) vd[k] = {};
  const mgEl   = document.getElementById(`mg-${cid}-${vn}`);
  const bacEl  = document.getElementById(`bac-${cid}-${vn}`);
  const recoEl = document.getElementById(`reco-${cid}-${vn}`);
  if (mgEl)   vd[k].mg   = mgEl.value;
  if (bacEl)  vd[k].bac  = bacEl.value;
  if (recoEl) vd[k].reco = recoEl.value;
  localStorage.setItem(VKEY, JSON.stringify(vd));
  // Ricalcola e aggiorna UI senza rebuild
  const el2 = document.getElementById(`stock2-view`);
  if (el2) { delete el2.dataset.built; el2.innerHTML=''; buildStockView2(); }
}

function stockSetStato(cid, vn, stato) {
  const VKEY = 'stock_v2_vials';
  let vd = {}; try { vd = JSON.parse(localStorage.getItem(VKEY)||'{}'); } catch(e) {}
  const k = `${cid}_v${vn}`;
  if (!vd[k]) vd[k] = {};
  vd[k].stato = stato;
  localStorage.setItem(VKEY, JSON.stringify(vd));
  const el2 = document.getElementById('stock2-view');

}

  // ── SPARKLINE SVG ─────────────────────────────
  function sparkline(pts, w, h, color, refMin, refMax) {
    if (pts.length < 2) {
      // punto singolo — solo dot
      return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
        <circle cx="${w/2}" cy="${h/2}" r="4" fill="${color}"/>
      </svg>`;
    }
    const vals = pts.map(p=>p.v);
    const minV = Math.min(...vals), maxV = Math.max(...vals);
    const pad = 6;
    const range = maxV - minV || 1;
    const toX = (i) => pad + (i / (pts.length-1)) * (w - pad*2);
    const toY = (v) => h - pad - ((v - minV) / range) * (h - pad*2);

    let refBand = '';
    if (refMin !== undefined && refMax !== undefined) {
      const y1 = Math.min(toY(refMin), toY(refMax));
      const y2 = Math.max(toY(refMin), toY(refMax));
      refBand = `<rect x="0" y="${Math.max(0,y1)}" width="${w}" height="${Math.min(h,y2)-Math.max(0,y1)}" fill="rgba(52,199,89,.08)"/>`;
    } else if (refMin !== undefined) {
      const yRef = toY(refMin);
      refBand = `<line x1="0" y1="${yRef}" x2="${w}" y2="${yRef}" stroke="rgba(52,199,89,.4)" stroke-width="1" stroke-dasharray="3,3"/>`;
    }

    const polyPts = pts.map((p,i) => `${toX(i)},${toY(p.v)}`).join(' ');
    // area fill
    const areaBottom = h - pad;
    const areaPts = `${toX(0)},${areaBottom} ${polyPts} ${toX(pts.length-1)},${areaBottom}`;

    const dots = pts.map((p,i) => {
      const ok = (refMin === undefined || p.v >= refMin) && (refMax === undefined || p.v <= refMax);
      const dc = ok ? color : '#ff3b30';
      return `<circle cx="${toX(i)}" cy="${toY(p.v)}" r="3" fill="${dc}" stroke="white" stroke-width="1.5"/>`;
    }).join('');

    const lastVal = pts[pts.length-1].v;
    const prevVal = pts[pts.length-2]?.v;
    const lastX = toX(pts.length-1), lastY = toY(lastVal);

    return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
      ${refBand}
      <polygon points="${areaPts}" fill="${color}" opacity="0.08"/>
      <polyline points="${polyPts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}
    </svg>`;
  }

  // ── BARRA PROGRESSO ──────────────────────────
  function progressBar(current, target, max, color, label) {
    const pct = Math.min(100, (current/target)*100).toFixed(0);
    const warn = current < target;
    const barColor = warn ? '#ff9500' : color;
    return `<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px">
        <span style="font-weight:500">${label}</span>
        <span style="color:${warn?'#ff9500':'#34c759'};font-weight:600">${current} <span style="color:var(--muted);font-weight:400">/ target ${target}</span></span>
      </div>
      <div style="background:var(--border);border-radius:4px;height:6px;overflow:hidden">
        <div style="background:${barColor};height:6px;width:${pct}%;border-radius:4px;transition:width .5s ease"></div>
      </div>
    </div>`;
  }

  // ── KPI CARD ─────────────────────────────────
  function kpiCard(label, pts, unit, refMin, refMax, targetLabel, color) {
    const last = pts[pts.length-1];
    const prev = pts[pts.length-2];
    const delta = prev ? (last.v - prev.v) : null;
    const isOk = (refMin === undefined || last.v >= refMin) && (refMax === undefined || last.v <= refMax);
    const valColor = isOk ? '#34c759' : (Math.abs(last.v - (refMin||refMax)) < (refMin||refMax)*0.15 ? '#ff9500' : '#ff3b30');
    const arrow = delta === null ? '' : delta > 0 ? '↑' : delta < 0 ? '↓' : '→';
    const arrowColor = delta === null ? '' :
      (refMin && delta > 0) || (refMax && delta < 0) ? '#34c759' : '#ff3b30';
    const spark = sparkline(pts, 120, 50, color, refMin, refMax);
    return `<div style="background:var(--surface);border-radius:12px;padding:16px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:6px">
      <div class="t-section-title" style="margin-bottom:6px">${label}</div>
      <div style="display:flex;align-items:flex-end;justify-content:space-between">
        <div>
          <span style="font-size:var(--fs-2xl);font-weight:var(--fw-semi);letter-spacing:-.03em;color:${valColor}">${last.v}</span>
          <span style="font-size:12px;color:var(--muted);margin-left:3px">${unit}</span>
          ${delta !== null ? `<span style="font-size:13px;font-weight:600;color:${arrowColor};margin-left:6px">${arrow}${Math.abs(delta).toFixed(delta%1===0?0:1)}</span>` : ''}
        </div>
        <div>${spark}</div>
      </div>
      <div style="font-size:var(--fs-xs);color:var(--muted)">${targetLabel} · ultimo: <span style="font-weight:500">${last.d}</span></div>
    </div>`;
  }

  // ── CHART A LINEE MULTI-SERIE ─────────────────
  function lineChart(series, w, h) {
    // series: [{label, pts:[{d,v}], color, refMin, refMax}]
    const allVals = series.flatMap(s=>s.pts.map(p=>p.v));
    const allDates = [...new Set(series.flatMap(s=>s.pts.map(p=>p.t)))].sort();
    const minV = Math.min(...allVals)*0.9, maxV = Math.max(...allVals)*1.1;
    const pad = {t:10,r:10,b:28,l:36};
    const iW = w-pad.l-pad.r, iH = h-pad.t-pad.b;
    const toX = (t) => pad.l + (allDates.indexOf(t)/Math.max(allDates.length-1,1))*iW;
    const toY = (v) => pad.t + iH - ((v-minV)/(maxV-minV||1))*iH;

    // grid lines
    const nGrid = 4;
    let gridLines = '', gridLabels = '';
    for (let i=0;i<=nGrid;i++) {
      const y = pad.t + (i/nGrid)*iH;
      const v = (maxV - (maxV-minV)*(i/nGrid)).toFixed(0);
      gridLines += `<line x1="${pad.l}" y1="${y}" x2="${w-pad.r}" y2="${y}" stroke="var(--border)" stroke-width="1"/>`;
      gridLabels += `<text x="${pad.l-4}" y="${y+4}" text-anchor="end" font-size="9" fill="var(--muted)">${v}</text>`;
    }

    // x labels (solo primo e ultimo e qualche intermedio)
    let xLabels = '';
    const showIdx = [0, Math.floor(allDates.length/2), allDates.length-1].filter((v,i,a)=>a.indexOf(v)===i);
    // ricavo label leggibile dalle date
    const dateLookup = {};
    series.forEach(s=>s.pts.forEach(p=>{ dateLookup[p.t]=p.d; }));
    showIdx.forEach(i => {
      const t = allDates[i];
      const x = toX(t);
      const lbl = (dateLookup[t]||t).replace(' 2026','').replace(' 20','\'');
      xLabels += `<text x="${x}" y="${h-4}" text-anchor="middle" font-size="9" fill="var(--muted)">${lbl}</text>`;
    });

    // ref band (prima serie)
    let refBands = '';
    series.forEach(s => {
      if (s.refMin !== undefined) {
        const yRef = toY(s.refMin);
        refBands += `<line x1="${pad.l}" y1="${yRef}" x2="${w-pad.r}" y2="${yRef}" stroke="${s.color}" stroke-width="1" stroke-dasharray="4,3" opacity=".4"/>`;
      }
    });

    // linee e dots
    let lines = '', dots = '';
    series.forEach(s => {
      const validPts = s.pts.filter(p=>allDates.includes(p.t));
      if (validPts.length < 1) return;
      const polyPts = validPts.map(p=>`${toX(p.t)},${toY(p.v)}`).join(' ');
      lines += `<polyline points="${polyPts}" fill="none" stroke="${s.color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
      validPts.forEach(p => {
        const ok = (s.refMin===undefined||p.v>=s.refMin)&&(s.refMax===undefined||p.v<=s.refMax);
        dots += `<circle cx="${toX(p.t)}" cy="${toY(p.v)}" r="3.5" fill="${ok?s.color:'#ff3b30'}" stroke="white" stroke-width="1.5"/>`;
      });
      // label ultimo valore
      const lastP = validPts[validPts.length-1];
      lines += `<text x="${toX(lastP.t)+7}" y="${toY(lastP.v)+4}" font-size="10" fill="${s.color}" font-weight="600">${lastP.v}</text>`;
    });

    return `<svg width="100%" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet" style="overflow:visible">
      ${gridLines}${gridLabels}${xLabels}${refBands}${lines}${dots}
    </svg>`;
  }

  // ══════════════════════════════════════════════
  //  RENDER
  // ══════════════════════════════════════════════
  let html = `<div class="app-view-inner view-wrap">
