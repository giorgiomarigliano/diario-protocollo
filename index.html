    {id:'patate',       name:'Patate (bollite)',             cat:'carbo',   unit:'g',  ref:200,  kcal100:77,  p100:2,    c100:17,  g100:0.1,  note:'GI medio · raffreddare abbassa GI'},
    {id:'pane',         name:'Pane bianco (ref. 100g)',      cat:'carbo',   unit:'g',  ref:100,  kcal100:275, p100:9,    c100:56,  g100:1.3,  note:'GI alto · riferimento comparativo'},
    // FRUTTA
    {id:'fragole',      name:'Fragole',                      cat:'frutta',  unit:'g',  ref:250,  kcal100:32,  p100:0.7,  c100:7,   g100:0.3,  note:'GI basso · antiossidanti · post-WO ok'},
    {id:'ananas',       name:'Ananas',                       cat:'frutta',  unit:'g',  ref:250,  kcal100:50,  p100:0.5,  c100:12,  g100:0.1,  note:'GI medio · enzimi digestivi (bromelina)'},
    {id:'banana',       name:'Banana (1 media ~120g polpa)', cat:'frutta',  unit:'g',  ref:120,  kcal100:89,  p100:1.1,  c100:23,  g100:0.3,  note:'GI medio-alto · potassio · buona pre-WO'},
    {id:'mela',         name:'Mela (1 media ~150g polpa)',   cat:'frutta',  unit:'g',  ref:150,  kcal100:52,  p100:0.3,  c100:14,  g100:0.2,  note:'GI basso · fibra · saziante'},

    // ── VERDURE ──
    {id:'carciofi',     name:'Carciofi',                    cat:'verdure', unit:'g',  ref:200,  kcal100:47,  p100:3,    c100:5,   g100:0.2,  note:'Alto contenuto di fibra'},
    {id:'mais',         name:'Mais dolce sottovuoto Esselunga', cat:'verdure', unit:'g', ref:140, kcal100:83, p100:2.6, c100:12.2, g100:1.8, note:'1 scatoletta 140g sgocciolato · da etichetta'},
    {id:'avocado',      name:'Avocado (intero, polpa)',      cat:'verdure', unit:'g',  ref:150,  kcal100:160, p100:2,    c100:2,   g100:15,   note:'1 avocado medio = ~150g polpa · grassi monoinsaturi'},
  ];

  const CATS = {
    carne:   {label:'Carne',        color:'#ef4444'},
    pesce:   {label:'Pesce',        color:'#3b82f6'},
    uova:    {label:'Uova & albumi',color:'#f59e0b'},
    dairy:   {label:'Latticini',    color:'#8b5cf6'},
    integ:   {label:'Integratori',  color:'#10b981'},
    snack:   {label:'Snack',        color:'#f97316'},
    carbo:   {label:'Carboidrati',  color:'#06b6d4'},
    verdure: {label:'Verdure',      color:'#84cc16'},
    frutta:  {label:'Frutta',       color:'#f43f5e'},
  };

  // Stato builder pasto
  let meal = {}; // id → {food, grams}
  let searchQ = '';
  let filterCat = 'all';

  function macroFor(food, grams) {
    // Per alimenti con valori fissi (barrette, porzioni preconfezionate)
    if (food.fixed) {
      const mult = grams; // grams = numero di unità
      return {
        kcal: Math.round(food.fixed.kcal * mult),
        p:    Math.round(food.fixed.p * mult * 10) / 10,
        c:    Math.round(food.fixed.c * mult * 10) / 10,
        g:    Math.round(food.fixed.g * mult * 10) / 10,
      };
    }
    const r = grams / 100;
    return {
      kcal: Math.round(food.kcal100 * r),
      p:    Math.round(food.p100 * r * 10) / 10,
      c:    Math.round(food.c100 * r * 10) / 10,
      g:    Math.round(food.g100 * r * 10) / 10,
    };
  }

  function mealTotals() {
    let tk=0,tp=0,tc=0,tg=0;
    Object.values(meal).forEach(({food, grams}) => {
      const m = macroFor(food, grams);
      tk+=m.kcal; tp+=m.p; tc+=m.c; tg+=m.g;
    });
    return {kcal:Math.round(tk), p:Math.round(tp*10)/10, c:Math.round(tc*10)/10, g:Math.round(tg*10)/10};
  }

  function renderAll() {
    renderList();
    renderMeal();
  }

  function renderList() {
    const container = document.getElementById('fd-list');
    if (!container) return;
    const filtered = FOODS.filter(f => {
      const matchCat = filterCat === 'all' || f.cat === filterCat;
      const matchQ = !searchQ || f.name.toLowerCase().includes(searchQ);
      return matchCat && matchQ;
    });

    if (!filtered.length) {
      container.innerHTML = '<p style="font-size:13px;color:var(--text-muted);padding:1rem">Nessun alimento trovato.</p>';
      return;
    }

    // Raggruppa per categoria
    const byCat = {};
    filtered.forEach(f => { (byCat[f.cat] = byCat[f.cat]||[]).push(f); });

    let html = '';
    Object.entries(byCat).forEach(([cat, foods]) => {
      const ci = CATS[cat];
      html += `<div style="margin-bottom:4px">
        <div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:${ci.color};padding:8px 0 4px">${ci.label}</div>`;
      foods.forEach(f => {
        const inMeal = !!meal[f.id];
        const por = inMeal ? meal[f.id].grams : f.ref;
        const m = macroFor(f, por);
        const unitLabel = f.unit === 'porz' ? 'porz' : f.unit === 'barr' ? 'barr' : 'g';
        html += `<div class="fd-row ${inMeal?'fd-in-meal':''}" data-id="${f.id}" style="display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;border:0.5px solid ${inMeal?ci.color:'transparent'};background:${inMeal?ci.color+'10':'transparent'};transition:background .12s;margin-bottom:2px" onclick="fdToggle('${f.id}')">
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:500;color:var(--text-primary)">${f.name}</div>
            <div style="font-size:11px;color:var(--text-muted)">${f.ref}${unitLabel} · ${f.note}</div>
          </div>
          <div style="display:flex;gap:12px;flex-shrink:0;text-align:right">
            <div><span style="font-size:12px;font-weight:500;color:var(--text-primary)">${m.kcal}</span><span style="font-size:10px;color:var(--text-muted);display:block">kcal</span></div>
            <div><span style="font-size:12px;font-weight:500;color:#1a7a3a">${m.p}g</span><span style="font-size:10px;color:var(--text-muted);display:block">prot</span></div>
            <div><span style="font-size:12px;font-weight:500;color:#185fa5">${m.c}g</span><span style="font-size:10px;color:var(--text-muted);display:block">carb</span></div>
            <div><span style="font-size:12px;font-weight:500;color:#854f0b">${m.g}g</span><span style="font-size:10px;color:var(--text-muted);display:block">gras</span></div>
          </div>
          <div style="font-size:18px;color:${inMeal?ci.color:'var(--border-strong)'};flex-shrink:0;width:20px;text-align:center">${inMeal?'✓':'+'}</div>
        </div>`;
      });
      html += '</div>';
    });
    container.innerHTML = html;
  }

  function renderMeal() {
    const container = document.getElementById('fd-meal');
    const totEl = document.getElementById('fd-totals');
    if (!container) return;

    const items = Object.values(meal);
    if (!items.length) {
      container.innerHTML = '<p style="font-size:13px;color:var(--text-muted);padding:1rem 0">Aggiungi alimenti dalla lista a sinistra.</p>';
      totEl.style.display = 'none';
      return;
    }

    totEl.style.display = '';
    const tot = mealTotals();
    document.getElementById('fd-tot-kcal').textContent = tot.kcal;
    document.getElementById('fd-tot-p').textContent = tot.p + 'g';
    document.getElementById('fd-tot-c').textContent = tot.c + 'g';
    document.getElementById('fd-tot-g').textContent = tot.g + 'g';

    let html = '';
    items.forEach(({food, grams}) => {
      const ci = CATS[food.cat];
      const m = macroFor(food, grams);
      const unitLabel = food.unit === 'porz' ? 'porzione' : food.unit === 'barr' ? 'barr × 50g' : 'g';
      html += `<div style="border:0.5px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;border-left:3px solid ${ci.color}">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="font-size:13px;font-weight:500;flex:1;color:var(--text-primary)">${food.name}</span>
          <button onclick="fdRemove('${food.id}')" style="font-size:11px;padding:2px 8px;border-radius:10px;border:0.5px solid var(--border);background:var(--surface-1);color:var(--text-muted);cursor:pointer">rimuovi</button>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <input type="number" value="${grams}" min="1" max="1000" step="${food.unit==='g'?10:1}"
            style="width:64px;font-size:13px;padding:4px 8px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--surface-1);color:var(--text-primary);text-align:center"
            onchange="fdUpdate('${food.id}', this.value)">
          <span style="font-size:11px;color:var(--text-muted)">${unitLabel}</span>
          <div style="flex:1;display:flex;gap:10px;justify-content:flex-end">
            <span style="font-size:12px;font-weight:500;color:var(--text-primary)">${m.kcal} kcal</span>
            <span style="font-size:12px;font-weight:500;color:#1a7a3a">${m.p}g P</span>
            <span style="font-size:12px;font-weight:500;color:#185fa5">${m.c}g C</span>
            <span style="font-size:12px;font-weight:500;color:#854f0b">${m.g}g G</span>
          </div>
        </div>
      </div>`;
    });
    container.innerHTML = html;
  }

  window.fdToggle = function(id) {
    if (meal[id]) { delete meal[id]; }
    else {
      const f = FOODS.find(x => x.id === id);
      if (f) meal[id] = {food: f, grams: f.ref};
    }
    renderAll();
  };
  window.fdRemove = function(id) { delete meal[id]; renderAll(); };
  window.fdUpdate = function(id, val) {
    if (meal[id]) { meal[id].grams = parseFloat(val)||1; renderMeal(); }
  };

  // CSS
  const style = document.createElement('style');
  style.textContent = '.fd-row:hover{background:var(--surface-1)!important}';
  document.head.appendChild(style);

  // HTML struttura
  el.innerHTML = `<div class="app-view-inner view-wrap">
    <div class="week-hdr" style="margin-bottom:1.25rem">
      <h2>Leggenda alimenti</h2>
      <span class="week-range">Macro di riferimento + costruttore pasto</span>
    </div>

    <div style="display:grid;grid-template-columns:1fr 340px;gap:16px;align-items:start">

      <!-- Colonna sinistra: lista alimenti -->
      <div>
        <!-- Search + filtri -->
        <div style="margin-bottom:10px;display:flex;gap:8px">
          <input type="text" id="fd-search" placeholder="Cerca alimento..."
            style="flex:1;font-size:13px;padding:7px 12px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--surface-1);color:var(--text-primary)"
            oninput="fdSearch(this.value)">
        </div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px" id="fd-cat-filters">
          <button class="fd-cat-btn fd-cat-on" data-cat="all" onclick="fdCat('all',this)"
            style="font-size:11px;padding:3px 10px;border-radius:20px;border:0.5px solid var(--border);background:var(--text-primary);color:var(--surface-2);cursor:pointer">Tutti</button>
          ${Object.entries(CATS).map(([cat,ci]) =>
            `<button class="fd-cat-btn" data-cat="${cat}" onclick="fdCat('${cat}',this)"
              style="font-size:11px;padding:3px 10px;border-radius:20px;border:0.5px solid ${ci.color};color:${ci.color};background:transparent;cursor:pointer">${ci.label}</button>`
          ).join('')}
        </div>
        <!-- Intestazione colonne -->
        <div style="display:flex;align-items:center;padding:0 10px 6px;border-bottom:0.5px solid var(--border);margin-bottom:4px">
          <div style="flex:1;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted)">Alimento · porzione di riferimento</div>
          <div style="display:flex;gap:12px;flex-shrink:0;text-align:right">
            <div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);width:32px">kcal</div>
            <div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:#1a7a3a;width:32px">prot</div>
            <div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:#185fa5;width:32px">carb</div>
            <div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:#854f0b;width:32px">gras</div>
          </div>
          <div style="width:28px"></div>
        </div>
        <div id="fd-list"></div>
      </div>

      <!-- Colonna destra: builder pasto -->
      <div style="position:sticky;top:80px">
        <div style="background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:1rem">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
            <div style="font-size:13px;font-weight:500;color:var(--text-primary)">Costruttore pasto</div>
            <button onclick="fdClear()" style="font-size:11px;padding:2px 8px;border-radius:10px;border:0.5px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer">Svuota</button>
          </div>
          <div id="fd-meal"></div>
          <!-- Totali -->
          <div id="fd-totals" style="display:none;margin-top:10px;background:var(--surface-1);border-radius:var(--radius);padding:10px 12px">
            <div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:8px">Totale pasto</div>
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;text-align:center">
              <div><div style="font-size:18px;font-weight:500;color:var(--text-primary)" id="fd-tot-kcal">0</div><div style="font-size:10px;color:var(--text-muted)">kcal</div></div>
              <div><div style="font-size:18px;font-weight:500;color:#1a7a3a" id="fd-tot-p">0g</div><div style="font-size:10px;color:var(--text-muted)">proteine</div></div>
              <div><div style="font-size:18px;font-weight:500;color:#185fa5" id="fd-tot-c">0g</div><div style="font-size:10px;color:var(--text-muted)">carb</div></div>
              <div><div style="font-size:18px;font-weight:500;color:#854f0b" id="fd-tot-g">0g</div><div style="font-size:10px;color:var(--text-muted)">grassi</div></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>`;

  window.fdSearch = function(q) { searchQ = q.toLowerCase(); renderList(); };
  window.fdCat = function(cat, btn) {
    filterCat = cat;
    document.querySelectorAll('.fd-cat-btn').forEach(b => {
      const bc = b.dataset.cat;
      const ci = CATS[bc];
      b.style.background = bc === cat ? (ci ? ci.color : 'var(--text-primary)') : 'transparent';
      b.style.color = bc === cat ? 'var(--surface-2)' : (ci ? ci.color : 'var(--text-primary)');
      b.style.borderColor = ci ? ci.color : 'var(--border)';
    });
    renderList();
  };
  window.fdClear = function() { meal = {}; renderAll(); };

  renderAll();
}

// ── TAB STORICO ALLENAMENTI ────────────────────────────────────────────────
// history_sessions / muscle_volume_summary / ready_to_progress sono precalcolati
// e salvati come chiavi top-level nel JSONB "data" (sorelle di day_N), NON derivati
// qui — coprono anche lo storico pre-app (da maggio 2026) con tag muscolo multipli.
// Vedi anche saveData(): deve preservare queste chiavi ad ogni "Salva".
function buildHistoryTab() {
  const el = document.getElementById('history-view');
  el.innerHTML = '<div class="app-view-inner view-wrap"><p style="color:var(--text-muted);padding:2rem 0">Caricamento storico...</p></div>';

  const sessions = (_lastData && _lastData.history_sessions) || [];
  const muscleVol = (_lastData && _lastData.muscle_volume_summary) || [];

  const TYPE_COLOR = {
    Push:'#ff3b30', Pull:'#34c759', Legs:'#ff9500', 'Upper Sab':'#af52de', 'Upper Dom':'#0071e3'
  };
  function guessType(title) {
    const t = title.toLowerCase();
    if (t.includes('gambe') || t.includes('glute')) return 'Legs';
    if (t.includes('dorso') && (t.includes('bicip') || t.includes('spall'))) return 'Pull';
    if (t.includes('petto') && t.includes('tricip')) return 'Push';
    if (t.includes('mattina') && (t.includes('spalle') || t.includes('parte superiore'))) return 'Upper Dom';
    if (t.includes('sabato')) return 'Upper Sab';
    return 'Altro';
  }

  let searchQ = '';
  let expandedIdx = null;

  function renderSessionList() {
    const filtered = sessions.filter(s =>
      !searchQ || s.title.toLowerCase().includes(searchQ) ||
      s.exercises.some(e => e.name.toLowerCase().includes(searchQ))
    ).slice().reverse(); // più recenti prima

    if (!filtered.length) return '<p style="font-size:13px;color:var(--text-muted);padding:1rem 0">Nessuna sessione trovata.</p>';

    return filtered.map((s) => {
      const realIdx = sessions.indexOf(s);
      const type = guessType(s.title);
      const color = TYPE_COLOR[type] || '#8e8e93';
      const isOpen = expandedIdx === realIdx;
      const dateObj = new Date(s.date + 'T00:00:00');
      const dateLabel = dateObj.toLocaleDateString('it-IT', {weekday:'short', day:'2-digit', month:'short'});
      return `<div style="border:0.5px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden">
        <div onclick="hsToggle(${realIdx})" style="display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;background:var(--surface-2)">
          <div style="width:4px;height:32px;border-radius:2px;background:${color};flex-shrink:0"></div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:500;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.title}</div>
            <div style="font-size:11px;color:var(--text-muted)">${dateLabel} · ${s.time}</div>
          </div>
          <div style="display:flex;gap:10px;flex-shrink:0;text-align:right">
            <div><span style="font-size:12px;font-weight:500;color:var(--text-primary)">${s.duration_min}'</span></div>
            <div><span style="font-size:12px;font-weight:500;color:var(--text-primary)">${((s.volume_kg||0)/1000).toFixed(1)}t</span></div>
            <div><span style="font-size:12px;font-weight:500;color:var(--text-primary)">${s.kcal||'—'}</span><span style="font-size:9px;color:var(--text-muted)"> kcal</span></div>
          </div>
          <div style="font-size:14px;color:var(--text-muted);transform:rotate(${isOpen?'90':'0'}deg);transition:transform .15s">›</div>
        </div>
        ${isOpen ? `<div style="padding:10px 12px;background:var(--surface-1)">
          ${s.exercises.map(ex => {
            const setsStr = ex.sets.map(st => `${st.kg||'—'}×${st.reps||'—'}`).join('  ·  ');
            return `<div style="padding:5px 0;border-bottom:0.5px solid var(--border);font-size:12px">
              <span style="font-weight:500;color:var(--text-primary)">${ex.name}</span>
              <span style="color:var(--text-muted);float:right">${setsStr}</span>
            </div>`;
          }).join('')}
        </div>` : ''}
      </div>`;
    }).join('');
  }

  function renderMuscleChart() {
    if (!muscleVol.length) return '';
    const max = Math.max(...muscleVol.map(m => m.volume_kg));
    const LABELS_IT = {shoulders:'Spalle', lats:'Dorso (lat)', chest:'Petto', triceps:'Tricipiti',
      quads:'Quadricipiti', glutes:'Glutei', traps:'Trapezi', biceps:'Bicipiti',
      hamstrings:'Femorali', calves:'Polpacci', lowerBack:'Lombari', unknown:'Altro'};
    const COLORS = {shoulders:'#0071e3', lats:'#34c759', chest:'#ff3b30', triceps:'#af52de',
      quads:'#ff9500', glutes:'#ff2d55', traps:'#5ac8fa', biceps:'#ffcc00',
      hamstrings:'#34aadc', calves:'#8e8e93', lowerBack:'#a2845e', unknown:'#c7c7cc'};
    return muscleVol.map(m => {
      const pct = (m.volume_kg / max * 100).toFixed(0);
      const label = LABELS_IT[m.muscle] || m.muscle;
      const color = COLORS[m.muscle] || '#8e8e93';
      return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <div style="width:90px;font-size:11px;color:var(--text-secondary);flex-shrink:0;text-align:right">${label}</div>
        <div style="flex:1;height:16px;background:var(--surface-1);border-radius:4px;overflow:hidden">
          <div style="width:${pct}%;height:100%;background:${color};border-radius:4px"></div>
        </div>
        <div style="width:60px;font-size:11px;font-weight:500;color:var(--text-primary);flex-shrink:0">${(m.volume_kg/1000).toFixed(1)}t</div>
      </div>`;
    }).join('');
  }

  // Riposo pianificato: Lun/Gio (dow 0/3 in indicizzazione Lun-based). NON blocca più
  // il tracking — è solo un'indicazione informativa (puntino), la cella resta
  // allenabile come le altre (utile per BKK e trasferte dove si può allenarsi 7/7).
  const SCHED_REST_DOW = [0, 3];
  let adherenceExpanded = false;

  function computeAdherence() {
    const dates = new Set(sessions.map(s => s.date));
    const today = new Date(); today.setHours(0,0,0,0);

    // Streak record: cerca la sequenza più lunga di giorni consecutivi allenati
    // su TUTTO lo storico disponibile (non solo le settimane mostrate).
    const sortedDates = sessions.map(s => s.date).sort();
    let recordStreak = 0, run = 0, prevD = null;
    sortedDates.forEach(dstr => {
      const d = new Date(dstr + 'T00:00:00');
      if (prevD) {
        const diffDays = Math.round((d - prevD) / 86400000);
        run = (diffDays === 1) ? run + 1 : 1;
      } else { run = 1; }
      recordStreak = Math.max(recordStreak, run);
      prevD = d;
    });

    // Streak attuale: parte da oggi (o da ieri se oggi non ancora allenato) e
    // conta all'indietro finché trova giorni consecutivi allenati.
    let cursor = new Date(today);
    if (!dates.has(localDateStr(cursor))) cursor.setDate(cursor.getDate() - 1);
    let currentStreak = 0;
    while (dates.has(localDateStr(cursor))) { currentStreak++; cursor.setDate(cursor.getDate() - 1); }

    // Lunedì della settimana corrente (contiene "oggi") — è sempre l'ultima
    // settimana mostrata, mai una settimana futura non ancora iniziata.
    const dowOffsetToday = (today.getDay() + 6) % 7;
    const currentMonday = new Date(today); currentMonday.setDate(currentMonday.getDate() - dowOffsetToday);

    // Non si torna indietro oltre l'inizio reale del tracciamento (primo
    // giorno presente in history_sessions): altrimenti le settimane precedenti
    // all'uso dell'app risulterebbero "0/7" e falserebbero % e media, quando
    // in realtà l'app semplicemente non esisteva ancora.
    let earliestMonday = currentMonday;
    if (sortedDates.length) {
      const firstD = new Date(sortedDates[0] + 'T00:00:00');
      const dowOffsetFirst = (firstD.getDay() + 6) % 7;
      earliestMonday = new Date(firstD); earliestMonday.setDate(earliestMonday.getDate() - dowOffsetFirst);
    }
    const weeksAvailable = Math.round((currentMonday - earliestMonday) / (7 * 86400000)) + 1;
    const weeksToShow = Math.max(1, Math.min(12, weeksAvailable));

    const weeks = [];
    for (let w = 0; w < weeksToShow; w++) {
      const weekStart = new Date(currentMonday);
      weekStart.setDate(weekStart.getDate() - 7 * (weeksToShow - 1 - w));
      const week = [];
      for (let d = 0; d < 7; d++) {
        const dayDate = new Date(weekStart); dayDate.setDate(dayDate.getDate() + d);
        const dstr = localDateStr(dayDate);
        week.push({
          date: dayDate,
          active: dates.has(dstr),
          future: dayDate > today,
          schedRest: SCHED_REST_DOW.includes(d)
        });
      }
      weeks.push(week);
    }

    const nonFutureCells = weeks.flat().filter(d => !d.future);
    const activeCells = nonFutureCells.filter(d => d.active);
    const pct = nonFutureCells.length ? Math.round(activeCells.length / nonFutureCells.length * 100) : 0;
    const avgPerWeek = weeks.length ? (activeCells.length / weeks.length) : 0;

    // Secondo indicatore: aderenza calcolata solo sui giorni in cui l'allenamento
    // era previsto (esclude i rest-day pianificati dal denominatore). Un giorno
    // di riposo rispettato non conta né a favore né contro qui — solo i giorni
    // "in programma" (Mar/Mer/Ven/Sab/Dom) entrano nel calcolo.
    const plannedCells = nonFutureCells.filter(d => !d.schedRest);
    const plannedActive = plannedCells.filter(d => d.active);
    const pctPlanned = plannedCells.length ? Math.round(plannedActive.length / plannedCells.length * 100) : 0;

    return { weeks, pct, pctPlanned, plannedActive: plannedActive.length, plannedTotal: plannedCells.length, currentStreak, recordStreak, avgPerWeek, weeksToShow };
  }

  function renderAdherenceCard() {
    if (!sessions.length) return '';
    const { weeks, pct, pctPlanned, plannedActive, plannedTotal, currentStreak, recordStreak, avgPerWeek, weeksToShow } = computeAdherence();
    const DOW_LABELS = ['L','M','M','G','V','S','D'];

    function ringSvg(value) {
      const r = 22, circ = 2 * Math.PI * r;
      const dashOffset = circ * (1 - value / 100);
      return `<div class="adh-ring">
          <svg viewBox="0 0 56 56">
            <circle cx="28" cy="28" r="${r}" fill="none" stroke="var(--surface2)" stroke-width="6"/>
            <circle cx="28" cy="28" r="${r}" fill="none" stroke="var(--green)" stroke-width="6"
              stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${dashOffset.toFixed(1)}" stroke-linecap="round"/>
          </svg>
          <div class="adh-ring-num">${value}%</div>
        </div>`;
    }

    const ringsHtml = `<div class="adh-rings">
        <div class="adh-ring-block">
          ${ringSvg(pct)}
          <div class="adh-ring-label">su tutti i giorni</div>
        </div>
        <div class="adh-ring-block">
          ${ringSvg(pctPlanned)}
          <div class="adh-ring-label">su gg. previsti (${plannedActive}/${plannedTotal})</div>
        </div>
      </div>`;

    const statsHtml = `<div class="adh-stats">
        <div class="adh-stat-row"><b>${currentStreak}</b><span>streak attuale</span></div>
        <div class="adh-stat-row"><b>${recordStreak}</b><span>streak record</span></div>
        <div class="adh-stat-row"><b>${avgPerWeek.toFixed(1)}</b><span>media/sett.</span></div>
      </div>`;

    const allWeeksDesc = weeks.slice().reverse(); // più recente prima
    const visibleWeeks = adherenceExpanded ? allWeeksDesc : allWeeksDesc.slice(0, 6);

    const weekRows = visibleWeeks.map((week, idx) => {
      const isCurrent = idx === 0;
      const activeCount = week.filter(d => d.active).length;
      const nonFutureCount = week.filter(d => !d.future).length;
      const isBonus = activeCount > 5; // ha allenato anche su almeno un rest-day pianificato
      const rangeLabel = week[0].date.toLocaleDateString('it-IT', {day:'2-digit', month:'short'});

      const daysHtml = week.map((d, di) => {
        const cls = ['adh-day'];
        if (d.future) cls.push('future');
        else if (d.active) cls.push('on');
        if (d.schedRest) cls.push('sched-rest');
        const label = d.future ? '' : DOW_LABELS[di];
        const titleAttr = `${d.date.toLocaleDateString('it-IT')}${d.active?' · allenamento':''}${d.schedRest?' · riposo pianificato':''}`;
        return `<div class="${cls.join(' ')}" title="${titleAttr}">${label}</div>`;
      }).join('');

      return `<div class="adh-week${isCurrent?' current':''}">
          <span class="adh-week-range">${rangeLabel}</span>
          <div class="adh-week-days">${daysHtml}</div>
          <span class="adh-week-ratio${isBonus?' bonus':''}">${activeCount}/${nonFutureCount}</span>
        </div>`;
    }).join('');

    const moreLink = allWeeksDesc.length > 6
      ? `<div class="adh-more" onclick="adhToggleExpand()">${adherenceExpanded ? 'Mostra solo le recenti' : `Mostra tutte le ${allWeeksDesc.length} settimane`}</div>`
      : '';

    return `<div data-weeks="${weeksToShow}">
        <div class="adh-header-row">${ringsHtml}${statsHtml}</div>
        <div class="adh-weeks">${weekRows}</div>
        ${moreLink}
        <div class="adh-legend">
          <div class="adh-legend-item"><span class="adh-legend-sw on"></span>allenato</div>
          <div class="adh-legend-item"><span class="adh-legend-sw"></span>non allenato</div>
          <div class="adh-legend-item"><span class="adh-legend-sw rest"></span>riposo pianificato</div>
        </div>
      </div>`;
  }

  window.adhToggleExpand = function() {
    adherenceExpanded = !adherenceExpanded;
    const card = document.querySelector('#adh-card-slot');
    if (card) card.innerHTML = renderAdherenceCard();
  };

  function renderReadyFlags() {
    const flags = (_lastData && _lastData.ready_to_progress) || [];
    if (!flags.length) return '';
    return `<div style="background:rgba(52,199,89,.08);border:0.5px solid rgba(52,199,89,.3);border-radius:10px;padding:12px 14px;margin-bottom:14px">
      <div style="font-size:12px;font-weight:600;color:#1a7a3a;margin-bottom:8px">💪 Pronti per aumentare il carico</div>
      ${flags.map(f => `<div style="font-size:12px;color:var(--text-secondary);padding:2px 0">
        <strong style="color:var(--text-primary)">${f.label}</strong> — ${f.weight}kg, min ${f.min_reps} reps su tutte le serie da ${f.sessions_at_weight} sessioni
      </div>`).join('')}
    </div>`;
  }

  function render() {
    const totalSessions = sessions.length;
    const totalVol = sessions.reduce((a,s)=>a+(s.volume_kg||0),0);
    const avgDur = sessions.length ? Math.round(sessions.reduce((a,s)=>a+(s.duration_min||0),0)/sessions.length) : 0;

    el.innerHTML = `<div class="app-view-inner view-wrap">
      <div class="week-hdr" style="margin-bottom:1.25rem">
        <h2>Storico allenamenti</h2>
        <span class="week-range">${totalSessions} sessioni · ${(totalVol/1000).toFixed(1)}t volume totale · ${avgDur}' durata media</span>
      </div>

      ${renderReadyFlags()}

      <div class="dash-two-col" style="gap:16px;margin-bottom:20px">
        <div class="charts-card">
          <div class="dash-card-title">Volume per gruppo muscolare</div>
          <div style="margin-top:10px">${renderMuscleChart()}</div>
        </div>
        <div class="charts-card">
          <div class="dash-card-title">Aderenza · ultime ${sessions.length ? computeAdherence().weeksToShow : 12} settimane</div>
          <div id="adh-card-slot" style="margin-top:10px">${renderAdherenceCard()}</div>
        </div>
      </div>

      <div style="margin-bottom:10px;display:flex;gap:8px">
        <input type="text" id="hs-search" placeholder="Cerca per titolo o esercizio..."
          style="flex:1;font-size:13px;padding:7px 12px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--surface-1);color:var(--text-primary)"
          oninput="hsSearch(this.value)">
      </div>
      <div id="hs-list">${renderSessionList()}</div>
    </div>`;
  }

  window.hsSearch = function(q) { searchQ = q.toLowerCase(); document.getElementById('hs-list').innerHTML = renderSessionList(); };
  window.hsToggle = function(idx) { expandedIdx = (expandedIdx === idx) ? null : idx; document.getElementById('hs-list').innerHTML = renderSessionList(); };

  render();
}

    { icon:'💉', title:'Tesamorelin + Ipamorelin sera', body:'Finestra critica: minimo 2.5h, ideale 3h post-pasto. Il pasto pre-Tesa deve essere low-fat, low-GI. Zero grassi aggiunti, zero caffè con latte.' },
  ];

  let html = `<div class="view-wrap">
  <div style="margin-bottom:24px">
    <div class="t-page-title">Schema giornaliero</div>
    <div class="t-page-sub">Protocollo v2 · 13 lug – 1 nov 2026</div>
  </div>`;

  // Day type selector tabs
  html += `<div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">`;
  days.forEach((d,i) => {
    html += `<button onclick="orariShowDay('${d.id}')" id="orari-btn-${d.id}"
      style="padding:8px 18px;border-radius:980px;border:1.5px solid ${d.color};
      background:${i===0 ? d.color : 'transparent'};color:${i===0 ? '#fff' : d.color};
      font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s">
      ${d.label}
    </button>`;
  });
  html += `</div>`;

  // Day panels
  days.forEach((d,di) => {
    html += `<div id="orari-panel-${d.id}" style="display:${di===0?'block':'none'}">`;

    // Header card
    html += `<div style="background:var(--surface);border-radius:var(--radius);padding:16px 18px;
      margin-bottom:16px;box-shadow:var(--shadow);border-left:4px solid ${d.color}">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="background:${d.color};color:#fff;font-size:11px;font-weight:600;
          padding:3px 9px;border-radius:980px">${d.badge}</span>
        <div>
          <div style="font-size:15px;font-weight:600;color:var(--text)">${d.label}</div>
          <div style="font-size:12px;color:var(--muted)">${d.sub}</div>
        </div>
      </div>
    </div>`;

    if (d.sections) {
      // BKK sections layout
      d.sections.forEach(sec => {
        html += `<div style="font-size:13px;font-weight:600;color:var(--text);margin:18px 0 10px">${sec.title}</div>`;
        html += `<div style="background:var(--surface);border-radius:var(--radius);
          box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px">`;
        sec.rows.forEach((r, ri) => {
          const isInj = r.icon === '💉';
          const border = ri < sec.rows.length - 1 ? 'border-bottom:1px solid var(--border)' : '';
          html += `<div style="display:flex;align-items:flex-start;gap:12px;padding:12px 16px;${border}">
            <div style="min-width:44px;font-size:12px;font-weight:600;color:var(--muted);
              padding-top:1px;letter-spacing:-0.3px">${r.time}</div>
            <div style="font-size:18px;line-height:1.2;min-width:22px">${r.icon}</div>
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;color:var(--text);line-height:1.4;
                font-weight:${isInj ? '600' : '400'}">${r.action}</div>
              ${r.tag ? `<div style="display:inline-block;margin-top:4px;font-size:11px;
                font-weight:500;color:${r.tagColor};background:${r.tagColor}18;
                padding:2px 7px;border-radius:6px">${r.tag}</div>` : ''}
            </div>
          </div>`;
        });
        html += `</div>`;
      });
      html += `</div>`;
    } else {
      // Standard timeline rows
      html += `<div style="background:var(--surface);border-radius:var(--radius);
        box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px">`;

      d.rows.forEach((r, ri) => {
        const isInj = r.icon === '💉';
        const border = ri < d.rows.length - 1 ? 'border-bottom:1px solid var(--border)' : '';
        html += `<div style="display:flex;align-items:flex-start;gap:12px;padding:12px 16px;${border}">
          <div style="min-width:44px;font-size:12px;font-weight:600;color:var(--muted);
            padding-top:1px;letter-spacing:-0.3px">${r.time}</div>
          <div style="font-size:18px;line-height:1.2;min-width:22px">${r.icon}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;color:var(--text);line-height:1.4;
              font-weight:${isInj ? '600' : '400'}">${r.action}</div>
            ${r.tag ? `<div style="display:inline-block;margin-top:4px;font-size:11px;
              font-weight:500;color:${r.tagColor};background:${r.tagColor}18;
              padding:2px 7px;border-radius:6px">${r.tag}</div>` : ''}
          </div>
        </div>`;
      });

      html += `</div></div>`; // close panel
    }
  });

  // Rules section
  html += `<div class="t-section-title" style="margin-top:4px;margin-bottom:12px">REGOLE CRITICHE</div>`;
  html += `<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:40px">`;
  rules.forEach(r => {
    html += `<div style="background:var(--surface);border-radius:var(--radius-sm);
      padding:14px 16px;box-shadow:var(--shadow);display:flex;gap:12px;align-items:flex-start">
      <div style="font-size:20px">${r.icon}</div>
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px">${r.title}</div>
        <div style="font-size:12px;color:var(--muted);line-height:1.5">${r.body}</div>
      </div>
    </div>`;
  });
  html += `</div></div>`;

  el.innerHTML = html;

  // Selector function
  window.orariShowDay = function(id) {
    const dayDefs = ['wo','rest','wknd','bkk'];
    const colors = {'wo':'#0071e3','rest':'#aeaeb2','wknd':'#af52de','bkk':'#c0392b'};
    dayDefs.forEach(d => {
      document.getElementById('orari-panel-' + d).style.display = (d === id) ? 'block' : 'none';
      const btn = document.getElementById('orari-btn-' + d);
      const c = colors[d];
      if (d === id) {
        btn.style.background = c; btn.style.color = '#fff';
      } else {
        btn.style.background = 'transparent'; btn.style.color = c;
      }
    });
  };
}
</script>

</body>
</html>
