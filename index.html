<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Diario Giornaliero · Protocollo 16 Settimane</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F7F5F0;--surface:#FFFFFF;--border:#E2DDD6;--border2:#C8C2B8;
  --text:#1A1714;--muted:#7A7268;--faint:#B8B2A8;
  --accent:#C4381A;--green:#1A6B4A;--gold:#9B6E00;--blue:#1A4A7A;
  --push:#C4381A;--pull:#1A6B4A;--legs:#9B6E00;--upper:#6B3FA0;--active:#2A7A4A;--rest:#7A7268;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}

.header{background:var(--text);color:#F7F5F0;padding:22px 28px 18px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;gap:12px}
.h-left h1{font-family:'Instrument Serif',serif;font-size:22px;font-weight:400;line-height:1}
.h-left p{font-size:10px;color:#9A9288;letter-spacing:.08em;margin-top:3px}
.h-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.h-btn{background:transparent;border:1px solid #4A4540;color:#9A9288;padding:6px 12px;border-radius:4px;font-size:10px;font-weight:500;cursor:pointer;letter-spacing:.06em;font-family:'DM Mono',monospace;transition:all .15s;white-space:nowrap}
.h-btn:hover{border-color:#F7F5F0;color:#F7F5F0}
.sync-st{font-family:'DM Mono',monospace;font-size:10px;color:#9A9288}
.sync-st.ok{color:#4CAF82}.sync-st.err{color:#E06B50}

.prog-wrap{background:#2A2520;height:2px}
.prog-bar{height:2px;background:var(--accent);transition:width .3s ease}

.nav-strip{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.nav-strip::-webkit-scrollbar{display:none}
.nav-tab{padding:12px 16px;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;letter-spacing:.02em;flex-shrink:0}
.nav-tab:hover{color:var(--text)}
.nav-tab.on{color:var(--text);border-bottom-color:var(--text)}

.container{max-width:680px;margin:0 auto;padding:24px 20px 100px}

.week-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.week-hdr h2{font-family:'Instrument Serif',serif;font-size:20px;font-weight:400}
.week-phase{font-family:'DM Mono',monospace;font-size:9px;font-weight:500;padding:3px 8px;border-radius:3px;border:1px solid;letter-spacing:.06em}
.week-range{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-left:auto}

.day-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden;transition:border-color .15s}
.day-card:hover{border-color:var(--border2)}
.day-head{display:flex;align-items:center;padding:12px 14px;cursor:pointer;gap:10px;user-select:none}
.day-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.day-info{flex:1}
.day-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.2}
.day-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:1px}
.day-wo-badge{font-family:'DM Mono',monospace;font-size:9px;font-weight:500;padding:3px 9px;border-radius:3px;border:1px solid;letter-spacing:.04em;white-space:nowrap}
.day-quick{display:flex;gap:12px;margin-right:6px}
.dq{text-align:center}
.dq-v{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:var(--text);line-height:1}
.dq-v.mt{color:var(--faint)}
.dq-l{font-size:9px;color:var(--faint);margin-top:1px}
.day-chev{color:var(--faint);font-size:13px;transition:transform .2s;flex-shrink:0}
.day-card.open .day-chev{transform:rotate(180deg)}

.day-body{display:none;padding:0 14px 14px;border-top:1px solid var(--border)}
.day-card.open .day-body{display:block}

.section-label{font-size:10px;font-weight:500;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin:14px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--border)}

.bio-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.bio-box{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 6px;text-align:center}
.bio-box input{width:100%;background:transparent;border:none;outline:none;font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--text);text-align:center}
.bio-box input::placeholder{color:var(--faint);font-size:13px}
.bio-lbl{font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:.03em}

.field-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}
.field-row.tri{grid-template-columns:1fr 1fr 1fr}
.field-row.solo{grid-template-columns:1fr}
.fg{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 10px}
.fg label{display:block;font-size:9px;font-weight:500;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:4px}
.fg input,.fg select,.fg textarea{width:100%;background:transparent;border:none;outline:none;font-size:12px;color:var(--text);font-family:'DM Sans',sans-serif;resize:none}
.fg textarea{height:48px;line-height:1.5}
.fg select{cursor:pointer}

.wo-box{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-top:6px}
.wo-type{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.04em;margin-bottom:8px}
.wo-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}

.inj-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-top:6px}

.vita-note{font-size:10px;color:var(--faint);margin-top:4px;font-style:italic}

.day-card.today{border-color:var(--accent);border-width:1.5px}
.today-badge{font-size:9px;background:#FEF0EE;color:var(--accent);border:1px solid #F5C5BB;border-radius:3px;padding:2px 7px;font-weight:500;letter-spacing:.04em;margin-left:4px}

.rest-banner{background:var(--bg);border-radius:6px;padding:12px 14px;margin-top:8px;border:1px solid var(--border);text-align:center;font-size:12px;color:var(--muted)}

.loading-overlay{position:fixed;inset:0;background:rgba(247,245,240,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:10px}
.loading-overlay p{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.save-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:50}
.save-btn-main{background:var(--text);color:var(--bg);border:none;padding:9px 22px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.03em;transition:opacity .15s}
.save-btn-main:hover{opacity:.85}
.save-btn-main:disabled{opacity:.4;cursor:not-allowed}
.save-hint{font-size:11px;color:var(--muted)}

.p1b{border-color:#1A4A7A33;background:#EFF4FB;color:#1A4A7A}
.p2b{border-color:#9B6E0033;background:#FBF6EA;color:#9B6E00}
.p3b{border-color:#1A6B4A33;background:#EDF6F1;color:#1A6B4A}
.p4b{border-color:#C4381A33;background:#FBF0ED;color:#C4381A}

@media(max-width:600px){
  .bio-grid{grid-template-columns:repeat(3,1fr)}
  .inj-row{grid-template-columns:1fr 1fr}
  .wo-row{grid-template-columns:1fr 1fr}
  .day-quick{display:none}
  .header{padding:16px}
  .container{padding:16px 12px 100px}
  .nav-strip{padding:0 16px}
}
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <p>Caricamento...</p>
</div>

<div class="header">
  <div class="h-left">
    <h1>Diario Protocollo</h1>
    <p>8 GIU–25 SET 2026 · 16 SETTIMANE · 112 GIORNI</p>
  </div>
  <div class="h-right">
    <span class="sync-st" id="sync-st">—</span>
    <button class="h-btn" onclick="loadFromCloud()">↓ Sync</button><button class="h-btn" onclick="jumpToday()">Oggi</button>
    <button class="h-btn" onclick="saveData()">Salva</button>
  </div>
</div>

<div class="prog-wrap"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>

<div class="nav-strip" id="nav-strip"></div>

<div class="container" id="container"></div>

<div class="save-bar">
  <span class="save-hint" id="last-saved">Mai salvato</span>
  <button class="save-btn-main" id="save-btn" onclick="saveData()">Salva dati</button>
</div>

<script>
const START = new Date('2026-06-08');
const TOTAL_DAYS = 112;
const KEY = 'diary_daily_v1';
const SB_URL = 'https://viarmvaukgwdoursfnwu.supabase.co';
const SB_KEY = 'sb_publishable_lNztKvsZbTKIwjEWAGiBhg_zngxHt56';
const USER_ID = 'giorgio_protocollo_2026';

// Split: 0=Dom,1=Lun,2=Mar,3=Mer,4=Gio,5=Ven,6=Sab
const SPLIT = {
  0: { type:'Riposo',      color:'var(--rest)',  badge:'rm', label:'RIPOSO' },
  1: { type:'Riposo',      color:'var(--rest)',  badge:'rm', label:'RIPOSO' },
  2: { type:'Push',        color:'var(--push)',  badge:'pm', label:'PUSH' },
  3: { type:'Pull',        color:'var(--pull)',  badge:'lm', label:'PULL' },
  4: { type:'Riposo',      color:'var(--rest)',  badge:'rm', label:'RIPOSO' },
  5: { type:'Legs',        color:'var(--legs)',  badge:'gm', label:'LEGS' },
  6: { type:'Upper Body',  color:'var(--upper)', badge:'um', label:'UPPER BODY' },
};

// Bangkok: wk9-11 = giorni 57-84 (0-indexed: 56-83) → pomeriggio, stesso split
// Attiva ogni giovedì resta riposo/attiva

function getPhase(dayIdx) {
  const wk = Math.floor(dayIdx / 7) + 1;
  if (wk <= 4)  return { label:'Tesa 1mg',       badge:'p1b', wk };
  if (wk <= 6)  return { label:'Tesa 2mg',        badge:'p2b', wk };
  if (wk <= 12) return { label:'Stack completo',  badge:'p3b', wk };
  return               { label:'Stack + BPC-157', badge:'p4b', wk };
}

function getWeekRange(wkIdx) {
  const s = new Date(START); s.setDate(s.getDate() + wkIdx*7);
  const e = new Date(s); e.setDate(e.getDate()+6);
  const fmt = d => d.toLocaleDateString('it-IT',{day:'2-digit',month:'short'});
  return fmt(s) + ' – ' + fmt(e);
}

function isBKK(dayIdx) { return dayIdx >= 56 && dayIdx <= 83; }
function isVitaDay(dayIdx) { return dayIdx % 7 === 0; } // ogni lunedì

function formatDate(d) {
  return d.toLocaleDateString('it-IT',{weekday:'long',day:'2-digit',month:'long'});
}

function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function getBadgeClass(type) {
  if (type.includes('Push')) return 'pm';
  if (type.includes('Pull')) return 'lm';
  if (type === 'Legs') return 'gm';
  if (type === 'Upper') return 'um';
  if (type === 'Attiva') return 'am';
  return 'rm';
}

function getBadgeStyle(type) {
  if (type.includes('Push')) return 'border-color:#C4381A33;background:#FBF0ED;color:#C4381A';
  if (type.includes('Pull')) return 'border-color:#1A6B4A33;background:#EDF6F1;color:#1A6B4A';
  if (type === 'Legs') return 'border-color:#9B6E0033;background:#FBF6EA;color:#9B6E00';
  if (type.includes('Upper') || type.includes('Full') || type.includes('Body')) return 'border-color:#6B3FA033;background:#F5F0FB;color:#6B3FA0';
  if (type === 'Attiva') return 'border-color:#2A7A4A33;background:#EDF8F2;color:#2A7A4A';
  if (type === 'BKK_FREE') return 'border-color:#1A4A7A33;background:#EFF4FB;color:#1A4A7A';
  return 'border-color:#7A726833;background:#F5F3EF;color:#7A7268';
}

function getDotColor(type) {
  if (type.includes('Push')) return '#C4381A';
  if (type.includes('Pull')) return '#1A6B4A';
  if (type === 'Legs') return '#9B6E00';
  if (type.includes('Upper') || type.includes('Full') || type.includes('Body')) return '#6B3FA0';
  if (type === 'Attiva') return '#2A7A4A';
  if (type === 'BKK_FREE') return '#1A4A7A';
  return '#B8B2A8';
}

// Override giovedì wk9-11 (BKK) come "Attiva" per MOTS-C
function getWorkout(dayIdx) {
  const d = new Date(START); d.setDate(d.getDate()+dayIdx);
  const dow = d.getDay();
  const wk = Math.floor(dayIdx/7)+1;
  // Bangkok wk9-11: no rest days, free workout selection
  if (isBKK(dayIdx)) return { type:'BKK_FREE', color:'var(--blue)', badge:'bm', label:'BKK' };
  // giovedì = riposo
  if (dow === 4) return { type:'Riposo', color:'var(--rest)', badge:'rm', label:'RIPOSO' };
  // domenica = secondo Upper Body
  if (dow === 0) return { type:'Upper Body', color:'var(--upper)', badge:'um', label:'UPPER BODY' };
  return SPLIT[dow];
}

// Build data structure
const diary = {};
for (let i=0; i<TOTAL_DAYS; i++) {
  const d = new Date(START); d.setDate(d.getDate()+i);
  const id = 'day_'+i;
  diary[id] = {
    peso:'', hrv:'', rhr:'', ore_sonno:'', qualita_sonno:'',
    vita: isVitaDay(i)?'':'skip',
    inj_eseguita:'', inj_peptide:'', inj_dose:'', inj_sito:'', inj_effetti:'',
    wo_rpe:'', wo_durata:'', wo_note:'',
    energia:'', recupero:'', appetito:'', note:''
  };
}

// Render
function buildNav() {
  const nav = document.getElementById('nav-strip');
  const weeks = Math.ceil(TOTAL_DAYS/7);
  for (let w=0; w<weeks; w++) {
    const ph = getPhase(w*7);
    const tab = document.createElement('div');
    tab.className = 'nav-tab';
    tab.id = 'nav-w'+(w+1);
    tab.textContent = 'WK '+(w+1);
    tab.onclick = () => {
      document.getElementById('week-'+(w+1))?.scrollIntoView({behavior:'smooth',block:'start'});
    };
    nav.appendChild(tab);
  }
}

function buildDays() {
  const container = document.getElementById('container');
  const today = new Date(); today.setHours(0,0,0,0);
  let currentWeek = -1;

  for (let i=0; i<TOTAL_DAYS; i++) {
    const d = new Date(START); d.setDate(d.getDate()+i);
    d.setHours(0,0,0,0);
    const wk = Math.floor(i/7)+1;
    const ph = getPhase(i);
    const wo = getWorkout(i);
    const id = 'day_'+i;
    const isToday = d.getTime()===today.getTime();
    const bkk = isBKK(i);

    // Week header
    if (wk !== currentWeek) {
      currentWeek = wk;
      const whdr = document.createElement('div');
      whdr.id = 'week-'+wk;
      whdr.className = 'week-hdr';
      whdr.style.marginTop = wk===1?'0':'28px';
      whdr.innerHTML = `
        <h2>Settimana ${wk}</h2>
        <span class="week-phase ${ph.badge}">${ph.label}${bkk?' · BKK':''}</span>
        <span class="week-range">${getWeekRange(wk-1)}</span>
      `;
      container.appendChild(whdr);
    }

    const card = document.createElement('div');
    card.className = 'day-card' + (isToday?' today open':'');
    card.id = 'card-'+id;

    const dotColor = getDotColor(wo.type);
    const badgeStyle = getBadgeStyle(wo.type);
    const isRest = wo.type === 'Riposo';
    const isBkkFree = wo.type === 'BKK_FREE';

    card.innerHTML = `
      <div class="day-head" onclick="toggleDay('${id}')">
        <span class="day-dot" style="background:${dotColor}"></span>
        <div class="day-info">
          <div class="day-name">${capitalize(formatDate(d))}${isToday?'<span class="today-badge">OGGI</span>':''}</div>
          <div class="day-date">Giorno ${i+1} · Settimana ${wk}${bkk?' · Bangkok':''}</div>
        </div>
        <div class="day-quick">
          <div class="dq"><div class="dq-v mt" id="q-${id}-peso">—</div><div class="dq-l">kg</div></div>
          <div class="dq"><div class="dq-v mt" id="q-${id}-hrv">—</div><div class="dq-l">HRV</div></div>
          <div class="dq"><div class="dq-v mt" id="q-${id}-sonno">—</div><div class="dq-l">sleep</div></div>
        </div>
        <span class="day-wo-badge" style="${badgeStyle}">${wo.type.toUpperCase()}</span>
        <span class="day-chev">▾</span>
      </div>
      <div class="day-body">
        <div class="section-label">Biometria mattutina</div>
        <div class="bio-grid">
          <div class="bio-box"><input type="number" step="0.1" placeholder="70.1" data-id="${id}" data-f="peso" oninput="onInput(this,'${id}','peso')"><div class="bio-lbl">Peso kg</div></div>
          <div class="bio-box"><input type="number" placeholder="48" data-id="${id}" data-f="hrv" oninput="onInput(this,'${id}','hrv')"><div class="bio-lbl">HRV ms</div></div>
          <div class="bio-box"><input type="number" placeholder="55" data-id="${id}" data-f="rhr"><div class="bio-lbl">RHR bpm</div></div>
          <div class="bio-box"><input type="number" step="0.5" min="0" max="12" placeholder="7" data-id="${id}" data-f="ore_sonno"><div class="bio-lbl">Ore sonno</div></div>
          <div class="bio-box"><input type="number" min="1" max="10" step="0.5" placeholder="—" data-id="${id}" data-f="qualita_sonno" oninput="onInput(this,'${id}','sonno')"><div class="bio-lbl">Sonno /10</div></div>
        </div>
        ${isVitaDay(i) ? `
        <div class="field-row solo" style="margin-top:6px">
          <div class="fg">
            <label>Circonferenza vita (cm) — misurazione settimanale</label>
            <input type="number" step="0.5" placeholder="—" data-id="${id}" data-f="vita">
          </div>
        </div>` : ''}

        <div class="section-label">Protocollo iniezione</div>
        <div class="inj-row">
          <div class="fg">
            <label>Eseguita</label>
            <select data-id="${id}" data-f="inj_eseguita">
              <option value="">—</option>
              <option>Sì</option>
              <option>No — motivo:</option>
              <option>Posticipata</option>
            </select>
          </div>
          <div class="fg">
            <label>Peptide / dose</label>
            <select data-id="${id}" data-f="inj_peptide">
              <option value="">—</option>
              <option>Tesa 1mg · 20 unità</option>
              <option>Tesa 2mg (40u)</option>
              <option>Tesa 2mg + GHK-Cu 1mg</option>
              <option>MOTS-C 2.5mg (mattino)</option>
              <option>BPC-157 250mcg (mattino)</option>
              <option>MOTS-C + BPC (mattino)</option>
            </select>
          </div>
          <div class="fg">
            <label>Sito</label>
            <select data-id="${id}" data-f="inj_sito">
              <option value="">—</option>
              <option>Add. sin. sup.</option>
              <option>Add. sin. inf.</option>
              <option>Add. dx sup.</option>
              <option>Add. dx inf.</option>
            </select>
          </div>
          <div class="fg">
            <label>Effetti locali</label>
            <select data-id="${id}" data-f="inj_effetti">
              <option value="">—</option>
              <option>Nessuno</option>
              <option>Lieve rossore</option>
              <option>Rossore + gonfiore</option>
              <option>Formicolio mani</option>
            </select>
          </div>
        </div>

        ${isRest ? `
        <div class="section-label">Workout</div>
        <div class="rest-banner">Giorno di riposo — recupero attivo, stretching, LISS opzionale</div>` : wo.type === 'BKK_FREE' ? `
        <div class="section-label">Workout · Bangkok Hotel Gym</div>
        <div class="wo-box">
          <div class="wo-type" style="color:#1A4A7A">BANGKOK · HOTEL GYM</div>
          <div class="wo-row">
            <div class="fg">
              <label>Tipo sessione</label>
              <select data-id="${id}" data-f="wo_tipo">
                <option value="">— seleziona —</option>
                <option>Push</option>
                <option>Pull</option>
                <option>Upper Body</option>
                <option>Full Body</option>
                <option>Push + Pull</option>
                <option>Push + Core</option>
                <option>Pull + Core</option>
                <option>Upper + Core</option>
                <option>Cardio / LISS</option>
                <option>Attiva leggera</option>
              </select>
            </div>
            <div class="fg">
              <label>RPE globale (1–10)</label>
              <input type="number" min="1" max="10" step="0.5" placeholder="—" data-id="${id}" data-f="wo_rpe">
            </div>
            <div class="fg">
              <label>Durata (min)</label>
              <input type="number" placeholder="—" data-id="${id}" data-f="wo_durata">
            </div>
          </div>
          <div class="wo-row" style="margin-top:6px">
            <div class="fg" style="grid-column:1/-1">
              <label>Note sessione</label>
              <input type="text" placeholder="energia, tecnica, attrezzatura usata..." data-id="${id}" data-f="wo_note">
            </div>
          </div>
        </div>` : `
        <div class="section-label">Workout · ${wo.type}</div>
        <div class="wo-box">
          <div class="wo-type" style="${badgeStyle.replace('border-color','border-left-color').replace(/background:[^;]+;/,'').replace(/color:[^;]+/,'')}color:${dotColor}">${wo.type.toUpperCase()}</div>
          <div class="wo-row">
            <div class="fg">
              <label>RPE globale (1–10)</label>
              <input type="number" min="1" max="10" step="0.5" placeholder="—" data-id="${id}" data-f="wo_rpe">
            </div>
            <div class="fg">
              <label>Durata (min)</label>
              <input type="number" placeholder="—" data-id="${id}" data-f="wo_durata">
            </div>
            <div class="fg">
              <label>Note sessione</label>
              <input type="text" placeholder="energia, tecnica, PR..." data-id="${id}" data-f="wo_note">
            </div>
          </div>
        </div>`}

        <div class="section-label">Soggettivo</div>
        <div class="field-row tri">
          <div class="fg">
            <label>Energia (1–10)</label>
            <input type="number" min="1" max="10" step="0.5" placeholder="—" data-id="${id}" data-f="energia">
          </div>
          <div class="fg">
            <label>Recupero (1–10)</label>
            <input type="number" min="1" max="10" step="0.5" placeholder="—" data-id="${id}" data-f="recupero">
          </div>
          <div class="fg">
            <label>Appetito</label>
            <select data-id="${id}" data-f="appetito">
              <option value="">—</option>
              <option>Normale</option>
              <option>Aumentato</option>
              <option>Ridotto</option>
            </select>
          </div>
        </div>
        <div class="field-row solo" style="margin-top:6px">
          <div class="fg">
            <label>Note libere</label>
            <textarea placeholder="Sensazioni, effetti inattesi, qualità del sonno, umore..." data-id="${id}" data-f="note"></textarea>
          </div>
        </div>
      </div>
    `;

    container.appendChild(card);
  }
}

function toggleDay(id) {
  document.getElementById('card-'+id).classList.toggle('open');
}

function onInput(el, id, shortField) {
  const val = el.value;
  const qEl = document.getElementById('q-'+id+'-'+shortField);
  if (!qEl) return;
  if (val) {
    qEl.textContent = parseFloat(val).toFixed(1);
    qEl.classList.remove('mt');
  } else {
    qEl.textContent = '—';
    qEl.classList.add('mt');
  }
  updateProgress();
}

function updateProgress() {
  const all = document.querySelectorAll('[data-f="peso"]');
  let filled = 0;
  all.forEach(el => { if(el.value) filled++; });
  const pct = Math.round((filled / TOTAL_DAYS) * 100);
  document.getElementById('prog-bar').style.width = pct + '%';
}

function collectAll() {
  const data = {};
  document.querySelectorAll('[data-id][data-f]').forEach(el => {
    const id = el.dataset.id;
    const f = el.dataset.f;
    if (!data[id]) data[id] = {};
    if (el.value) data[id][f] = el.value;
  });
  return data;
}

function applyAll(data) {
  Object.entries(data).forEach(([id, fields]) => {
    Object.entries(fields).forEach(([f, v]) => {
      const el = document.querySelector(`[data-id="${id}"][data-f="${f}"]`);
      if (el && v) {
        el.value = v;
        if (f==='peso') onInput(el, id, 'peso');
        if (f==='hrv') onInput(el, id, 'hrv');
        if (f==='qualita_sonno') onInput(el, id, 'sonno');
      }
    });
  });
  updateProgress();
}

async function saveData() {
  const btn = document.getElementById('save-btn');
  const mainBtn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.textContent = 'Salvataggio...';
  document.getElementById('sync-st').textContent = '↑';
  document.getElementById('sync-st').className = 'sync-st';

  const data = collectAll();
  const ts = Date.now();

  // Always save locally first
  try { localStorage.setItem(KEY, JSON.stringify({data, ts})); } catch(e) {}

  // Try Supabase
  try {
    const res = await fetch(SB_URL + '/rest/v1/diary', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SB_KEY,
        'Authorization': 'Bearer ' + SB_KEY,
        'Prefer': 'resolution=merge-duplicates'
      },
      body: JSON.stringify({
        user_id: USER_ID,
        data: data,
        updated_at: new Date(ts).toISOString()
      })
    });

    if (res.ok || res.status === 201 || res.status === 200) {
      const now = new Date();
      document.getElementById('last-saved').textContent = 'Salvato ' + now.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}) + ' · cloud ✓';
      document.getElementById('sync-st').textContent = '✓ cloud';
      document.getElementById('sync-st').className = 'sync-st ok';
    } else {
      const errText = await res.text();
      console.warn('Supabase error:', res.status, errText);
      const now = new Date();
      document.getElementById('last-saved').textContent = 'Salvato localmente · cloud err ' + res.status;
      document.getElementById('sync-st').textContent = '✓ locale';
      document.getElementById('sync-st').className = 'sync-st ok';
    }
  } catch(e) {
    console.warn('Supabase fetch error:', e);
    const now = new Date();
    document.getElementById('last-saved').textContent = 'Salvato localmente (offline)';
    document.getElementById('sync-st').textContent = '✓ locale';
    document.getElementById('sync-st').className = 'sync-st ok';
  }

  btn.disabled = false;
  btn.textContent = 'Salva dati';
}

async function loadFromCloud() {
  document.getElementById('sync-st').textContent = '↓';
  document.getElementById('sync-st').className = 'sync-st';
  const btn = document.querySelector('.h-btn');

  try {
    const res = await fetch(
      SB_URL + '/rest/v1/diary?user_id=eq.' + USER_ID + '&select=data,updated_at&limit=1',
      {
        headers: {
          'apikey': SB_KEY,
          'Authorization': 'Bearer ' + SB_KEY
        }
      }
    );

    if (res.ok) {
      const rows = await res.json();
      if (rows && rows.length > 0 && rows[0].data) {
        const cloudData = rows[0].data;
        const cloudTs = rows[0].updated_at;

        // Check if cloud is newer than local
        const localRaw = localStorage.getItem(KEY);
        let localTs = 0;
        if (localRaw) {
          try { localTs = JSON.parse(localRaw).ts || 0; } catch(e) {}
        }
        const cloudTsMs = new Date(cloudTs).getTime();

        if (cloudTsMs > localTs) {
          applyAll(cloudData);
          localStorage.setItem(KEY, JSON.stringify({data: cloudData, ts: cloudTsMs}));
          document.getElementById('last-saved').textContent = 'Caricato dal cloud · ' + new Date(cloudTs).toLocaleString('it-IT');
          document.getElementById('sync-st').textContent = '✓ cloud';
          document.getElementById('sync-st').className = 'sync-st ok';
        } else {
          document.getElementById('last-saved').textContent = 'Dati locali più recenti — nessun aggiornamento';
          document.getElementById('sync-st').textContent = '✓';
          document.getElementById('sync-st').className = 'sync-st ok';
        }
      } else {
        document.getElementById('last-saved').textContent = 'Nessun dato sul cloud ancora';
        document.getElementById('sync-st').textContent = '—';
        document.getElementById('sync-st').className = 'sync-st';
      }
    } else {
      throw new Error('HTTP ' + res.status);
    }
  } catch(e) {
    console.warn('Load error:', e);
    // Fallback to local
    const localRaw = localStorage.getItem(KEY);
    if (localRaw) {
      try {
        const parsed = JSON.parse(localRaw);
        applyAll(parsed.data || parsed);
        document.getElementById('last-saved').textContent = 'Caricato localmente (offline)';
        document.getElementById('sync-st').textContent = '✓ locale';
        document.getElementById('sync-st').className = 'sync-st ok';
      } catch(e2) {}
    }
  }
}

function jumpToday() {
  const today = new Date(); today.setHours(0,0,0,0);
  const start = new Date(START); start.setHours(0,0,0,0);
  const diff = Math.floor((today - start) / 86400000);
  if (diff >= 0 && diff < TOTAL_DAYS) {
    const card = document.getElementById('card-day_'+diff);
    if (card) {
      card.classList.add('open');
      card.scrollIntoView({behavior:'smooth', block:'center'});
    }
  }
}

function updateNavHighlight() {
  const today = new Date(); today.setHours(0,0,0,0);
  const start = new Date(START); start.setHours(0,0,0,0);
  const diff = Math.floor((today - start) / 86400000);
  if (diff >= 0 && diff < TOTAL_DAYS) {
    const wk = Math.floor(diff/7)+1;
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('on'));
    const tab = document.getElementById('nav-w'+wk);
    if (tab) { tab.classList.add('on'); tab.scrollIntoView({inline:'center', behavior:'smooth'}); }
  }
}

window.addEventListener('load', async () => {
  buildNav();
  buildDays();
  document.getElementById('loading').style.display = 'none';

  // Load local first for instant display
  const raw = localStorage.getItem(KEY);
  if (raw) {
    try {
      const parsed = JSON.parse(raw);
      applyAll(parsed.data || parsed);
      const ts = parsed.ts ? new Date(parsed.ts).toLocaleString('it-IT') : '—';
      document.getElementById('last-saved').textContent = 'Locale: ' + ts;
      document.getElementById('sync-st').textContent = '✓ locale';
      document.getElementById('sync-st').className = 'sync-st ok';
    } catch(e) {}
  }

  updateNavHighlight();
  jumpToday();

  // Then try to sync from cloud in background
  try {
    await loadFromCloud();
  } catch(e) {}
});

window.addEventListener('beforeunload', () => {
  const data = collectAll();
  const hasData = Object.values(data).some(d => Object.keys(d).length > 0);
  if (hasData) localStorage.setItem(KEY, JSON.stringify({data, ts: Date.now()}));
});
</script>
