<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="apple-touch-icon" sizes="512x512" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Diario Ciclo">
<title>Diario Protocollo · 16 Settimane</title>
<!-- v2.1.0 -->
<style>
/* Apple-style design system */
:root {
  --bg: #f5f5f7;
  --surface: #ffffff;
  --surface2: #f5f5f7;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text: #1d1d1f;
  --text2: #424245;
  --muted: #6e6e73;
  --faint: #aeaeb2;
  --blue: #0071e3;
  --blue-hover: #0077ed;
  --blue-light: #e8f1fb;
  --red: #ff3b30;
  --green: #34c759;
  --orange: #ff9500;
  --purple: #af52de;
  --teal: #5ac8fa;
  --push: #ff3b30;
  --pull: #34c759;
  --legs: #ff9500;
  --upper: #af52de;
  --rest: #aeaeb2;
  --radius: 18px;
  --radius-sm: 12px;
  --radius-xs: 8px;
  --shadow: 0 2px 12px rgba(0,0,0,0.07);
  --shadow-md: 0 4px 24px rgba(0,0,0,0.10);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.5;
  min-height: 100vh;
}

/* Header — Apple nav bar style */
.header {
  background: rgba(255,255,255,0.85);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  position: sticky;
  top: 0;
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 52px;
}
.h-left h1 {
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.02em;
}
.h-left p {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.01em;
  margin-top: 1px;
}
.h-right { display: flex; align-items: center; gap: 8px; }
.h-btn {
  background: transparent;
  border: none;
  color: var(--blue);
  font-size: 15px;
  font-family: inherit;
  font-weight: 400;
  cursor: pointer;
  padding: 4px 10px;
  border-radius: 6px;
  transition: background .15s;
  white-space: nowrap;
}
.h-btn:hover { background: var(--blue-light); }
.h-btn.primary {
  background: var(--blue);
  color: #fff;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 980px;
  font-size: 13px;
}
.h-btn.primary:hover { background: var(--blue-hover); }
.sync-indicator {
  font-size: 12px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 5px;
}
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--faint); }
.sync-dot.ok { background: var(--green); }
.sync-dot.err { background: var(--red); }

/* Progress bar — thin Apple style */
.prog-wrap { height: 3px; background: transparent; }
.prog-bar { height: 3px; background: var(--blue); transition: width .4s ease; border-radius: 0 2px 2px 0; }

/* Week navigation */
.nav-strip {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  gap: 0;
}
.nav-strip::-webkit-scrollbar { display: none; }
.nav-tab {
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 400;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: color .15s;
  flex-shrink: 0;
  letter-spacing: -0.01em;
}
.nav-tab:hover { color: var(--text); }
.nav-tab.on { color: var(--blue); border-bottom-color: var(--blue); font-weight: 500; }

/* Main container */
.container { max-width: 720px; margin: 0 auto; padding: 28px 20px 120px; }

/* Cycle indicator card */
.cycle-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 22px 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 20px;
}
.cycle-ring { position: relative; width: 72px; height: 72px; flex-shrink: 0; }
.cycle-ring svg { transform: rotate(-90deg); }
.cycle-ring-label {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.cycle-ring-pct { font-size: 16px; font-weight: 600; color: var(--text); letter-spacing: -0.03em; line-height: 1; }
.cycle-ring-sub { font-size: 9px; color: var(--muted); margin-top: 2px; letter-spacing: 0.02em; text-transform: uppercase; }
.cycle-info { flex: 1 }
.cycle-info h3 { font-size: 17px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; margin-bottom: 3px; }
.cycle-info p { font-size: 13px; color: var(--muted); }
.cycle-next {
  margin-top: 8px;
  padding: 8px 12px;
  background: var(--blue-light);
  border-radius: var(--radius-xs);
  font-size: 12px;
  color: var(--blue);
  font-weight: 500;
}

/* Charts card */
.charts-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
}
.charts-card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.01em;
  text-transform: uppercase;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.chart-label { font-size: 11px; color: var(--muted); margin-bottom: 5px; font-weight: 500; letter-spacing: 0.02em; text-transform: uppercase; }
canvas.mini-chart { width: 100%; height: 64px; display: block; }

/* Week header */
.week-hdr {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 28px 0 10px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.week-hdr:first-of-type { margin-top: 0; }
.week-hdr h2 { font-size: 21px; font-weight: 600; letter-spacing: -0.03em; color: var(--text); }
.week-phase {
  font-size: 11px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 980px;
  white-space: nowrap;
}
.week-range { font-size: 12px; color: var(--muted); margin-left: auto; }

/* Day card */
.day-card {
  background: var(--surface);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: box-shadow .2s;
}
.day-card:hover { box-shadow: var(--shadow-md); }
.day-card.today { box-shadow: 0 0 0 2px var(--blue), var(--shadow); }

.day-head {
  display: flex;
  align-items: center;
  padding: 14px 18px;
  cursor: pointer;
  gap: 12px;
  user-select: none;
}
.day-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.day-info { flex: 1 }
.day-name { font-size: 15px; font-weight: 500; color: var(--text); letter-spacing: -0.01em; line-height: 1.2; }
.day-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
.today-badge {
  display: inline-block;
  font-size: 10px;
  background: var(--blue);
  color: #fff;
  border-radius: 980px;
  padding: 1px 7px;
  font-weight: 600;
  margin-left: 6px;
  vertical-align: middle;
  letter-spacing: 0.02em;
}
.day-quick { display: flex; gap: 14px; margin-right: 4px; }
.dq { text-align: center; }
.dq-v { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1; }
.dq-v.empty { color: var(--faint); }
.dq-l { font-size: 10px; color: var(--faint); margin-top: 1px; }
.day-badge {
  font-size: 11px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 980px;
  white-space: nowrap;
}
.day-chev { color: var(--faint); font-size: 11px; transition: transform .2s; flex-shrink: 0; }
.day-card.open .day-chev { transform: rotate(180deg); }

.day-body { display: none; padding: 0 18px 18px; border-top: 1px solid var(--border); }
.day-card.open .day-body { display: block; }

/* Section label */
.section-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin: 18px 0 10px;
}

/* Biometria grid */
.bio-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.bio-box {
  background: var(--surface2);
  border-radius: var(--radius-xs);
  padding: 10px 8px;
  text-align: center;
}
.bio-box input {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  font-family: inherit;
  font-size: 17px;
  font-weight: 500;
  color: var(--text);
  text-align: center;
  letter-spacing: -0.02em;
}
.bio-box input::placeholder { color: var(--faint); font-size: 15px; }
.bio-lbl { font-size: 10px; color: var(--muted); margin-top: 3px; }

/* Field groups */
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
.field-row.tri { grid-template-columns: 1fr 1fr 1fr; }
.field-row.solo { grid-template-columns: 1fr; }
.field-row.two { grid-template-columns: 1fr 1fr; }

.fg {
  background: var(--surface2);
  border-radius: var(--radius-xs);
  padding: 10px 12px;
}
.fg label {
  display: block;
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 5px;
}
.fg input, .fg select, .fg textarea {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  font-size: 14px;
  color: var(--text);
  font-family: inherit;
  resize: none;
}
.fg textarea { height: 52px; line-height: 1.5; }
.fg select { cursor: pointer; }

/* Injection row */
.inj-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-top: 8px; }

.sent-tab {
  font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--surface2); color: var(--muted);
  cursor: pointer; transition: all .15s;
}
.sent-tab.active { background: var(--blue); color: #fff; border-color: var(--blue); }
.sent-tab:hover:not(.active) { background: var(--surface3, #e8e8ed); }
.comp-bar-row { display:flex; align-items:center; gap:8px; }
.comp-bar-label { font-size:12px; font-weight:500; color:var(--text); min-width:72px; }
.comp-bar-track { flex:1; height:7px; background:var(--border); border-radius:4px; overflow:hidden; }
.comp-bar-fill { height:100%; border-radius:4px; transition: width .4s ease; }
.comp-bar-pct { font-size:11px; color:var(--muted); min-width:36px; text-align:right; }
/* Workout box */
.wo-box {
  background: var(--surface2);
  border-radius: var(--radius-xs);
  padding: 14px;
  margin-top: 8px;
}
.wo-header {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: -0.01em;
  margin-bottom: 10px;
}
.wo-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.wo-row.two { grid-template-columns: 1fr 1fr; }

/* Sentinel + Exercise log */
.log-table { width: 100%; margin-top: 12px; border-collapse: collapse; }
.log-table th {
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  text-align: center;
  padding: 0 4px 6px;
}
.log-table th:first-child { text-align: left; padding-left: 0; }
.log-table td { padding: 3px 4px; }
.log-table td:first-child { padding-left: 0; }
.log-table .ex-name {
  font-size: 13px;
  color: var(--text2);
  padding: 4px 0;
}
.log-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 6px;
  font-size: 13px;
  font-family: inherit;
  text-align: center;
  color: var(--text);
  outline: none;
  transition: border-color .15s;
}
.log-input:focus { border-color: var(--blue); }
.log-select {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 8px;
  font-size: 12px;
  font-family: inherit;
  color: var(--text);
  outline: none;
  cursor: pointer;
}
.sentinel-baseline {
  font-size: 10px;
  color: var(--faint);
  margin-top: 1px;
}
.log-section-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin: 14px 0 6px;
}

/* Note box */
.note-box {
  background: var(--surface2);
  border-radius: var(--radius-xs);
  padding: 12px 14px;
  margin-top: 8px;
}
.note-box label {
  display: block;
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.note-box textarea {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  font-size: 14px;
  color: var(--text);
  font-family: inherit;
  resize: none;
  line-height: 1.6;
  height: 76px;
}
.note-box textarea::placeholder { color: var(--faint); }

/* Rest banner */
.rest-banner {
  background: var(--surface2);
  border-radius: var(--radius-xs);
  padding: 14px 16px;
  margin-top: 10px;
  text-align: center;
  font-size: 14px;
  color: var(--muted);
}

/* Phase badge colors */
.p1b { background: #e8f1fb; color: #0071e3; }
.p2b { background: #fff5e6; color: #c26000; }
.p3b { background: #e8f8ed; color: #1a7a3a; }
.p4b { background: #feeeec; color: #cc2200; }

/* Workout type badges */
.badge-push  { background: #feeeec; color: #cc2200; }
.badge-pull  { background: #e8f8ed; color: #1a7a3a; }
.badge-legs  { background: #fff5e6; color: #c26000; }
.badge-upper { background: #f5eeff; color: #8522c0; }
.badge-rest  { background: #f5f5f7; color: #aeaeb2; }
.badge-bkk   { background: #e8f1fb; color: #0071e3; }

/* Save bar */
.save-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  z-index: 100;
}
.save-hint { font-size: 12px; color: var(--muted); }
.save-btn-main {
  background: var(--blue);
  color: #fff;
  border: none;
  padding: 10px 24px;
  border-radius: 980px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: -0.01em;
  transition: background .15s, transform .1s;
}
.save-btn-main:hover { background: var(--blue-hover); }
.save-btn-main:active { transform: scale(0.97); }
.save-btn-main:disabled { opacity: .5; cursor: not-allowed; }

/* Loading */
.loading-overlay {
  position: fixed; inset: 0;
  background: rgba(255,255,255,0.9);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 300; gap: 12px;
}
.loading-overlay p { font-size: 14px; color: var(--muted); }
.spinner {
  width: 28px; height: 28px;
  border: 2.5px solid var(--border);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Vita field */
.vita-field { margin-top: 8px; }

/* Mobile */
@media (max-width: 600px) {
  .bio-grid { grid-template-columns: repeat(3,1fr); }
  .inj-row { grid-template-columns: 1fr 1fr; }
  .wo-row { grid-template-columns: 1fr 1fr; }
  .day-quick { display: none; }
  .header { padding: 0 16px; }
  .container { padding: 20px 12px 110px; }
  .nav-strip { padding: 0 16px; }
  .charts-grid { grid-template-columns: 1fr; }
  .cycle-card { flex-direction: column; text-align: center; }
  .field-row.tri { grid-template-columns: 1fr 1fr; }
}

/* Motra import */
.motra-box {
  background: var(--surface2);
  border-radius: var(--radius-xs);
  padding: 14px;
  margin-top: 8px;
}
.motra-box label {
  display: block;
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.motra-textarea {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 13px;
  font-family: inherit;
  color: var(--text);
  resize: none;
  height: 100px;
  line-height: 1.5;
  outline: none;
  transition: border-color .15s;
}
.motra-textarea:focus { border-color: var(--blue); }
.motra-textarea::placeholder { color: var(--faint); }
.motra-import-btn {
  margin-top: 8px;
  background: var(--blue);
  color: #fff;
  border: none;
  padding: 8px 18px;
  border-radius: 980px;
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: background .15s;
}
.motra-import-btn:hover { background: var(--blue-hover); }
.motra-result {
  margin-top: 10px;
  font-size: 12px;
  color: var(--muted);
  display: none;
}
.motra-result.ok { color: var(--green); display: block; }
.motra-result.err { color: var(--red); display: block; }
.motra-parsed {
  margin-top: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  display: none;
}
.motra-parsed.show { display: block; }
.motra-ex-row {
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.motra-ex-row:last-child { border-bottom: none; padding-bottom: 0; }
.motra-ex-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 3px;
}
.motra-ex-sets {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.6;
}
.motra-meta {
  display: flex;
  gap: 16px;
  margin-bottom: 10px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.motra-meta-item { text-align: center; }
.motra-meta-val { font-size: 17px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
.motra-meta-lbl { font-size: 10px; color: var(--muted); margin-top: 1px; }


/* Lab / DEXA sections */
.milestone-card{background:var(--surface);border-radius:var(--radius-sm);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow)}
.milestone-head{display:flex;align-items:center;padding:14px 18px;cursor:pointer;gap:12px;user-select:none}
.milestone-badge{font-size:11px;font-weight:500;padding:4px 10px;border-radius:980px;white-space:nowrap}
.milestone-body{display:none;padding:0 18px 18px;border-top:1px solid var(--border)}
.milestone-card.open .milestone-body{display:block}
.milestone-card.open .day-chev{transform:rotate(180deg)}

.lab-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.lab-box{background:var(--surface2);border-radius:var(--radius-xs);padding:10px 10px 8px}
.lab-box label{display:block;font-size:9px;font-weight:600;color:var(--muted);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:5px}
.lab-box input{width:100%;background:transparent;border:none;outline:none;font-size:15px;font-weight:500;color:var(--text);font-family:inherit}
.lab-box input::placeholder{color:var(--faint);font-size:13px}
.lab-ref{font-size:9px;color:var(--faint);margin-top:2px}
.lab-delta{font-size:10px;font-weight:500;margin-top:2px}
.lab-delta.up{color:#34c759}.lab-delta.down{color:#ff3b30}.lab-delta.neutral{color:var(--muted)}

.dexa-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px}
.dexa-compare{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:8px}
.dexa-col h4{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.04em;text-transform:uppercase;margin-bottom:8px}

.check-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:8px}

function formatDate(d){ return d.toLocaleDateString('it-IT',{weekday:'long',day:'2-digit',month:'long'}); }
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }

function getDotColor(type){
  if(type==='Push')return '#ff3b30';
  if(type==='Pull')return '#34c759';
  if(type==='Legs')return '#ff9500';
  if(type==='Upper Sab')return '#af52de';
  if(type==='Upper Dom')return '#8e44ad';
  if(type.includes('Upper'))return '#af52de';
  if(type==='BKK_FREE')return '#0071e3';
  return '#aeaeb2';
}

function getWorkout(i){
  const d=new Date(START); d.setDate(d.getDate()+i);
  const dow=d.getDay();
  if(isBKK(i)) return {type:'BKK_FREE', badge:'badge-bkk', label:'BKK'};
  if(dow===4) return {type:'Riposo', badge:'badge-rest', label:'RIPOSO'};
  if(dow===0) return {type:'Upper Dom', badge:'badge-upper', label:'UPPER DOM'};
  return SPLIT[dow];
}

function getNextEvent(elapsed){
  const wk=Math.floor(elapsed/7)+1;
  if(wk<5){ const d=(4-wk)*7; return `Tesa 2mg + GHK-Cu tra ${d} giorni (settimana 5)`; }
  if(wk<7){ const d=(6-wk)*7; return `MOTS-C + GHK-Cu tra ${d} giorni (settimana 7)`; }
  if(wk<9){ const d=(61-elapsed); return d>0?`Bangkok tra ${d} giorni (8 ago)`:'Bangkok · oggi!'; }
  if(wk<13){ const d=(12-wk)*7; return `BPC-157 tra ${d} giorni (settimana 13)`; }
  return 'Mini-panel sangue · DEXA T1 fine ciclo';
}

function buildCycleCard(container){
  const today=new Date(); today.setHours(0,0,0,0);
  const start=new Date(START); start.setHours(0,0,0,0);
  const elapsed=Math.floor((today-start)/86400000);
  if(elapsed<0||elapsed>=TOTAL_DAYS) return;
  const pct=Math.min(100,Math.round((elapsed/TOTAL_DAYS)*100));
  const wk=Math.floor(elapsed/7)+1;
  const ph=getPhase(elapsed);
  const C=2*Math.PI*30;
  const offset=C*(1-pct/100);
  const nextEv=getNextEvent(elapsed);
  const card=document.createElement('div');
  card.className='cycle-card';
  card.innerHTML=`
    <div class="cycle-ring">
      <svg width="72" height="72" viewBox="0 0 72 72">
        <circle cx="36" cy="36" r="30" fill="none" stroke="#e8e8ed" stroke-width="5"/>
        <circle cx="36" cy="36" r="30" fill="none" stroke="#0071e3" stroke-width="5"
          stroke-dasharray="${C.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}" stroke-linecap="round"/>
      </svg>
      <div class="cycle-ring-label">
        <span class="cycle-ring-pct">${pct}%</span>
        <span class="cycle-ring-sub">ciclo</span>
      </div>
    </div>
    <div class="cycle-info">
      <h3>Settimana ${wk} · ${ph.label}</h3>
      <p>Giorno ${elapsed+1} di ${TOTAL_DAYS} · ${TOTAL_DAYS-elapsed-1} giorni al termine</p>
      <div class="cycle-next">⟶ ${nextEv}</div>
    </div>`;
  container.insertBefore(card, container.firstChild);
}

function buildCharts(container){
  const today=new Date(); today.setHours(0,0,0,0);
  const start=new Date(START); start.setHours(0,0,0,0);
  const elapsed=Math.floor((today-start)/86400000);
  if(elapsed<2) return;
  const from=Math.max(0,elapsed-13);
  const pesoData=[],hrvData=[];
  for(let i=from;i<=elapsed&&i<TOTAL_DAYS;i++){
    const ep=document.querySelector(`[data-id="day_${i}"][data-f="peso"]`);
    const eh=document.querySelector(`[data-id="day_${i}"][data-f="hrv"]`);
    pesoData.push(ep?.value?parseFloat(ep.value):null);
    hrvData.push(eh?.value?parseFloat(eh.value):null);
  }
  if(!pesoData.some(v=>v!==null)&&!hrvData.some(v=>v!==null)) return;
  const card=document.createElement('div');
  card.className='charts-card'; card.id='charts-card';
  card.innerHTML=`
    <div class="charts-card-title">Andamento · ultimi 14 giorni</div>
    <div class="charts-grid">
      <div><div class="chart-label">Peso kg</div><canvas class="mini-chart" id="chart-peso" height="64"></canvas></div>
      <div><div class="chart-label">HRV ms</div><canvas class="mini-chart" id="chart-hrv" height="64"></canvas></div>
    </div>`;
  // Insert after cycle card
  const cycleCard=container.querySelector('.cycle-card');
  if(cycleCard) cycleCard.after(card);
  else container.insertBefore(card, container.firstChild);
  setTimeout(()=>{
    drawChart('chart-peso',pesoData,'#0071e3');

  },100);
}

function drawChart(id,data,color){
  const canvas=document.getElementById(id);
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*dpr; canvas.height=64*dpr;
  ctx.scale(dpr,dpr);
  const W=rect.width,H=64;
  const pts=data.filter(v=>v!==null);
  if(pts.length<2){ ctx.font='11px -apple-system'; ctx.fillStyle='#aeaeb2'; ctx.fillText('Dati insufficienti',8,32); return; }
  const mn=Math.min(...pts)*0.995, mx=Math.max(...pts)*1.005, rng=mx-mn||1;
  const valid=data.map((v,i)=>v!==null?{x:i/(data.length-1)*(W-4)+2, y:H-((v-mn)/rng)*(H-16)-6, v}:null);
  // Fill
  ctx.beginPath();
  let st=false;
  valid.forEach(p=>{ if(!p)return; if(!st){ctx.moveTo(p.x,p.y);st=true;}else ctx.lineTo(p.x,p.y); });
  const lp=valid.filter(Boolean).pop(), fp=valid.filter(Boolean)[0];
  if(lp&&fp){ ctx.lineTo(lp.x,H);ctx.lineTo(fp.x,H);ctx.closePath(); const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,color+'28');g.addColorStop(1,color+'00'); ctx.fillStyle=g; ctx.fill(); }
  // Line
  ctx.beginPath(); st=false;
  valid.forEach(p=>{ if(!p)return; if(!st){ctx.moveTo(p.x,p.y);st=true;}else ctx.lineTo(p.x,p.y); });
  ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.lineJoin='round'; ctx.lineCap='round'; ctx.stroke();
  // Dots
  valid.forEach(p=>{ if(!p)return; ctx.beginPath();ctx.arc(p.x,p.y,2.5,0,Math.PI*2); ctx.fillStyle=color; ctx.fill(); });
  // Last value
  if(lp){ ctx.font='500 11px -apple-system'; ctx.fillStyle=color; ctx.fillText(lp.v.toFixed(1),Math.min(lp.x,W-32),lp.y-6); }
}

function setSyncStatus(state){
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-label');
  if(state==='ok'){dot.className='sync-dot ok';lbl.textContent='Sincronizzato';}
  else if(state==='err'){dot.className='sync-dot err';lbl.textContent='Errore sync';}
  else{dot.className='sync-dot';lbl.textContent='—';}
}

function onInput(el,id,f){
  const v=el.value;
  const q=document.getElementById('q-'+id+'-'+f);
  if(q){
    if(v){q.textContent=parseFloat(v).toFixed(1);q.classList.remove('empty');}
    else{q.textContent='—';q.classList.add('empty');}
  }
  updateProgress();
}

function updateProgress(){
  const all=document.querySelectorAll('[data-f="peso"]');
  let filled=0; all.forEach(el=>{if(el.value)filled++;});
  document.getElementById('prog-bar').style.width=Math.round((filled/TOTAL_DAYS)*100)+'%';
}

function collectAll(){
  const data={};
  document.querySelectorAll('[data-id][data-f]').forEach(el=>{
    const id=el.dataset.id,f=el.dataset.f;
    if(!data[id])data[id]={};
    // Save all values including empty — so resetting a field to blank overwrites old value
    // Skip only 'skip' marker (vita fields on non-vita days) and hidden inputs with no value
    if(el.type==='hidden'&&!el.value) return;
    if(el.value==='skip') return;
    if(el.type==='checkbox'){data[id][f]=el.checked?'1':'';return;}
    data[id][f]=el.value;
  });
  return data;
}

function renderMotraFromLog(dayId, jsonStr) {
  try {
    const data = JSON.parse(jsonStr);
    if (!data || !data.exercises || !data.exercises.length) return;
    const parsed = document.getElementById('motra-parsed-' + dayId);
    const res = document.getElementById('motra-res-' + dayId);
    if (!parsed) return;
    const metaHtml = `
      <div class="motra-meta">
        ${data.durata ? `<div class="motra-meta-item"><div class="motra-meta-val">${data.durata}</div><div class="motra-meta-lbl">Durata</div></div>` : ''}
        ${data.volume ? `<div class="motra-meta-item"><div class="motra-meta-val">${data.volume}</div><div class="motra-meta-lbl">Volume</div></div>` : ''}
        ${data.calorie ? `<div class="motra-meta-item"><div class="motra-meta-val">${data.calorie}</div><div class="motra-meta-lbl">Calorie</div></div>` : ''}
        <div class="motra-meta-item"><div class="motra-meta-val">${data.exercises.length}</div><div class="motra-meta-lbl">Esercizi</div></div>
      </div>`;
    const exHtml = data.exercises.map(ex => {
      const workSets = ex.sets.filter(s => s.label !== 'W');
      const warmSets = ex.sets.filter(s => s.label === 'W');
      const setsStr = workSets.map(s => `${s.reps}×${s.kg}kg`).join(' · ');
      const warnStr = warmSets.length ? ` <span style="color:var(--faint);font-size:11px">(+${warmSets.length} riscald.)</span>` : '';
      return `<div class="motra-ex-row">
        <div class="motra-ex-name">${ex.name}</div>
        <div class="motra-ex-sets">${setsStr}${warnStr}</div>
      </div>`;
    }).join('');
    parsed.innerHTML = metaHtml + exHtml;
    parsed.className = 'motra-parsed show';
    if (res) { res.className = 'motra-result ok'; res.textContent = `✓ ${data.exercises.length} esercizi caricati`; }
  } catch(e) {}
}

function applyAll(data){
  Object.entries(data).forEach(([id,fields])=>{
    Object.entries(fields).forEach(([f,v])=>{
      const el=document.querySelector(`[data-id="${id}"][data-f="${f}"]`);
      if(el){
        if(el.type==='checkbox'){el.checked=(v==='1');return;}
        el.value=v;
        if(f==='peso')onInput(el,id,'peso');
        if(f==='hrv')onInput(el,id,'hrv');
        if(f==='qualita_sonno')onInput(el,id,'sonno');
        if(f==='motra_log'&&v) renderMotraFromLog(id, v);
      }
    });
  });
  updateProgress();
}

let _saving=false;
async function saveData(){
  if(_saving) return; // prevent concurrent saves
  _saving=true;
  const btn=document.getElementById('save-btn');
  btn.disabled=true; btn.textContent='Salvataggio...';
  setSyncStatus('—');
  const data=collectAll();
  const ts=Date.now();
  try{localStorage.setItem(KEY,JSON.stringify({data,ts}));}catch(e){}
  try{
    const now=new Date();
    const isoTs=new Date(ts).toISOString();
    // Try PATCH first (update existing record)
    let res=await fetch(SB_URL+'/rest/v1/diary?user_id=eq.'+USER_ID,{
      method:'PATCH',
      headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'return=representation'},
      body:JSON.stringify({data,updated_at:isoTs})
    });
    // If no record exists (0 rows updated), do POST to insert
    if(res.status===200){
      const patched=await res.json();
      if(!patched||patched.length===0){
        res=await fetch(SB_URL+'/rest/v1/diary',{
          method:'POST',
          headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'return=representation'},
          body:JSON.stringify({user_id:USER_ID,data,updated_at:isoTs})
        });
        const inserted=await res.json();
        if(inserted&&inserted[0]&&inserted[0].updated_at){
          localStorage.setItem(KEY,JSON.stringify({data,ts:new Date(inserted[0].updated_at).getTime()}));
        }
      } else {
        if(patched[0]&&patched[0].updated_at){
          localStorage.setItem(KEY,JSON.stringify({data,ts:new Date(patched[0].updated_at).getTime()}));
        }
      }
      document.getElementById('last-saved').textContent='Salvato '+now.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
      setSyncStatus('ok');
    } else {
      document.getElementById('last-saved').textContent='Salvato localmente · cloud err '+res.status;
      setSyncStatus('err');
    }
  }catch(e){
    document.getElementById('last-saved').textContent='Salvato localmente (offline)';
    setSyncStatus('err');
  }
  btn.disabled=false; btn.textContent='Salva dati';
  _saving=false;
}

async function loadFromCloud(){
  setSyncStatus('—');
  document.getElementById('last-saved').textContent='Sincronizzazione...';
  try{
    const res=await fetch(SB_URL+'/rest/v1/diary?user_id=eq.'+USER_ID+'&select=data,updated_at&limit=1',
      {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
    if(res.ok){
      const rows=await res.json();
      if(rows&&rows.length>0&&rows[0].data){
        const cd=rows[0].data,ct=rows[0].updated_at;
        const ctMs=new Date(ct).getTime();
        // Always apply cloud data on explicit sync
        applyAll(cd);
        localStorage.setItem(KEY,JSON.stringify({data:cd,ts:ctMs}));
          document.getElementById('last-saved').textContent='Caricato dal cloud · '+new Date(ct).toLocaleString('it-IT');
          setSyncStatus('ok');
          setTimeout(refreshCharts,200);
      } else {
        document.getElementById('last-saved').textContent='Nessun dato nel cloud';
        setSyncStatus('—');
      }
    } else throw new Error('HTTP '+res.status);
  }catch(e){
    const lr=localStorage.getItem(KEY);
    if(lr){try{const p=JSON.parse(lr);applyAll(p.data||p);document.getElementById('last-saved').textContent='Locale (offline)';setSyncStatus('err');}catch(e2){}}
    else{document.getElementById('last-saved').textContent='Errore connessione';setSyncStatus('err');}
  }
}

function jumpToday(){
  const today=new Date(); today.setHours(0,0,0,0);
  const start=new Date(START); start.setHours(0,0,0,0);
  const diff=Math.floor((today-start)/86400000);
  if(diff>=0&&diff<TOTAL_DAYS){
    const card=document.getElementById('card-day_'+diff);
    if(card){card.classList.add('open');card.scrollIntoView({behavior:'smooth',block:'center'});}
  }
}

function updateNavHighlight(){
  const today=new Date(); today.setHours(0,0,0,0);
  const start=new Date(START); start.setHours(0,0,0,0);
  const diff=Math.floor((today-start)/86400000);
  if(diff>=0&&diff<TOTAL_DAYS){
    const wk=Math.floor(diff/7)+1;
    document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('on'));
    const tab=document.getElementById('nav-w'+wk);
    if(tab){tab.classList.add('on');tab.scrollIntoView({inline:'center',behavior:'smooth'});}
  }
}

function calcDexaDelta(milestoneId) {
  const get = f => parseFloat(document.querySelector(`[data-id="${milestoneId}"][data-f="${f}"]`)?.value) || null;
  const t0 = DEXA_T0;
  const fields = [
    {f:'dexa_peso', label:'Peso', t0:t0.peso, unit:'kg', better:'down'},
    {f:'dexa_bf_pct', label:'BF', t0:t0.bf_pct, unit:'%', better:'down'},
    {f:'dexa_fat_kg', label:'Fat', t0:t0.fat_kg, unit:'kg', better:'down'},
    {f:'dexa_lean_kg', label:'Lean', t0:t0.lean_kg, unit:'kg', better:'up'},
    {f:'dexa_vat_cm2', label:'VAT', t0:t0.vat_cm2, unit:'cm²', better:'down'},
  ];
  const deltas = fields.map(fd => {
    const v = get(fd.f);
    if (v === null) return null;
    const diff = (v - parseFloat(fd.t0)).toFixed(1);
    const sign = diff > 0 ? '+' : '';
    const cls = (fd.better === 'down' && diff < 0) || (fd.better === 'up' && diff > 0) ? 'up' : diff == 0 ? 'neutral' : 'down';
    return `<span class="tag-pill" style="background:${cls==='up'?'#e8f8ed':cls==='down'?'#feeeec':'#f5f5f7'};color:${cls==='up'?'#1a7a3a':cls==='down'?'#cc2200':'#6e6e73'}">${fd.label} ${sign}${diff}${fd.unit}</span>`;
  }).filter(Boolean);
  const el = document.getElementById('dexa-delta-' + milestoneId);
  if (el) el.innerHTML = deltas.length ? deltas.join('') : 'Inserisci i valori per calcolare il delta';
}

function buildWeekSummary(container, wkIdx) {
  const today = new Date(); today.setHours(0,0,0,0);
  const start = new Date(START); start.setHours(0,0,0,0);
  const elapsed = Math.floor((today - start) / 86400000);
  const currentWk = Math.floor(elapsed / 7);
  if (wkIdx !== currentWk) return; // only show for current week

  const wkStart = wkIdx * 7;
  const wkEnd = Math.min(wkStart + 7, TOTAL_DAYS);

  let totalInj = 0, doneInj = 0, totalWo = 0, doneWo = 0;
  let pesoSum = 0, pesoCount = 0, hrvSum = 0, hrvCount = 0;

  for (let i = wkStart; i < wkEnd && i <= elapsed; i++) {
    const id = 'day_' + i;
    // Injections
    ['inj1','inj2','inj3','inj4'].forEach(k => {
      const peptide = document.querySelector(`[data-id="${id}"][data-f="${k}_peptide"]`)?.value;
      if (peptide) { totalInj++; }
      const eseguita = document.querySelector(`[data-id="${id}"][data-f="${k}_eseguita"]`)?.value;
      if (eseguita === 'Sì') doneInj++;
    });
    // Workout
    const wo = getWorkout(i);
    if (wo.type !== 'Riposo') {
      totalWo++;
      const rpe = document.querySelector(`[data-id="${id}"][data-f="wo_rpe"]`)?.value;
      if (rpe) doneWo++;
    }
    // Biometrics
    const peso = parseFloat(document.querySelector(`[data-id="${id}"][data-f="peso"]`)?.value);
    if (!isNaN(peso)) { pesoSum += peso; pesoCount++; }
    const hrv = parseFloat(document.querySelector(`[data-id="${id}"][data-f="hrv"]`)?.value);
    if (!isNaN(hrv)) { hrvSum += hrv; hrvCount++; }
  }

  const avgPeso = pesoCount ? (pesoSum/pesoCount).toFixed(1) : '—';
  const avgHrv = hrvCount ? Math.round(hrvSum/hrvCount) : '—';

  const card = document.createElement('div');
  card.className = 'week-summary-card';
  card.id = 'week-summary-' + wkIdx;
  card.innerHTML = `
    <div style="font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.05em;text-transform:uppercase">Riepilogo settimana ${wkIdx+1}</div>
    <div class="week-summary-grid">
      <div class="ws-item">
        <div class="ws-val">${avgPeso}<span style="font-size:12px;font-weight:400"> kg</span></div>
        <div class="ws-lbl">Peso medio</div>
      </div>
      <div class="ws-item">
        <div class="ws-val">${avgHrv}<span style="font-size:12px;font-weight:400"> ms</span></div>
        <div class="ws-lbl">HRV medio</div>
      </div>
      <div class="ws-item">
        <div class="ws-val">${doneWo}<span style="font-size:12px;font-weight:400">/${totalWo}</span></div>
        <div class="ws-lbl">Workout</div>
      </div>
      <div class="ws-item">
        <div class="ws-val" style="font-size:14px">${doneInj > 0 ? '✓' : '—'}</div>
        <div class="ws-lbl">Iniezioni</div>
        <div class="ws-sub">${doneInj} registrate</div>
      </div>
    </div>`;
  return card;
}


// ── DASHBOARD ──
function switchView(view) {
  const diary = document.getElementById('diary-view');
  const dash = document.getElementById('dash-view');
  const med = document.getElementById('med-view');
  const navStrip = document.getElementById('nav-strip');
  const tabDiary = document.getElementById('main-tab-diary');
  const tabDash = document.getElementById('main-tab-dash');
  const tabMed = document.getElementById('main-tab-med');
  // Reset all
  diary.classList.add('hidden'); dash.classList.remove('active'); med.classList.add('hidden');
  navStrip.style.display = 'none';
  tabDiary.classList.remove('on'); tabDash.classList.remove('on'); tabMed.classList.remove('on');
  if (view === 'dash') {
    dash.classList.add('active');
    tabDash.classList.add('on');
    buildDashboard();
  } else if (view === 'med') {
    med.classList.remove('hidden');
    tabMed.classList.add('on');
    buildMedView();
  } else {
    diary.classList.remove('hidden');
    navStrip.style.display = '';
    tabDiary.classList.add('on');
  }
}

function buildMedView() {
  const med = document.getElementById('med-view');
  if (med.dataset.built) return;
  med.dataset.built = '1';

  // ── HELPER ──────────────────────────────────────────────────────────────
  function flag(ok, severity) {
    // severity: 'warn' | 'alert' | auto
    if (ok) return { color:'#34c759', bg:'rgba(52,199,89,.08)' };
    if (severity==='alert') return { color:'#ff3b30', bg:'rgba(255,59,48,.08)' };
    return { color:'#ff9500', bg:'rgba(255,149,0,.08)' };
  }
  function renderPanel(p) {
    let h = `<div class="med-panel">
      <div class="med-panel-hdr">
        <div>
          <div class="med-panel-title">${p.label}</div>
          <div class="med-panel-sub">${p.date}${p.note?' · '+p.note:''}</div>
        </div>
      </div>`;
    p.cats.forEach(cat => {
      h += `<div class="med-cat">
        <div class="med-cat-label">${cat.cat}</div>
        <div class="med-items">`;
      cat.items.forEach(item => {
        const {color, bg} = flag(item.ok, item.sev);
        h += `<div class="med-item" style="background:${bg}">

function getDayData(field, days) {
  // Returns array of {dayIdx, date, value} for last N days with data
  const today = new Date(); today.setHours(0,0,0,0);
  const start = new Date(START); start.setHours(0,0,0,0);
  const elapsed = Math.floor((today - start) / 86400000);
  const from = Math.max(0, elapsed - (days - 1));
  const result = [];
  for (let i = from; i <= elapsed && i < TOTAL_DAYS; i++) {
    const el = document.querySelector(`[data-id="day_${i}"][data-f="${field}"]`);
    const v = el ? (el.type === 'checkbox' ? (el.checked ? 1 : 0) : parseFloat(el.value)) : null;
    const d = new Date(START); d.setDate(d.getDate() + i);
    result.push({ dayIdx: i, date: d, value: isNaN(v) ? null : v });
  }
  return result;
}

function getComplianceData() {
  const today = new Date(); today.setHours(0,0,0,0);
  const start = new Date(START); start.setHours(0,0,0,0);
  const elapsed = Math.floor((today - start) / 86400000);

  let injPrev = 0, injDone = 0;
  let woPrev = 0, woDone = 0;
  let stackDays = 0, stackDone = 0;

  for (let i = 0; i <= elapsed && i < TOTAL_DAYS; i++) {
    const id = 'day_' + i;
    // Injections
    ['inj1','inj2','inj3','inj4'].forEach(k => {
      const p = document.querySelector(`[data-id="${id}"][data-f="${k}_peptide"]`)?.value;
      if (p) {
        injPrev++;
        if (document.querySelector(`[data-id="${id}"][data-f="${k}_eseguita"]`)?.value === 'Sì') injDone++;
      }
    });
    // Workout
    const wo = getWorkout(i);
    if (wo.type !== 'Riposo') {
      woPrev++;
      if (document.querySelector(`[data-id="${id}"][data-f="wo_rpe"]`)?.value) woDone++;
    }
    // Stack
    stackDays++;
    const checks = ['ck_d3','ck_omega','ck_creat','ck_zinc','ck_b12','ck_norm'];
    const allChecked = checks.every(c => document.querySelector(`[data-id="${id}"][data-f="${c}"]`)?.checked);
    if (allChecked) stackDone++;
  }
  // Per-type breakdown
  const woCounts = { Push:0, Pull:0, Legs:0, 'Upper Sab':0, 'Upper Dom':0 };
  const woDones  = { Push:0, Pull:0, Legs:0, 'Upper Sab':0, 'Upper Dom':0 };
  for (let i = 0; i <= elapsed && i < TOTAL_DAYS; i++) {
    const wo2 = getWorkout(i);
    if (wo2.type in woCounts) {
      woCounts[wo2.type]++;
      const rpe2 = document.querySelector(`[data-id="day_${i}"][data-f="wo_rpe"]`)?.value;
      if (rpe2) woDones[wo2.type]++;
    }
  }
  return { injPrev, injDone, woPrev, woDone, stackDays, stackDone, woCounts, woDones };
}

function drawDashChart(canvasId, datasets, options = {}) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = (options.height || 80) * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = options.height || 80;

  // Collect all valid values across datasets for scale
  const allVals = datasets.flatMap(ds => ds.data.map(p => p.value).filter(v => v !== null));
  if (allVals.length < 2) {
    ctx.font = '11px -apple-system'; ctx.fillStyle = '#aeaeb2';
    ctx.fillText('Dati insufficienti — continua a compilare il diario', 8, H/2);
    return;
  }
  const mn = Math.min(...allVals) * (options.minScale || 0.97);
  const mx = Math.max(...allVals) * (options.maxScale || 1.03);
  const rng = mx - mn || 1;
  const n = datasets[0].data.length;

  // Grid lines
  ctx.strokeStyle = 'rgba(0,0,0,0.05)'; ctx.lineWidth = 1;
  [0.25, 0.5, 0.75].forEach(r => {
    const y = H - r * (H - 16) - 4;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  });

  datasets.forEach(ds => {
    const pts = ds.data.map((p, i) => p.value !== null ? {
      x: n > 1 ? i / (n - 1) * (W - 4) + 2 : W / 2,
      y: H - ((p.value - mn) / rng) * (H - 16) - 4,
      v: p.value, date: p.date
    } : null);

    // Fill area
    ctx.beginPath();
    let st = false;
    pts.forEach(p => { if (!p) return; if (!st) { ctx.moveTo(p.x, p.y); st = true; } else ctx.lineTo(p.x, p.y); });
    const lp = pts.filter(Boolean).pop(), fp = pts.filter(Boolean)[0];
    if (lp && fp) {
      ctx.lineTo(lp.x, H); ctx.lineTo(fp.x, H); ctx.closePath();
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, ds.color + '22'); g.addColorStop(1, ds.color + '00');
      ctx.fillStyle = g; ctx.fill();
    }

    // Line
    ctx.beginPath(); st = false;
    pts.forEach(p => { if (!p) return; if (!st) { ctx.moveTo(p.x, p.y); st = true; } else ctx.lineTo(p.x, p.y); });
    ctx.strokeStyle = ds.color; ctx.lineWidth = 1.8; ctx.lineJoin = 'round'; ctx.lineCap = 'round'; ctx.stroke();

    // Dots + last value label
    pts.forEach((p, i) => {
      if (!p) return;
      ctx.beginPath(); ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = ds.color; ctx.fill();
    });
    if (lp) {
      ctx.font = '500 10px -apple-system'; ctx.fillStyle = ds.color;
      ctx.fillText(lp.v.toFixed(lp.v % 1 === 0 ? 0 : 1), Math.min(lp.x, W - 32), lp.y - 6);
    }
  });
}

function drawComplianceRing(canvasId, pct, color) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = 56 * dpr; canvas.height = 56 * dpr;
  ctx.scale(dpr, dpr);
  const cx = 28, cy = 28, r = 22, C = 2 * Math.PI * r;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = '#e8e8ed'; ctx.lineWidth = 5; ctx.stroke();
  ctx.beginPath();
  ctx.arc(cx, cy, r, -Math.PI / 2, -Math.PI / 2 + (pct / 100) * Math.PI * 2);
  ctx.strokeStyle = color; ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.stroke();
}

function getWorkoutSessions(days) {
  // Returns array of session objects for last N days that had a workout
  const today = new Date(); today.setHours(0,0,0,0);
  const start = new Date(START); start.setHours(0,0,0,0);
  const elapsed = Math.floor((today - start) / 86400000);
  const from = Math.max(0, elapsed - (days - 1));
  const sessions = [];
  for (let i = from; i <= elapsed && i < TOTAL_DAYS; i++) {
    const id = 'day_' + i;
    const wo = getWorkout(i);
    if (wo.type === 'Riposo') continue;
    const volEl = document.querySelector(`[data-id="${id}"][data-f="wo_volume"]`);
    const kcalEl = document.querySelector(`[data-id="${id}"][data-f="wo_kcal"]`);
    const durEl = document.querySelector(`[data-id="${id}"][data-f="wo_durata"]`);
    const rpeEl = document.querySelector(`[data-id="${id}"][data-f="wo_rpe"]`);
    const vol = volEl ? parseFloat(volEl.value) : NaN;
    const kcal = kcalEl ? parseFloat(kcalEl.value) : NaN;
    const dur = durEl ? parseFloat(durEl.value) : NaN;
    const rpe = rpeEl ? parseFloat(rpeEl.value) : NaN;
    const d = new Date(START); d.setDate(d.getDate() + i);
    sessions.push({
      dayIdx: i, date: d, type: wo.type,
      volume: isNaN(vol) ? null : vol,
      kcal:   isNaN(kcal) ? null : kcal,
      durata: isNaN(dur) ? null : dur,
      rpe:    isNaN(rpe) ? null : rpe,
    });
  }
  return sessions;
}

function getWeeklyVolume(weeks) {
  // Returns weekly volume breakdown by type for last N weeks
  const today = new Date(); today.setHours(0,0,0,0);
  const start = new Date(START); start.setHours(0,0,0,0);
  const elapsed = Math.floor((today - start) / 86400000);
  const currentWeek = Math.floor(elapsed / 7);
  const fromWeek = Math.max(0, currentWeek - (weeks - 1));
  const result = [];
  for (let w = fromWeek; w <= currentWeek; w++) {
    const entry = { week: w + 1, push: 0, pull: 0, legs: 0, upperSab: 0, upperDom: 0, total: 0 };
    for (let d = w * 7; d < (w + 1) * 7 && d < TOTAL_DAYS; d++) {
      const id = 'day_' + d;
      const wo = getWorkout(d);
      const volEl = document.querySelector(`[data-id="${id}"][data-f="wo_volume"]`);
      const vol = volEl ? parseFloat(volEl.value) : NaN;
      if (isNaN(vol) || !vol) continue;
      entry.total += vol;
      if (wo.type === 'Push') entry.push += vol;
      else if (wo.type === 'Pull') entry.pull += vol;
      else if (wo.type === 'Legs') entry.legs += vol;
      else if (wo.type === 'Upper Sab') entry.upperSab += vol;
      else if (wo.type === 'Upper Dom' || wo.type === 'Upper Body') entry.upperDom += vol;
    }
    result.push(entry);
  }
  return result;
}

function getWorkoutBreakdown() {
  // Returns per-type workout counts for entire elapsed period
  const today = new Date(); today.setHours(0,0,0,0);
  const start = new Date(START); start.setHours(0,0,0,0);
  const elapsed = Math.floor((today - start) / 86400000);
  const counts = { Push:0, Pull:0, Legs:0, 'Upper Sab':0, 'Upper Dom':0, BKK_FREE:0 };
  const done   = { Push:0, Pull:0, Legs:0, 'Upper Sab':0, 'Upper Dom':0, BKK_FREE:0 };
  for (let i = 0; i <= elapsed && i < TOTAL_DAYS; i++) {
    const wo = getWorkout(i);

function drawBarChart(canvasId, bars, options = {}) {
  // bars: [{label, value, color}]
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const H = options.height || 110;
  canvas.width = rect.width * dpr;
  canvas.height = H * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width;

  const vals = bars.map(b => b.value).filter(v => v != null && v > 0);
  if (vals.length < 1) {
    ctx.font = '11px -apple-system'; ctx.fillStyle = '#aeaeb2';
    ctx.fillText('Dati insufficienti — continua a compilare il diario', 8, H/2); return;
  }
  const maxV = Math.max(...vals);
  const pad = 4, labelH = 16, barAreaH = H - labelH - 4;
  const bw = Math.max(4, (W - pad * 2) / bars.length - 3);
  const gap = (W - pad * 2 - bw * bars.length) / Math.max(bars.length - 1, 1);

  // Grid
  ctx.strokeStyle = 'rgba(0,0,0,0.05)'; ctx.lineWidth = 1;
  [0.25, 0.5, 0.75, 1].forEach(r => {
    const y = barAreaH - r * barAreaH + 2;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  });

  bars.forEach((b, i) => {
    if (b.value == null) return;
    const x = pad + i * (bw + gap);
    const bh = (b.value / maxV) * (barAreaH - 4);
    const y = barAreaH - bh + 2;

    // Bar with rounded top
    const r2 = Math.min(3, bw / 2);
    ctx.beginPath();
    ctx.moveTo(x + r2, y);
    ctx.lineTo(x + bw - r2, y);
    ctx.quadraticCurveTo(x + bw, y, x + bw, y + r2);
    ctx.lineTo(x + bw, barAreaH + 2);
    ctx.lineTo(x, barAreaH + 2);
    ctx.lineTo(x, y + r2);
    ctx.quadraticCurveTo(x, y, x + r2, y);
    ctx.closePath();
    ctx.fillStyle = b.color || '#0071e3';
    ctx.globalAlpha = b.alpha || 1;
    ctx.fill();
    ctx.globalAlpha = 1;

    // Value on top if fits
    if (bh > 18 && options.showValues !== false) {
      ctx.font = '500 9px -apple-system'; ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.fillText(options.valFormat ? options.valFormat(b.value) : Math.round(b.value), x + bw/2, y + 11);
      ctx.textAlign = 'left';
    }

    // Label below
    if (b.label) {
      ctx.font = '9px -apple-system'; ctx.fillStyle = '#aeaeb2';
      ctx.textAlign = 'center';
      ctx.fillText(b.label, x + bw/2, H - 1);
      ctx.textAlign = 'left';
    }
  });
}

function drawStackedBarChart(canvasId, weeks, options = {}) {
  // weeks: [{week, push, pull, legs, upperSab, upperDom, total}]
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const H = options.height || 120;
  canvas.width = rect.width * dpr;
  canvas.height = H * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width;

  const maxV = Math.max(...weeks.map(w => w.total || 0));
  if (maxV === 0) {
    ctx.font = '11px -apple-system'; ctx.fillStyle = '#aeaeb2';
    ctx.fillText('Dati insufficienti — continua a compilare il diario', 8, H/2); return;
  }
  const labelH = 16, barAreaH = H - labelH - 4;
  const bw = Math.max(4, (W - 8) / weeks.length - 4);
  const gap = (W - 8 - bw * weeks.length) / Math.max(weeks.length - 1, 1);
  const colors = { push:'#ff3b30', pull:'#34c759', legs:'#ff9500', upperSab:'#af52de', upperDom:'#8e44ad' };

  // Grid lines
  ctx.strokeStyle = 'rgba(0,0,0,0.05)'; ctx.lineWidth = 1;
  [0.25,0.5,0.75].forEach(r => {
    const y = barAreaH - r * (barAreaH-4) + 2;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  });

  weeks.forEach((wk, i) => {
    const x = 4 + i * (bw + gap);
    let yOffset = barAreaH + 2;
    ['push','pull','legs','upperSab','upperDom'].forEach(type => {
      const v = wk[type] || 0;
      if (!v) return;
      const bh = Math.max(1, (v / maxV) * (barAreaH - 4));
      yOffset -= bh;
      ctx.fillStyle = colors[type];
      ctx.fillRect(x, yOffset, bw, bh);
    });
    // Total label on bar
    if (wk.total > 0) {
      const totalH = (wk.total / maxV) * (barAreaH - 4);
      const topY = barAreaH + 2 - totalH;
      if (totalH > 18) {
        ctx.font = '500 8px -apple-system'; ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.fillText((wk.total/1000).toFixed(1)+'t', x + bw/2, topY + 10);
      }
    }
    ctx.font = '9px -apple-system'; ctx.fillStyle = '#aeaeb2';
    ctx.textAlign = 'center';
    ctx.fillText('W' + wk.week, x + bw/2, H - 1);
    ctx.textAlign = 'left';
  });
}

function drawScatterChart(canvasId, points, options = {}) {

  canvas.width = rect.width * dpr;
  canvas.height = H * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width;

  if (points.length < 3) {
    ctx.font = '11px -apple-system'; ctx.fillStyle = '#aeaeb2';
    ctx.fillText('Dati insufficienti — continua a compilare il diario', 8, H/2); return;
  }

  const pad = 28;
  const hrvVals = points.map(p => p.hrv);
  const volVals = points.map(p => p.vol);
  const minH = Math.min(...hrvVals), maxH = Math.max(...hrvVals);
  const minV = Math.min(...volVals), maxV = Math.max(...volVals);
  const rngH = maxH - minH || 1, rngV = maxV - minV || 1;

  // Axis labels
  ctx.font = '9px -apple-system'; ctx.fillStyle = '#aeaeb2';
  ctx.textAlign = 'center';
  ctx.fillText('HRV (ms)', W/2, H - 1);
  ctx.save(); ctx.translate(10, H/2); ctx.rotate(-Math.PI/2);
  ctx.fillText('Volume (kg)', 0, 0); ctx.restore();
  ctx.textAlign = 'left';

  // Grid
  ctx.strokeStyle = 'rgba(0,0,0,0.05)'; ctx.lineWidth = 1;
  [0.25,0.5,0.75].forEach(r => {
    const y = pad + r * (H - pad*2);
    ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(W-4, y); ctx.stroke();
    const x = pad + r * (W - pad - 4);
    ctx.beginPath(); ctx.moveTo(x, pad); ctx.lineTo(x, H-pad); ctx.stroke();
  });

  // Linear regression line
  const n = points.length;
  const sumX = hrvVals.reduce((a,b)=>a+b,0);
  const sumY = volVals.reduce((a,b)=>a+b,0);
  const sumXY = points.reduce((a,p)=>a+p.hrv*p.vol,0);
  const sumX2 = hrvVals.reduce((a,b)=>a+b*b,0);
  const slope = (n*sumXY - sumX*sumY) / (n*sumX2 - sumX*sumX);
  const intercept = (sumY - slope*sumX) / n;
  const toX = hrv => pad + ((hrv - minH) / rngH) * (W - pad - 4);
  const toY = vol => (H - pad) - ((vol - minV) / rngV) * (H - pad*2);
  ctx.beginPath();
  ctx.moveTo(toX(minH), toY(slope * minH + intercept));
  ctx.lineTo(toX(maxH), toY(slope * maxH + intercept));
  ctx.strokeStyle = '#0071e322'; ctx.lineWidth = 1.5; ctx.stroke();

  // Points
  points.forEach(p => {
    ctx.beginPath();
    ctx.arc(toX(p.hrv), toY(p.vol), 4, 0, Math.PI*2);
    ctx.fillStyle = '#0071e3bb'; ctx.fill();
  });

  // Correlation label
  const corrNum = (n*sumXY - sumX*sumY) / Math.sqrt((n*sumX2 - sumX*sumX) * (n*volVals.reduce((a,b)=>a+b*b,0) - sumY*sumY));
  if (!isNaN(corrNum)) {
    ctx.font = '10px -apple-system'; ctx.fillStyle = '#aeaeb2';
    ctx.fillText('r = ' + corrNum.toFixed(2), W - 44, 16);
  }
}

function refreshDashCharts() {
  const peso30 = getDayData('peso', 30);

  const bpSys = getDayData('bp_sys', 30);
  const bpDia = getDayData('bp_dia', 30);
  const energia = getDayData('energia', 30);
  const recupero = getDayData('recupero', 30);

  drawDashChart('dc-peso', [{data:peso30, color:'#0071e3'}], {height:100, minScale:0.99, maxScale:1.01});
  drawDashChart('dc-hrv', [{data:hrv30, color:'#34c759'}], {height:100});

  // Merge bp sys and dia on same chart
  const allBp = [...bpSys.map(p=>p.value), ...bpDia.map(p=>p.value)].filter(v=>v!==null);
  if (allBp.length >= 2) {
    drawDashChart('dc-bp', [
      {data:bpSys, color:'#ff3b30'},
      {data:bpDia, color:'#0071e3'}
    ], {height:100});
  }

  drawDashChart('dc-subj', [
    {data:energia, color:'#0071e3'},
    {data:recupero, color:'#34c759'}
  ], {height:100, minScale:0.9, maxScale:1.1});

  // Compliance rings
  const comp = getComplianceData();
  const injPct = comp.injPrev > 0 ? Math.round((comp.injDone/comp.injPrev)*100) : 0;
  const woPct = comp.woPrev > 0 ? Math.round((comp.woDone/comp.woPrev)*100) : 0;
  const stackPct = comp.stackDays > 0 ? Math.round((comp.stackDone/comp.stackDays)*100) : 0;

  document.getElementById('cr-inj-pct').textContent = injPct;
  document.getElementById('cr-inj-sub').textContent = `${comp.injDone}/${comp.injPrev}`;
  document.getElementById('cr-wo-pct').textContent = woPct;
  document.getElementById('cr-wo-sub').textContent = `${comp.woDone}/${comp.woPrev}`;
  document.getElementById('cr-stack-pct').textContent = stackPct;
  document.getElementById('cr-stack-sub').textContent = `${comp.stackDone}/${comp.stackDays} giorni`;

  drawComplianceRing('cr-inj', injPct, '#34c759');

  drawComplianceRing('cr-stack', stackPct, '#ff9500');

  // Workout breakdown bars

        <div class="comp-bar-pct">${done2}/${total}</div>

  drawDashChart('dc-wo-dur', [{data: durData, color: '#5ac8fa'}], { height: 100 });

  // Volume settimanale stacked
  const wklyVol = getWeeklyVolume(8);
  drawStackedBarChart('dc-wo-wkly', wklyVol, { height: 120 });

  // Sentinel lifts - grouped by muscle, draw current group
  drawSentinelGroup(_currentSentinelGroup);

  // HRV vs Volume scatter
  const scatterHV = getHrvVsVolume(60);
  drawScatterChart('dc-hrv-vol', scatterHV, { height: 130 });

  // RPE vs HRV line overlay
  const rpeLineData = sessions30.filter(s => s.rpe).map(s => ({ date: s.date, value: s.rpe }));
  const hrvLineData = sessions30.filter(s => s.rpe).map(s => {
    const el = document.querySelector(`[data-id="day_${s.dayIdx}"][data-f="hrv"]`);
    const v = el ? parseFloat(el.value) : NaN;
    return { date: s.date, value: isNaN(v) ? null : v / 10 }; // scale HRV /10 for overlay
  });
  drawDashChart('dc-rpe-hrv', [
    {data: rpeLineData, color: '#af52de'},
    {data: hrvLineData, color: '#34c759'},
  ], { height: 100, minScale: 0.7, maxScale: 1.3 });
}


window.addEventListener('load',async()=>{
  buildNav();
  buildDays();
  document.getElementById('loading').style.display='none';
  const container=document.getElementById('container');
  buildCycleCard(container);
  buildLabSection(container);
  updateNavHighlight();
  jumpToday();
  // Always load from cloud first — localStorage only as offline fallback
  try{
    await loadFromCloud();
  }catch(e){
    // Cloud failed — fall back to localStorage
    const lr=localStorage.getItem(KEY);
    if(lr){
      try{
        const p=JSON.parse(lr);
        applyAll(p.data||p);
        document.getElementById('last-saved').textContent='Offline — dati locali';
        setSyncStatus('err');
      }catch(e2){}
    }
  }
  setTimeout(()=>buildCharts(container),400);
});

window.addEventListener('beforeunload',()=>{
  // Only save to localStorage on unload, never trigger cloud save
  try {
    const data=collectAll();
    if(Object.values(data).some(d=>Object.keys(d).length>0))
      localStorage.setItem(KEY,JSON.stringify({data,ts:Date.now()}));
  } catch(e) {}
});

function buildMotraSection(dayId) {
  return `
    <div class="motra-box" style="margin-top:12px">
      <label>Importa da Motra</label>
      <textarea class="motra-textarea" id="motra-ta-${dayId}"
        placeholder="Incolla qui il testo del log Motra (copia tutto dal titolo fino a 'Tracciato con Motra.')..."></textarea>
      <button class="motra-import-btn" onclick="importMotra('${dayId}')">Importa log</button>
      <input type="hidden" data-id="${dayId}" data-f="motra_log">
      <div class="motra-result" id="motra-res-${dayId}"></div>
      <div class="motra-parsed" id="motra-parsed-${dayId}"></div>
    </div>`;
}

function parseMotraText(text) {
  const lines = text.trim().split('\n').map(l => l.trim()).filter(l => l && !l.startsWith('http') && l !== 'Tracciato con Motra.');

  const result = { title: '', date: '', durata: '', volume: '', calorie: '', exercises: [] };

  // Skip "Il mio allenamento:" header
  let i = 0;
  if (lines[i] && lines[i].toLowerCase().includes('allenamento')) i++;

  // Title (workout name)
  if (lines[i] && !lines[i].match(/^\d/) && !lines[i].includes(':')) {
    result.title = lines[i]; i++;
  }

  // Date
  if (lines[i] && lines[i].match(/\d+ \w+ \d+/)) {
    result.date = lines[i]; i++;
  }

  // Meta fields
  while (i < lines.length) {
    const l = lines[i];
    if (l.startsWith('Durata:'))   { result.durata  = l.replace('Durata:', '').trim(); i++; continue; }
    if (l.startsWith('Voume:') || l.startsWith('Volume:')) { result.volume = l.replace(/Vo[lu]+me:/i,'').trim(); i++; continue; }
    if (l.startsWith('Calorie:'))  { result.calorie = l.replace('Calorie:', '').trim(); i++; continue; }
    if (l.startsWith('Esercizi:')) { i++; break; }
    i++;
  }

  // Parse exercises
  const setPattern = /^(\d+|[Rr]iscaldamento):\s*(\d+)\s+ripetizioni\s+x\s+([\d,\.]+)\s*kg/i;
  let currentEx = null;

  while (i < lines.length) {
    const l = lines[i];
    const setMatch = l.match(setPattern);
    if (setMatch) {
      if (currentEx) {
        const label = setMatch[1].toLowerCase() === 'riscaldamento' ? 'W' : setMatch[1];
        const reps = setMatch[2];
        const kg = setMatch[3].replace(',', '.');
        currentEx.sets.push({ label, reps, kg });
      }
    } else if (l && !l.match(/^\d+:/) && !l.toLowerCase().startsWith('riscaldamento')) {
      if (currentEx) result.exercises.push(currentEx);
      currentEx = { name: l, sets: [] };
    }
    i++;
  }
  if (currentEx && currentEx.sets.length > 0) result.exercises.push(currentEx);

  return result;
}

function importMotra(dayId) {
  const ta = document.getElementById('motra-ta-' + dayId);
  const res = document.getElementById('motra-res-' + dayId);
  const parsed = document.getElementById('motra-parsed-' + dayId);

  const text = ta.value.trim();
  if (!text) { res.className = 'motra-result err'; res.textContent = 'Incolla prima il testo del log Motra.'; return; }

  try {
    const data = parseMotraText(text);

    if (!data.exercises.length) {
      res.className = 'motra-result err';
      res.textContent = 'Nessun esercizio trovato. Controlla di aver copiato tutto il testo.';
      return;
    }

    // Auto-populate workout fields
    if (data.durata) {
      const durEl = document.querySelector(`[data-id="${dayId}"][data-f="wo_durata"]`);
      if (durEl) {
        // Convert "1h 21m" to minutes
        const hm = data.durata.match(/(\d+)h\s*(\d+)m/);
        const m = data.durata.match(/^(\d+)m/);
        if (hm) durEl.value = parseInt(hm[1])*60 + parseInt(hm[2]);
        else if (m) durEl.value = m[1];
      }
    }
    if (data.calorie) {
      const calEl = document.querySelector(`[data-id="${dayId}"][data-f="wo_kcal"]`);
      if (calEl) calEl.value = data.calorie.replace(' cal','').trim();
    }
    if (data.volume) {
      const volEl = document.querySelector(`[data-id="${dayId}"][data-f="wo_volume"]`);
      if (volEl) {
        // Convert "14,4K kg" to number
        const vMatch = data.volume.match(/([\d,\.]+)([Kk])?/);
        if (vMatch) {
          let val = parseFloat(vMatch[1].replace(',','.'));
          if (vMatch[2]) val *= 1000;
          volEl.value = Math.round(val);
        }
      }
    }

    // Auto-fill sentinel lifts from parsed exercises
    // Each entry: sentinelId → [keywords to match in exercise name]
    // More specific keywords first to avoid false matches
    const sentinelMap = {
      // PETTO — compound (bench/incline/chest press, NOT pec dec/fly)
      'bench':      ['incline bench press','bench press','chest press','panca inclinata','panca piana','db bench','db incline','incline press'],
      // PETTO — isolamento (pec dec, fly, crossover — NOT bench)
      'pecdec':     ['pec dec','pec-dec','machine fly','cable fly','crossover','croci','chest fly','pectoral'],
      // SPALLE — press (military, shoulder press, overhead)
      'milpress':   ['military press','shoulder press','overhead press','lento avanti','ohp','db shoulder press','machine shoulder press','smith shoulder'],
      // SPALLE — laterale
      'lateraise':  ['lateral raise','alzate laterali','lat raise','side raise','laterali'],
      // SPALLE — rear/face pull
      'facepull':   ['face pull','rear delt','alzate posteriori','tirate al viso','tirate alla corda','rear fly','reverse fly'],
      // SPALLE — frontale/upright
      'frontrise':  ['front raise','alzate frontali','upright row','tirate al mento','frontal raise'],
      // TRICIPITI — pushdown/estensione bassa
      'tridown':    ['tricep pushdown','tricep extension','pushdown','tricep push','corda tricipite','rope pushdown','bar pushdown','tricep rope'],
      // TRICIPITI — overhead/estensione alta
      'triover':    ['overhead tricep','tricep overhead','estensione sopra','french press','overhead ext','high cable tri','dip machine','dip alla macchina'],
      // DORSO — lat machine (pulldown)
      'lat':        ['lat pulldown','lat machine','pulley alto','gran dorsale','pulldown','pull down'],
      // DORSO — rematore/row
      'row':        ['barbell row','seated row','cable row','t-bar row','machine row','db row','pulley row','rematore','vogatore','pulley basso','bent row'],
      // BICIPITI — curl standard
      'curl':       ['incline curl','ez bar curl','ez curl','bb curl','barbell curl','cable curl','preacher curl','curl bilanciere','curl manubri','db curl'],
      // BICIPITI — martello
      'hammercurl': ['hammer curl','curl martello','neutral curl','hammer'],
      // GAMBE — leg extension
      'legext':     ['leg extension','estensione gambe','quadricipiti macchina'],
      // GAMBE — leg press
      'legpress':   ['leg press','pressa','hack squat'],
      // GAMBE — leg curl
      'legcurl':    ['leg curl','curl femoral','femoral','curl gambe','lying curl','seated curl'],
      // GAMBE — hip thrust
      'hipthrust':  ['hip thrust','hip-thrust','glute bridge','glutei macchina'],
      // GAMBE — calf
      'calf':       ['calf','polpacci','seated calf','standing calf','gastrocnemio'],
      // GAMBE — RDL/stacco
      'rdl':        ['romanian deadlift','rdl','stacco rumeno','stiff','stiff leg','romanian','sumo deadlift','deadlift','stacco'],
    };

    // Get session type to know which sentinels are expected
    for (const [sentinelId, keywords] of Object.entries(sentinelMap)) {
      // Find matching exercise in parsed data — try most specific keyword first
      const match = data.exercises.find(ex => {
        const name = ex.name.toLowerCase();
        return keywords.some(kw => name.includes(kw.toLowerCase()));
      });
      if (!match || !match.sets.length) continue;

      const workSets = match.sets.filter(s => s.label !== 'W');
      if (!workSets.length) continue;

      // Best set = most reps at highest weight (work set logic)
      const maxKg = Math.max(...workSets.map(s => parseFloat(s.kg)));
      const topSets = workSets.filter(s => parseFloat(s.kg) >= maxKg * 0.97);
      const best = topSets.reduce((a, b) => parseInt(b.reps) > parseInt(a.reps) ? b : a);

      const kgEl   = document.querySelector(`[data-id="${dayId}"][data-f="sl_${sentinelId}_kg"]`);
      const repsEl = document.querySelector(`[data-id="${dayId}"][data-f="sl_${sentinelId}_reps"]`);
      const setsEl = document.querySelector(`[data-id="${dayId}"][data-f="sl_${sentinelId}_sets"]`);
      if (kgEl) kgEl.value = best.kg;
      if (repsEl) repsEl.value = best.reps;
      if (setsEl) setsEl.value = workSets.length;
    }

    // Store parsed data as JSON in a hidden field
    let hidden = document.querySelector(`[data-id="${dayId}"][data-f="motra_log"]`);
    if (!hidden) {
      hidden = document.createElement('input');
      hidden.type = 'hidden';
      hidden.dataset.id = dayId;
      hidden.dataset.f = 'motra_log';
      ta.parentNode.appendChild(hidden);
    }
    hidden.value = JSON.stringify(data);

    // Render parsed result
    const metaHtml = `
      <div class="motra-meta">
        ${data.durata ? `<div class="motra-meta-item"><div class="motra-meta-val">${data.durata}</div><div class="motra-meta-lbl">Durata</div></div>` : ''}
        ${data.volume ? `<div class="motra-meta-item"><div class="motra-meta-val">${data.volume}</div><div class="motra-meta-lbl">Volume</div></div>` : ''}
        ${data.calorie ? `<div class="motra-meta-item"><div class="motra-meta-val">${data.calorie}</div><div class="motra-meta-lbl">Calorie</div></div>` : ''}
        <div class="motra-meta-item"><div class="motra-meta-val">${data.exercises.length}</div><div class="motra-meta-lbl">Esercizi</div></div>
      </div>`;

    const exHtml = data.exercises.map(ex => {
      const workSets = ex.sets.filter(s => s.label !== 'W');
      const warmSets = ex.sets.filter(s => s.label === 'W');
      const setsStr = workSets.map(s => `${s.reps}×${s.kg}kg`).join(' · ');
      const warnStr = warmSets.length ? ` <span style="color:var(--faint);font-size:11px">(+${warmSets.length} riscald.)</span>` : '';
      return `<div class="motra-ex-row">
        <div class="motra-ex-name">${ex.name}</div>
        <div class="motra-ex-sets">${setsStr}${warnStr}</div>
      </div>`;
    }).join('');

    parsed.innerHTML = metaHtml + exHtml;
    parsed.className = 'motra-parsed show';

    res.className = 'motra-result ok';
    res.textContent = `✓ Importati ${data.exercises.length} esercizi · durata e kcal compilati automaticamente`;

  } catch(e) {
    res.className = 'motra-result err';
    res.textContent = 'Errore nel parsing: ' + e.message;
  }
}

</script>
